        health_check: {}
        zpages:
          endpoint: 0.0.0.0:55679
      processors:
        batch: {}
        tail_sampling:
          policies:
            - name: drop_noisy_traces_url
              type: string_attribute
              string_attribute:
                key: http.target
                values:
                  - \/health
                enabled_regex_matching: true
                invert_match: true
        transform:
          trace_statements:
            - context: span
              statements:
                - set(status.code, 1) where attributes["http.path"] == "/health"
                - >-
                  replace_match(attributes["http.route"], "/v1", attributes["http.target"]) where
                  attributes["http.target"] != nil
                - replace_pattern(name, "/v1", attributes["http.route"]) where attributes["http.route"] != nil
                - set(name, Concat([name, attributes["http.url"]], " ")) where name == "POST"
      service:
        extensions:
          - zpages
          - health_check
        pipelines:
          traces:
            receivers:
              - otlp
            exporters:
              - debug
              - zipkin
            processors:
              - tail_sampling
              - transform
          metrics:
            exporters:
              - debug
              - prometheus
            processors:
              - memory_limiter
              - batch
            receivers:
              - otlp
              - prometheus
          logs:
            receivers:
              - otlp
            exporters:
              - debug
            processors:
              - batch
    ports:
      metrics:
        enabled: true
        containerPort: 8889
        servicePort: 8889
        protocol: TCP
