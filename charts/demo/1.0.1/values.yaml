        exec \
        airflow {{ semverCompare ">=2.0.0" .Values.airflowVersion | ternary "celery worker" "worker" }}
        {{- if and .Values.workers.queue (ne .Values.workers.queue "default") }}
        {{- " -q " }}{{ .Values.workers.queue }}
        {{- end }}
    livenessProbe:
      enabled: true
      initialDelaySeconds: 10
      timeoutSeconds: 20
      failureThreshold: 5
      periodSeconds: 60
      command: null
    updateStrategy: null
