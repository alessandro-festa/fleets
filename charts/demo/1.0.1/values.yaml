      namespaceLabels: {}
      pollingInterval: 5
      cooldownPeriod: 30
      minReplicaCount: 0
      maxReplicaCount: 10
      advanced: {}
      query: >-
        SELECT ceil(COUNT(*)::decimal / {{ .Values.config.celery.worker_concurrency }}) FROM task_instance WHERE
        (state='running' OR state='queued') AND queue IN ( {{- range $i, $q := splitList "," .Values.workers.queue -}}
