apiVersion: v2
name: demo
description: AI Stack generated by SUSE AI Factory
type: application
version: 1.0.1
appVersion: "1.0"
keywords:
  - ai
  - ml
  - llm
  - suse-ai-factory

dependencies:
  - name: "apache-airflow"
    version: "*"
    repository: "oci://dp.apps.rancher.io/charts/apache-airflow"
    condition: "apache-airflow.enabled"
  - name: "nvidia-blueprint-rag"
    version: "v2.4.0"
    repository: "git+https://github.com/NVIDIA-AI-Blueprints/rag//deploy/helm/nvidia-blueprint-rag"
    condition: "nvidia-blueprint-rag.enabled"

