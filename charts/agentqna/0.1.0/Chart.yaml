apiVersion: v2
name: agentqna
description: The Helm chart to deploy AgentQnA
type: application
version: 1
appVersion: "1.0"
maintainers:
  - name: "@alessandro-festa"
keywords:
  - ai
  - ml
  - llm
  - suse-ai-factory

dependencies:
  - name: "agentqna"
    version: "0-latest"
    repository: "oci://https://github.com/opea-project/GenAIInfra/helm-charts/agentqna"
    condition: "agentqna.enabled"
  - name: "agent"
    version: "0-latest"
    repository: ""file://../common/agent""
    condition: "agent.enabled"
  - name: "agent"
    version: "0-latest"
    repository: ""file://../common/agent""
    condition: "agent.enabled"
  - name: "agent"
    version: "0-latest"
    repository: ""file://../common/agent""
    condition: "agent.enabled"
  - name: "tgi"
    version: "0-latest"
    repository: ""file://../common/tgi""
    condition: "tgi.enabled"
  - name: "vllm"
    version: "0-latest"
    repository: ""file://../common/vllm""
    condition: "vllm.enabled"
  - name: "tei"
    version: "0-latest"
    repository: ""file://../common/tei""
    condition: "tei.enabled"
  - name: "embedding-usvc"
    version: "0-latest"
    repository: ""file://../common/embedding-usvc""
    condition: "embedding-usvc.enabled"
  - name: "teirerank"
    version: "0-latest"
    repository: ""file://../common/teirerank""
    condition: "teirerank.enabled"
  - name: "reranking-usvc"
    version: "0-latest"
    repository: ""file://../common/reranking-usvc""
    condition: "reranking-usvc.enabled"
  - name: "redis-vector-db"
    version: "0-latest"
    repository: ""file://../common/redis-vector-db""
    condition: "redis-vector-db.enabled"
  - name: "retriever-usvc"
    version: "0-latest"
    repository: ""file://../common/retriever-usvc""
    condition: "retriever-usvc.enabled"
  - name: "data-prep"
    version: "0-latest"
    repository: ""file://../common/data-prep""
    condition: "data-prep.enabled"
  - name: "ui"
    version: "0-latest"
    repository: ""file://../common/ui""
    condition: "ui.enabled"

