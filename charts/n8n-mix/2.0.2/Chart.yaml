apiVersion: v2
name: n8n-mix
description: AI Stack generated by SUSE AI Factory
type: application
version: 2.0.2
appVersion: "1.0"
keywords:
  - ai
  - ml
  - llm
  - suse-ai-factory

dependencies:
  - name: "apache-airflow"
    version: "*"
    repository: "oci://dp.apps.rancher.io/charts/apache-airflow"
    condition: "apache-airflow.enabled"
  - name: "ollama"
    version: "*"
    repository: "oci://dp.apps.rancher.io/charts/ollama"
    condition: "ollama.enabled"
  - name: "n8n"
    version: "2.0.1"
    repository: "git+https://github.com/8gears/n8n-helm-chart//charts/n8n"
    condition: "n8n.enabled"

