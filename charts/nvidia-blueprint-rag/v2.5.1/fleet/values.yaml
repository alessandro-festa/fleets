global:
  imagePullSecrets:
    - application-collection
    - name: ngc-registry-secret
  namespace: ''
main:
  enabled: true
  nameOverride: ''
  fullnameOverride: rag-server
  nodeSelector: {}
  affinity: {}
  tolerations: []
  serviceAccount:
    create: true
    name: ''
    automount: true
    annotations: {}
  replicaCount: 1
  namespace: nv-nvidia-blueprint-rag
  imagePullSecret:
    name: ngc-secret
    registry: nvcr.io
    username: $oauthtoken
    password: ''
    create: true
  ngcApiSecret:
    name: ngc-api
    password: ''
    create: true
  apiKeysSecret:
    create: true
    name: rag-api-keys
    existingSecret: ''
    llmApiKey: ''
    embeddingsApiKey: ''
    rankingApiKey: ''
    queryRewriterApiKey: ''
    filterExpressionGeneratorApiKey: ''
    vlmApiKey: ''
    summaryLlmApiKey: ''
    reflectionLlmApiKey: ''
  image:
    repository: nvcr.io/nvidia/blueprint/rag-server
    tag: 2.5.0
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8081
  resources:
    limits:
      memory: 64Gi
    requests:
      memory: 8Gi
  livenessProbe:
    httpGet:
      path: /health
      port: 8081
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /health
      port: 8081
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  server:
    workers: 8
  promptConfig:
    enabled: true
  envVars:
    EXAMPLE_PATH: ./nvidia_rag/rag_server
    PROMPT_CONFIG_FILE: /prompt.yaml
    PROMETHEUS_MULTIPROC_DIR: /tmp-data/prom_data
    MINIO_ENDPOINT: rag-minio:9000
    MINIO_ACCESSKEY: minioadmin
    MINIO_SECRETKEY: minioadmin
    REDIS_HOST: rag-redis-master
    REDIS_PORT: '6379'
    REDIS_DB: '0'
    APP_VECTORSTORE_URL: http://milvus:19530
    APP_VECTORSTORE_NAME: milvus
    APP_VECTORSTORE_INDEXTYPE: GPU_CAGRA
    APP_VECTORSTORE_SEARCHTYPE: dense
    APP_VECTORSTORE_RANKER_TYPE: rrf
    APP_VECTORSTORE_DENSE_WEIGHT: '0.5'
    APP_VECTORSTORE_SPARSE_WEIGHT: '0.5'
    APP_VECTORSTORE_ENABLEGPUSEARCH: 'True'
    APP_VECTORSTORE_EF: '100'
    APP_VECTORSTORE_USERNAME: ''
    APP_VECTORSTORE_PASSWORD: ''
    APP_VECTORSTORE_APIKEY_ID: ''
    APP_VECTORSTORE_APIKEY_SECRET: ''
    APP_VECTORSTORE_APIKEY: ''
    COLLECTION_NAME: multimodal_data
    APP_RETRIEVER_SCORETHRESHOLD: '0.25'
    VECTOR_DB_TOPK: '100'
    APP_RETRIEVER_TOPK: '10'
    APP_LLM_MODELNAME: nvidia/llama-3.3-nemotron-super-49b-v1.5
    APP_LLM_SERVERURL: nim-llm:8000
    LLM_MAX_TOKENS: '32768'
    LLM_TEMPERATURE: '0'
    LLM_TOP_P: '1.0'
    APP_QUERYREWRITER_MODELNAME: nvidia/llama-3.3-nemotron-super-49b-v1.5
    APP_QUERYREWRITER_SERVERURL: nim-llm:8000
    APP_FILTEREXPRESSIONGENERATOR_MODELNAME: nvidia/llama-3.3-nemotron-super-49b-v1.5
    APP_FILTEREXPRESSIONGENERATOR_SERVERURL: nim-llm:8000
    ENABLE_FILTER_GENERATOR: 'False'
    APP_EMBEDDINGS_SERVERURL: nemotron-embedding-ms:8000/v1
    APP_EMBEDDINGS_MODELNAME: nvidia/llama-nemotron-embed-1b-v2
    APP_EMBEDDINGS_DIMENSIONS: '2048'
    APP_RANKING_SERVERURL: nemotron-ranking-ms:8000
    APP_RANKING_MODELNAME: nvidia/llama-nemotron-rerank-1b-v2
    ENABLE_RERANKER: 'True'
    RERANKER_SCORE_THRESHOLD: '0.0'
    ENABLE_VLM_INFERENCE: 'false'
    VLM_TO_LLM_FALLBACK: 'true'
    APP_VLM_MAX_TOTAL_IMAGES: '5'
    APP_VLM_MAX_TOKENS: '8192'
    APP_VLM_TEMPERATURE: '0.1'
    APP_VLM_TOP_P: '1.0'
    APP_VLM_SERVERURL: http://nim-vlm:8000/v1
    APP_VLM_MODELNAME: nvidia/nemotron-nano-12b-v2-vl
    APP_TEXTSPLITTER_CHUNKSIZE: '2000'
    APP_TEXTSPLITTER_CHUNKOVERLAP: '200'
    ENABLE_CITATIONS: 'True'
    ENABLE_GUARDRAILS: 'False'
    LOGLEVEL: INFO
    ENABLE_MULTITURN: 'True'
    ENABLE_QUERYREWRITER: 'False'
    MULTITURN_RETRIEVER_SIMPLE: 'False'
    CONVERSATION_HISTORY: '0'
    APP_TRACING_ENABLED: 'False'
    APP_TRACING_OTLPHTTPENDPOINT: http://rag-opentelemetry-collector:4318/v1/traces
    APP_TRACING_OTLPGRPCENDPOINT: grpc://rag-opentelemetry-collector:4317
    ENABLE_REFLECTION: 'false'
    MAX_REFLECTION_LOOP: '3'
    CONTEXT_RELEVANCE_THRESHOLD: '1'
    RESPONSE_GROUNDEDNESS_THRESHOLD: '1'
    REFLECTION_LLM: nvidia/llama-3.3-nemotron-super-49b-v1.5
    REFLECTION_LLM_SERVERURL: nim-llm:8000
    ENABLE_SOURCE_METADATA: 'true'
    FILTER_THINK_TOKENS: 'true'
    LLM_ENABLE_THINKING: 'false'
    LLM_REASONING_BUDGET: '0'
    LLM_LOW_EFFORT: 'false'
    NEMO_GUARDRAILS_URL: nemo-guardrails:7331
    ENABLE_QUERY_DECOMPOSITION: 'false'
    MAX_RECURSION_DEPTH: '3'
  ingestor-server:
    enabled: true
    appName: ingestor-server
    nodeSelector: {}
    affinity: {}
    tolerations: []
    replicaCount: 1
    imagePullSecret:
      create: false
      name: ngc-secret
      registry: nvcr.io
      username: $oauthtoken
      password: ''
    image:
      repository: nvcr.io/nvidia/blueprint/ingestor-server
      tag: 2.5.0
      pullPolicy: Always
    service:
      type: ClusterIP
      port: 8082
    server:
      workers: 1
    livenessProbe: {}
    readinessProbe: {}
    resources:
      limits:
        memory: 25Gi
      requests:
        memory: 25Gi
    envVars:
      EXAMPLE_PATH: src/nvidia_rag/ingestor_server
      PROMPT_CONFIG_FILE: /prompt.yaml
      APP_VECTORSTORE_URL: http://milvus:19530
      APP_VECTORSTORE_NAME: milvus
      APP_VECTORSTORE_SEARCHTYPE: dense
      APP_VECTORSTORE_RANKER_TYPE: rrf
      APP_VECTORSTORE_DENSE_WEIGHT: '0.5'
      APP_VECTORSTORE_SPARSE_WEIGHT: '0.5'
      APP_VECTORSTORE_ENABLEGPUINDEX: 'True'
      APP_VECTORSTORE_ENABLEGPUSEARCH: 'True'
      APP_VECTORSTORE_USERNAME: ''
      APP_VECTORSTORE_PASSWORD: ''
      APP_VECTORSTORE_APIKEY_ID: ''
      APP_VECTORSTORE_APIKEY_SECRET: ''
      APP_VECTORSTORE_APIKEY: ''
      COLLECTION_NAME: multimodal_data
      MINIO_ENDPOINT: rag-minio:9000
      MINIO_ACCESSKEY: minioadmin
      MINIO_SECRETKEY: minioadmin
      APP_EMBEDDINGS_SERVERURL: nemotron-embedding-ms:8000/v1
      APP_EMBEDDINGS_MODELNAME: nvidia/llama-nemotron-embed-1b-v2
      APP_EMBEDDINGS_DIMENSIONS: '2048'
      APP_NVINGEST_MESSAGECLIENTHOSTNAME: rag-nv-ingest
      APP_NVINGEST_MESSAGECLIENTPORT: '7670'
      APP_NVINGEST_PDFEXTRACTMETHOD: None
      APP_NVINGEST_EXTRACTTABLESMETHOD: yolox
      APP_NVINGEST_EXTRACTTEXT: 'True'
      APP_NVINGEST_EXTRACTINFOGRAPHICS: 'False'
      APP_NVINGEST_EXTRACTTABLES: 'True'
      APP_NVINGEST_EXTRACTCHARTS: 'True'
      APP_NVINGEST_EXTRACTIMAGES: 'False'
      APP_NVINGEST_EXTRACTPAGEASIMAGE: 'False'
      APP_NVINGEST_STRUCTURED_ELEMENTS_MODALITY: ''
      APP_NVINGEST_IMAGE_ELEMENTS_MODALITY: ''
      APP_NVINGEST_TEXTDEPTH: page
      APP_NVINGEST_CAPTIONMODELNAME: nvidia/nemotron-nano-12b-v2-vl
      APP_NVINGEST_CAPTIONENDPOINTURL: ''
      APP_NVINGEST_SAVETODISK: 'False'
      NVINGEST_MINIO_BUCKET: nv-ingest
      APP_NVINGEST_ENABLE_PDF_SPLIT_PROCESSING: 'False'
      APP_NVINGEST_PAGES_PER_CHUNK: '16'
      SUMMARY_LLM: nvidia/llama-3.3-nemotron-super-49b-v1.5
      SUMMARY_LLM_SERVERURL: nim-llm:8000
      SUMMARY_LLM_MAX_CHUNK_LENGTH: '9000'
      SUMMARY_CHUNK_OVERLAP: '400'
      SUMMARY_LLM_TEMPERATURE: '0.0'
      SUMMARY_LLM_TOP_P: '1.0'
      SUMMARY_MAX_PARALLELIZATION: '20'
      ENABLE_CITATIONS: 'True'
      LOGLEVEL: INFO
      APP_NVINGEST_CHUNKSIZE: '512'
      APP_NVINGEST_CHUNKOVERLAP: '150'
      APP_NVINGEST_ENABLEPDFSPLITTER: 'True'
      APP_NVINGEST_SEGMENTAUDIO: 'False'
      REDIS_HOST: rag-redis-master
      REDIS_PORT: '6379'
      REDIS_DB: '0'
      ENABLE_REDIS_BACKEND: 'False'
      ENABLE_MINIO_BULK_UPLOAD: 'True'
      TEMP_DIR: /tmp-data
      INGESTOR_SERVER_DATA_DIR: /data/
      NV_INGEST_FILES_PER_BATCH: '16'
      NV_INGEST_CONCURRENT_BATCHES: '4'
      ENABLE_NV_INGEST_DYNAMIC_BATCHING: 'True'
      APP_TRACING_ENABLED: 'False'
      APP_TRACING_OTLPHTTPENDPOINT: http://otel-collector:4318/v1/traces
      APP_TRACING_OTLPGRPCENDPOINT: grpc://otel-collector:4317
    persistence:
      enabled: true
      existingClaim: ''
      storageClass: ''
      accessModes:
        - ReadWriteOnce
      size: 50Gi
      mountPath: /data/
      subPath: ''
  frontend:
    enabled: true
    appName: rag-frontend
    replicaCount: 1
    image:
      repository: nvcr.io/nvidia/blueprint/rag-frontend
      pullPolicy: IfNotPresent
      tag: 2.5.0
    imagePullSecret:
      name: ngc-secret
      registry: nvcr.io
      username: $oauthtoken
      password: ''
    service:
      type: NodePort
      port: 3000
    livenessProbe: {}
    readinessProbe: {}
    envVars:
      - name: VITE_API_CHAT_URL
        value: http://rag-server:8081/v1
      - name: VITE_API_VDB_URL
        value: http://ingestor-server:8082/v1
      - name: VITE_MILVUS_URL
        value: http://milvus:19530
  eck-elasticsearch:
    enabled: false
    http:
      tls:
        selfSignedCertificate:
          disabled: true
    nodeSets:
      - name: default
        count: 1
        config:
          node.store.allow_mmap: false
          xpack.security.enabled: false
          xpack.security.http.ssl.enabled: false
          xpack.security.transport.ssl.enabled: false
        podTemplate:
          spec:
            containers:
              - name: elasticsearch
                readinessProbe:
                  exec:
                    command:
                      - bash
                      - '-c'
                      - |
                        curl -s http://localhost:9200/_cluster/health | grep -q '"status":"green"\|"status":"yellow"'
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
  serviceMonitor:
    enabled: false
  opentelemetry-collector:
    enabled: false
    mode: deployment
    image:
      repository: docker.io/otel/opentelemetry-collector-contrib
      tag: 0.140.0
    command:
      name: otelcol-contrib
    config:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: ${env:MY_POD_IP}:4317
            http:
              cors:
                allowed_origins:
                  - '*'
      exporters:
        zipkin:
          endpoint: http://rag-zipkin:9411/api/v2/spans
        debug:
          verbosity: detailed
        prometheus:
          endpoint: ${env:MY_POD_IP}:8889
      extensions:
        health_check: {}
        zpages:
          endpoint: 0.0.0.0:55679
      processors:
        batch: {}
        tail_sampling:
          policies:
            - name: drop_noisy_traces_url
              type: string_attribute
              string_attribute:
                key: http.target
                values:
                  - \/health
                enabled_regex_matching: true
                invert_match: true
        transform:
          trace_statements:
            - context: span
              statements:
                - set(status.code, 1) where attributes["http.path"] == "/health"
                - >-
                  replace_match(attributes["http.route"], "/v1", attributes["http.target"]) where
                  attributes["http.target"] != nil
                - replace_pattern(name, "/v1", attributes["http.route"]) where attributes["http.route"] != nil
                - set(name, Concat([name, attributes["http.url"]], " ")) where name == "POST"
      service:
        extensions:
          - zpages
          - health_check
        pipelines:
          traces:
            receivers:
              - otlp
            exporters:
              - debug
              - zipkin
            processors:
              - tail_sampling
              - transform
          metrics:
            exporters:
              - debug
              - prometheus
            processors:
              - memory_limiter
              - batch
            receivers:
              - otlp
              - prometheus
          logs:
            receivers:
              - otlp
            exporters:
              - debug
            processors:
              - batch
    ports:
      metrics:
        enabled: true
        containerPort: 8889
        servicePort: 8889
        protocol: TCP
  zipkin:
    enabled: false
    image:
      repository: docker.io/openzipkin/zipkin
      tag: 3.5.0
  kube-prometheus-stack:
    enabled: false
    prometheus-node-exporter:
      service:
        port: 9100
        targetPort: 9100
      hostNetwork: false
    prometheus:
      serviceMonitor:
        interval: 1s
      prometheusSpec:
        scrapeInterval: 1s
        evaluationInterval: 1s
        additionalScrapeConfigs:
          - job_name: rag-app
            scrape_interval: 5s
            metrics_path: /metrics
            static_configs:
              - targets:
                  - rag-server:8081
    grafana:
      adminUser: admin
      adminPassword: admin
    prometheusOperator:
      crds:
        enabled: false
  nimOperator:
    draResources:
      enabled: false
      name: rag-claim
      type: TimeSlicing
    nim-llm:
      enabled: true
      replicas: 1
      service:
        name: nim-llm
      image:
        repository: nvcr.io/nim/nvidia/llama-3.3-nemotron-super-49b-v1.5
        pullPolicy: IfNotPresent
        tag: 1.14.0
      resources:
        limits:
          nvidia.com/gpu: 1
        requests:
          nvidia.com/gpu: 1
      nodeSelector: {}
      tolerations: []
      model:
        engine: tensorrt_llm
      storage:
        pvc:
          create: true
          size: 120Gi
          volumeAccessMode: ReadWriteOnce
          storageClass: ''
        sharedMemorySizeLimit: 16Gi
      env:
        - name: NIM_HTTP_API_PORT
          value: '8000'
        - name: NIM_TRITON_LOG_VERBOSE
          value: '1'
        - name: NIM_SERVED_MODEL_NAME
          value: nvidia/llama-3.3-nemotron-super-49b-v1.5
        - name: NIM_MAX_MODEL_LEN
          value: '131072'
      expose:
        service:
          name: http
          type: ClusterIP
          port: 8000
          grpcPort: 8001
      startupProbe:
        enabled: true
        probe:
          httpGet:
            path: /v1/health/ready
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 750
          timeoutSeconds: 5
    nvidia-nim-llama-32-nv-embedqa-1b-v2:
      enabled: true
      replicas: 1
      service:
        name: nemotron-embedding-ms
      image:
        repository: nvcr.io/nim/nvidia/llama-nemotron-embed-1b-v2
        tag: 1.13.0
        pullPolicy: IfNotPresent
      resources:
        limits:
          nvidia.com/gpu: 1
        requests:
          nvidia.com/gpu: 1
      storage:
        pvc:
          create: true
          size: 50Gi
          volumeAccessMode: ReadWriteOnce
          storageClass: ''
      nodeSelector: {}
      tolerations: []
      env:
        - name: NIM_HTTP_API_PORT
          value: '8000'
        - name: NIM_TRITON_LOG_VERBOSE
          value: '1'
        - name: OMP_NUM_THREADS
          value: '1'
        - name: NIM_TRITON_PERFORMANCE_MODE
          value: throughput
      expose:
        service:
          name: http
          type: ClusterIP
          port: 8000
          grpcPort: 8001
    nvidia-nim-llama-nemotron-embed-vl-1b-v2:
      enabled: false
      service:
        name: nemotron-vlm-embedding-ms
      image:
        repository: nvcr.io/nim/nvidia/llama-nemotron-embed-vl-1b-v2
        tag: 1.12.0
        pullPolicy: IfNotPresent
      replicas: 1
      resources:
        limits:
          nvidia.com/gpu: 1
        requests:
          nvidia.com/gpu: 1
      nodeSelector: {}
      tolerations: []
      storage:
        pvc:
          create: true
          size: 50Gi
          volumeAccessMode: ReadWriteOnce
          storageClass: ''
      env:
        - name: NIM_HTTP_API_PORT
          value: '8000'
        - name: NIM_TRITON_LOG_VERBOSE
          value: '1'
      expose:
        service:
          name: http
          type: ClusterIP
          port: 8000
          grpcPort: 8001
    nvidia-nim-llama-32-nv-rerankqa-1b-v2:
      enabled: true
      replicas: 1
      service:
        name: nemotron-ranking-ms
      image:
        repository: nvcr.io/nim/nvidia/llama-nemotron-rerank-1b-v2
        tag: 1.10.0
        pullPolicy: IfNotPresent
      resources:
        limits:
          nvidia.com/gpu: 1
        requests:
          nvidia.com/gpu: 1
      nodeSelector: {}
      tolerations: []
      storage:
        pvc:
          create: true
          size: 50Gi
          volumeAccessMode: ReadWriteOnce
          storageClass: ''
      env: []
      expose:
        service:
          name: http
          type: ClusterIP
          port: 8000
          grpcPort: 8001
    nim-vlm:
      enabled: false
      replicas: 1
      service:
        name: nim-vlm
      image:
        repository: nvcr.io/nim/nvidia/nemotron-nano-12b-v2-vl
        tag: 1.5.0
        pullPolicy: IfNotPresent
      resources:
        limits:
          nvidia.com/gpu: 1
        requests:
          nvidia.com/gpu: 1
      nodeSelector: {}
      tolerations: []
      storage:
        pvc:
          create: true
          size: 50Gi
          volumeAccessMode: ReadWriteOnce
          storageClass: ''
      env: []
      expose:
        service:
          name: http
          type: ClusterIP
          port: 8000
          grpcPort: 8001
  nv-ingest:
    enabled: true
    imagePullSecrets:
      - name: ngc-secret
    ngcApiSecret:
      create: false
    ngcImagePullSecret:
      create: false
    image:
      repository: nvcr.io/nvidia/nemo-microservices/nv-ingest
      tag: 26.1.2
