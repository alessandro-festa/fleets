kind: RecipeResult
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
    version: 1.0.1
criteria:
    service: self-managed
    accelerator: h100
    intent: inference
    os: rhel
    platform: dynamo
componentRefs:
    - name: argo-workflows
      namespace: build-your-own
      chart: argo-workflows
      type: Helm
      source: oci://dp.apps.rancher.io/charts/argo-workflows
      version: '*'
    - name: nemo-guardrails
      namespace: build-your-own
      chart: nemo-guardrails
      type: Helm
      source: https://helm.ngc.nvidia.com/nvidia/nemo-microservices/charts/nemo-guardrails-25.6.0.tgz
      version: 25.6.0
deploymentOrder:
    - argo-workflows
    - nemo-guardrails
