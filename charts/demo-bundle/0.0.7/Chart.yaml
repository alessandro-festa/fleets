apiVersion: v2
name: demo-bundle
description: AI Stack generated by SUSE AI Factory
type: application
version: 0.0.7
appVersion: "1.0"
keywords:
  - ai
  - ml
  - llm
  - suse-ai-factory

dependencies:
  - name: "argo-workflows"
    version: "*"
    repository: "oci://dp.apps.rancher.io/charts/argo-workflows"
    condition: "argo-workflows.enabled"
  - name: "vllm"
    version: "*"
    repository: "oci://dp.apps.rancher.io/charts/vllm"
    condition: "vllm.enabled"
  - name: "opentelemetry-collector"
    version: "*"
    repository: "oci://dp.apps.rancher.io/charts/opentelemetry-collector"
    condition: "opentelemetry-collector.enabled"
  - name: "litellm"
    version: "*"
    repository: "oci://stgregistry.suse.com/ai/charts/litellm"
    condition: "litellm.enabled"

