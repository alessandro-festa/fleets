apiVersion: v2
name: my-stack-demo
description: AI Stack generated by SUSE AI Factory
type: application
version: 0.0.2
appVersion: "1.0"
keywords:
  - ai
  - ml
  - llm
  - suse-ai-factory

dependencies:
  - name: "apache-airflow"
    version: "*"
    repository: "oci://dp.apps.rancher.io/charts/apache-airflow"
    condition: "apache-airflow.enabled"
  - name: "vllm"
    version: "*"
    repository: "oci://dp.apps.rancher.io/charts/vllm"
    condition: "vllm.enabled"
  - name: "open-webui"
    version: "*"
    repository: "oci://dp.apps.rancher.io/charts/open-webui"
    condition: "open-webui.enabled"
  - name: "opentelemetry-collector"
    version: "*"
    repository: "oci://dp.apps.rancher.io/charts/opentelemetry-collector"
    condition: "opentelemetry-collector.enabled"

