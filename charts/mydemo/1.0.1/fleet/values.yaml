global:
  imagePullSecrets:
    - application-collection
    - ngc-registry-secret
  namespace: ''
nemo-guardrails:
  enabled: true
  replicaCount: 1
  image:
    repository: nvcr.io/nvidia/nemo-microservices/guardrails
    tag: ''
    pullPolicy: IfNotPresent
  imagePullSecrets:
    - name: nvcrimagepullsecret
  nameOverride: ''
  fullnameOverride: ''
  guardrails:
    nvcfAPIKeySecretName: ''
  env:
    NIM_ENDPOINT_URL: https://integrate.api.nvidia.com/v1
    CONFIG_STORE_PATH: /app/services/guardrails/config-store
    DEFAULT_CONFIG_ID: default
    DEFAULT_LLM_PROVIDER: nim
    NEMO_GUARDRAILS_SERVER_ENABLE_CORS: 'False'
    NEMO_GUARDRAILS_SERVER_ALLOWED_ORIGINS: '*'
    GUARDRAILS_HOST: 0.0.0.0
    GUARDRAILS_PORT: '7331'
    DEMO: 'False'
  service:
    type: ClusterIP
    port: 7331
  configStore:
    nfs:
      enabled: false
      path: /path/to/nfs/share
      server: nfs-server.example.com
      mountPath: /config-store
      storageClass: standard
  readinessProbe:
    httpGet:
      path: /v1/health
      port: 7331
    initialDelaySeconds: 5
    timeoutSeconds: 30
  livenessProbe:
    httpGet:
      path: /v1/health
      port: 7331
    initialDelaySeconds: 5
    timeoutSeconds: 30
  serviceAccount:
    create: true
    automount: true
    annotations: {}
    name: ''
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  runAsGroup: ''
  fsGroup: ''
  securityContext: {}
  ingress:
    enabled: false
    className: ''
    annotations: {}
    hosts: {}
    tls: []
  resources: {}
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
  nodeSelector: {}
  tolerations: []
  affinity: {}
nim-google/gemma-3-1b-it:
  enabled: true
  affinity: {}
  containerSecurityContext: {}
  customCommand: []
  customArgs: []
  env: []
  extraVolumes: {}
  extraVolumeMounts: {}
  image:
    repository: nvcr.io/nim/google/gemma-3-1b-it
    pullPolicy: IfNotPresent
    tag: latest
  imagePullSecrets:
    - name: ngc-secret
  initContainers:
    extraInit: []
  nodeSelector: {}
  podAnnotations: {}
  podSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
  proxyCA:
    enabled: false
    secretName: ''
    keyName: ''
  replicaCount: 1
  resources:
    limits:
      nvidia.com/gpu: 1
  serviceAccount:
    create: false
    annotations: {}
    name: ''
  statefulSet:
    enabled: true
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    metrics: []
  ingress:
    enabled: false
    className: ''
    annotations: {}
    hosts:
      - host: chart-example.local
        paths:
          - path: /
            pathType: ImplementationSpecific
            serviceType: openai
    tls: []
  livenessProbe:
    enabled: true
    method: http
    command:
      - myscript.sh
    path: /v1/health/live
    initialDelaySeconds: 15
    timeoutSeconds: 1
    periodSeconds: 10
    successThreshold: 1
    failureThreshold: 3
  readinessProbe:
    enabled: true
    path: /v1/health/ready
    initialDelaySeconds: 15
    timeoutSeconds: 1
    periodSeconds: 10
    successThreshold: 1
    failureThreshold: 3
  startupProbe:
    enabled: true
    path: /v1/health/ready
    initialDelaySeconds: 40
    timeoutSeconds: 1
    periodSeconds: 10
    successThreshold: 1
    failureThreshold: 180
  metrics:
    serviceMonitor:
      enabled: false
      additionalLabels: {}
  model:
    nimCache: /model-store
    name: meta/llama3-8b-instruct
    ngcAPISecret: ngc-api
    ngcAPIKey: ''
    hfTokenSecret: ''
    openaiPort: 8000
    labels: {}
    jsonLogging: true
    logLevel: INFO
  persistence:
    enabled: false
    existingClaim: ''
    storageClass: ''
    accessMode: ReadWriteOnce
    stsPersistentVolumeClaimRetentionPolicy:
      whenDeleted: Retain
      whenScaled: Retain
    size: 50Gi
    annotations: {}
  hostPath:
    enabled: false
    path: /model-store
  nfs:
    enabled: false
    server: nfs-server.example.com
    path: /exports
    readOnly: false
  service:
    type: ClusterIP
    openaiPort: 8000
    annotations: {}
    labels: {}
    name: ''
  multiNode:
    clusterStartTimeout: 300
    enabled: false
    workers: 1
    workerCustomCommand: []
    leaderWorkerSet:
      enabled: true
    existingSSHSecret: ''
    mpiJob:
      workerAnnotations: {}
      launcherResources: {}
    gpusPerNode: 1
    optimized:
      enabled: true
