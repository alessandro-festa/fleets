apiVersion: v2
name: searchqna
description: AI Stack generated by SUSE AI Factory
type: application
version: 1
appVersion: "1.0"
keywords:
  - ai
  - ml
  - llm
  - suse-ai-factory

dependencies:
  - name: "searchqna"
    version: "0-latest"
    repository: "oci://https://github.com/opea-project/GenAIInfra/helm-charts/searchqna"
    condition: "searchqna.enabled"
  - name: "tei"
    version: "0-latest"
    repository: ""file://../common/tei""
    condition: "tei.enabled"
  - name: "embedding-usvc"
    version: "0-latest"
    repository: ""file://../common/embedding-usvc""
    condition: "embedding-usvc.enabled"
  - name: "web-retriever"
    version: "0-latest"
    repository: ""file://../common/web-retriever""
    condition: "web-retriever.enabled"
  - name: "teirerank"
    version: "0-latest"
    repository: ""file://../common/teirerank""
    condition: "teirerank.enabled"
  - name: "reranking-usvc"
    version: "0-latest"
    repository: ""file://../common/reranking-usvc""
    condition: "reranking-usvc.enabled"
  - name: "tgi"
    version: "0-latest"
    repository: ""file://../common/tgi""
    condition: "tgi.enabled"
  - name: "llm-uservice"
    version: "0-latest"
    repository: ""file://../common/llm-uservice""
    condition: "llm-uservice.enabled"
  - name: "ui"
    version: "0-latest"
    repository: ""file://../common/ui""
    condition: "ui.enabled"
  - name: "nginx"
    version: "0-latest"
    repository: ""file://../common/nginx""
    condition: "nginx.enabled"

