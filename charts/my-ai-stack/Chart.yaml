apiVersion: v2
name: my-ai-stack
description: AI Stack generated by SUSE AI Factory
type: application
version: 0.1.0
appVersion: "1.0"
keywords:
  - ai
  - ml
  - llm
  - suse-ai-factory

dependencies:
  - name: opensearch
    version: latest
    repository: oci://dp.apps.rancher.io/charts/opensearch
    condition: opensearch.enabled
  - name: nemo-datastore
    version: 25.6.0
    repository: oci://dp.apps.rancher.io/charts/nemo-datastore
    condition: nemo-datastore.enabled
  - name: nim-nvidia/nemotron-mini-4b-instruct
    version: 1.15.5
    repository: https://helm.ngc.nvidia.com/nim/charts/nim-llm-1.15.5.tgz
    condition: nim-nvidia/nemotron-mini-4b-instruct.enabled
  - name: nim-nvidia/nv-embedqa-e5-v5
    version: 1.15.5
    repository: https://helm.ngc.nvidia.com/nim/charts/nim-llm-1.15.5.tgz
    condition: nim-nvidia/nv-embedqa-e5-v5.enabled
  - name: opentelemetry-collector
    version: latest
    repository: oci://dp.apps.rancher.io/charts/opentelemetry-collector
    condition: opentelemetry-collector.enabled

