global:
  imagePullSecrets:
    - application-collection
  namespace: ''
suse-ai-minimal:
  enabled: true
  global:
    imagePullSecrets:
      - application-collection
  ollama:
    enabled: true
    ollama:
      models:
        pull:
          - gemma:2b
        run:
          - gemma:2b
    persistentVolume:
      enabled: true
      storageClass: local-path
  open-webui-mcpo:
    enabled: true
    config:
      mcpServers:
        memory:
          command: npx
          args:
            - '-y'
            - '@modelcontextprotocol/server-memory'
  open-webui:
    enabled: true
    ollamaUrls:
      - http://suse-gen-ai-ollama.suse-private-ai.svc.cluster.local:11434
    persistence:
      enabled: true
      size: 20Gi
      storageClass: local-path
    ollama:
      enabled: false
    pipelines:
      enabled: false
      extraEnvVars: []
    ingress:
      host: suse-ollama-webui
    extraEnvVars:
      - name: DEFAULT_MODELS
        value: gemma:2b
      - name: DEFAULT_USER_ROLE
        value: user
      - name: ENABLE_SIGNUP
        value: 'true'
      - name: GLOBAL_LOG_LEVEL
        value: INFO
      - name: RAG_EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - name: VECTOR_DB
        value: milvus
      - name: MILVUS_URI
        value: http://suse-gen-ai-milvus.suse-private-ai.svc.cluster.local:19530
      - name: INSTALL_NLTK_DATASETS
        value: 'true'
  milvus:
    enabled: true
    cluster:
      enabled: false
    standalone:
      persistence:
        persistentVolumeClaim:
          storageClass: local-path
    etcd:
      replicaCount: 1
      persistence:
        storageClassName: local-path
    minio:
      mode: standalone
      rootUser: admin
      rootPassword: adminminio
      persistence:
        storageClass: local-path
        size: 5Gi
      resources:
        requests:
          memory: 1024Mi
    kafka:
      enabled: false
  pytorch:
    enabled: false
  vllm:
    enabled: false
milvus:
  enabled: true
ollama:
  enabled: true
open-webui:
  enabled: true
pytorch:
  enabled: true
vllm:
  enabled: true
open-webui-mcpo:
  enabled: true
