apiVersion: v2
name: clearml
description: AI Stack generated by SUSE AI Factory
type: application
version: 7.14.9
appVersion: "1.0"
keywords:
  - ai
  - ml
  - llm
  - suse-ai-factory

dependencies:
  - name: "redis"
    version: "*"
    repository: "oci://dp.apps.rancher.io/charts/redis"
    condition: "redis.enabled"
  - name: "argo-workflows"
    version: "*"
    repository: "oci://dp.apps.rancher.io/charts/argo-workflows"
    condition: "argo-workflows.enabled"
  - name: "ollama"
    version: "*"
    repository: "oci://dp.apps.rancher.io/charts/ollama"
    condition: "ollama.enabled"
  - name: "elasticsearch"
    version: "*"
    repository: "oci://dp.apps.rancher.io/charts/elasticsearch"
    condition: "elasticsearch.enabled"
  - name: "clearml"
    version: "7.14.7"
    repository: "git+https://github.com/clearml/clearml-helm-charts//charts/clearml"
    condition: "clearml.enabled"
  - name: "mongodb"
    version: "0-latest"
    repository: "git+https://github.com/opea-project/GenAIInfra//helm-charts/common/mongodb"
    condition: "mongodb.enabled"

