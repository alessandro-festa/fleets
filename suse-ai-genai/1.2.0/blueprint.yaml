apiVersion: suse.ai/v1alpha1
kind: Blueprint
metadata:
  name: "suse-ai-genai"
  labels:
    catalog.suse.ai/support: "opensource"
    catalog.suse.ai/tier: "certified"
    catalog.suse.ai/certified: "false"
    catalog.suse.ai/status: "new"
  mantainer: "alessandro.festa1@suse.com"
  source: "https://github.com/alessandro-festa/fleets"
spec:
  displayName: "suse-ai-genai"
  description: "A Meta Helm chart for deploying SUSE AI components"
  category: "Inference"
  source:
    git:
      url: "https://github.com/alessandro-festa/fleets"
      ref: "main"
      path: "suse-ai-genai/1.2.0/chart"
  modules:
    - moduleRef: "milvus"
      displayName: "Milvus"
      description: "Milvus is a high-performance vector database built for scale. It is used by AI applications to organize and search through large amount of unstructured data, such as text, images, and multi-modal information."
      category: "dataIngestion"
      support: "SUSE"
      source:
        helm:
          url: "oci://dp.apps.rancher.io/charts/milvus"
          ref: ">0.0.0-0"
          path: ""
      targetNamespace: "suse-ai-genai"
      dependsOn:
        - "milvus"
        - "ollama"
        - "open-webui"
        - "pytorch"
        - "vllm"
        - "open-webui-mcpo"
    - moduleRef: "ollama"
      displayName: "Ollama"
      description: "Get up and running with Llama 3.2, Mistral, Gemma 2, and other large language models."
      category: "inference"
      support: "SUSE"
      source:
        helm:
          url: "oci://dp.apps.rancher.io/charts/ollama"
          ref: ">0.0.0-0"
          path: ""
      targetNamespace: "suse-ai-genai"
      dependsOn:
        - "milvus"
        - "ollama"
        - "open-webui"
        - "pytorch"
        - "vllm"
        - "open-webui-mcpo"