# Aggregated values.yaml

# Aggregated Stack Configuration


# =============================================================================
# --- Custom Container: vlm-live ---
# =============================================================================
vlm-live:
  deployment:
    replicaCount: 1
    resources:
      limits:
        cpu: 1000m
        memory: 2Gi
      requests:
        cpu: 500m
        memory: 1Gi
  image:
    repository: ghcr.io/nvidia-ai-iot/live-vlm-webui
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
    targetPort: 80