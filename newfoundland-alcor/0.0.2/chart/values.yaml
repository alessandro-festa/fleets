# Aggregated values.yaml

# Aggregated Stack Configuration


# =============================================================================
# --- OpenSearch ---
# =============================================================================
opensearch:
  Pulled: dp.apps.rancher.io/charts/opensearch:3.4.0
  Digest: sha256:fda65eab590d75d1c754a0595b513ddd3cacdd31a99e232d45e6759ed278b771

  clusterName: "opensearch-cluster"
  nodeGroup: "master"
  # If discovery.type in the opensearch configuration is set to "single-node",
  # this should be set to "true"
  # If "true", replicas will be forced to 1
  singleNode: false
  # The service that non master groups will try to connect to when joining the cluster
  # This should be set to clusterName + "-" + nodeGroup for your master group
  masterService: "opensearch-cluster-master"
  # OpenSearch roles that will be applied to this nodeGroup
  # These will be set as environment variable "node.roles". E.g. node.roles=master,ingest,data,remote_cluster_client
  roles:
    - master
    - ingest
    - data
    - remote_cluster_client
  replicas: 3
  # if not set, falls back to parsing .Values.imageTag, then .Chart.appVersion.
  majorVersion: ""
  global:
    # Set if you want to change the default docker registry, e.g. a private one.
    dockerRegistry: ""
    # -- Global override for container image registry
    imageRegistry: ""
    # -- Global override for container image registry pull secrets
    imagePullSecrets: []
  # Allows you to add any config files in {{ .Values.opensearchHome }}/config
  opensearchHome: /usr/share/opensearch
  # such as opensearch.yml and log4j2.properties
  config:
    # Values must be YAML literal style scalar / YAML multiline string.
    # <filename>: |
    #   <formatted-value(s)>
    # log4j2.properties: |
    #   status = error
    #
    #   appender.console.type = Console
    #   appender.console.name = console
    #   appender.console.layout.type = PatternLayout
    #   appender.console.layout.pattern = [%d{ISO8601}][%-5p][%-25c{1.}] [%node_name]%marker %m%n
    #
    #   rootLogger.level = info
    #   rootLogger.appenderRef.console.ref = console
    opensearch.yml: |
      cluster.name: opensearch-cluster

      # Bind to all interfaces because we don't know what IP address Docker will assign to us.
      network.host: 0.0.0.0

      # Setting network.host to a non-loopback address enables the annoying bootstrap checks. "Single-node" mode disables them again.
      # Implicitly done if ".singleNode" is set to "true".
      # discovery.type: single-node

      # Start OpenSearch Security Demo Configuration
      # WARNING: revise all the lines below before you go into production
      # plugins:
      #   security:
      #     ssl:
      #       transport:
      #         pemcert_filepath: esnode.pem
      #         pemkey_filepath: esnode-key.pem
      #         pemtrustedcas_filepath: root-ca.pem
      #         enforce_hostname_verification: false
      #       http:
      #         enabled: true
      #         pemcert_filepath: esnode.pem
      #         pemkey_filepath: esnode-key.pem
      #         pemtrustedcas_filepath: root-ca.pem
      #     allow_unsafe_democertificates: true
      #     allow_default_init_securityindex: true
      #     authcz:
      #       admin_dn:
      #         - CN=kirk,OU=client,O=client,L=test,C=de
      #     audit.type: internal_opensearch
      #     enable_snapshot_restore_privilege: true
      #     check_snapshot_restore_write_privileges: true
      #     restapi:
      #       roles_enabled: ["all_access", "security_rest_api_access"]
      #     system_indices:
      #       enabled: true
      #       indices:
      #         [
      #           ".opendistro-alerting-config",
      #           ".opendistro-alerting-alert*",
      #           ".opendistro-anomaly-results*",
      #           ".opendistro-anomaly-detector*",
      #           ".opendistro-anomaly-checkpoints",
      #           ".opendistro-anomaly-detection-state",
      #           ".opendistro-reports-*",
      #           ".opendistro-notifications-*",
      #           ".opendistro-notebooks",
      #           ".opendistro-asynchronous-search-response*",
      #         ]
      ######## End OpenSearch Security Demo Configuration ########
    # log4j2.properties:
  # Extra environment variables to append to this nodeGroup
  # This will be appended to the current 'env:' key. You can use any of the kubernetes env
  # syntax here
  extraEnvs: []
  #  - name: MY_ENVIRONMENT_VAR
  #    value: the_value_goes_here
  # Chart version 2.18.0 and App Version OpenSearch 2.12.0 onwards a custom strong password needs to be provided in order to setup demo admin user.
  # Cluster will not spin-up without this unless demo config install is disabled.
  #  - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
  #    value: <strong-password>

  # Allows you to load environment variables from kubernetes secret or config map
  envFrom: []
  # - secretRef:
  #     name: env-secret
  # - configMapRef:
  #     name: config-map

  # A list of secrets and their paths to mount inside the pod
  # This is useful for mounting certificates for security and for mounting
  # the X-Pack license
  secretMounts: []
  hostAliases: []
  # - ip: "127.0.0.1"
  #   hostnames:
  #   - "foo.local"
  #   - "bar.local"

  image:
    repository: "containers/opensearch"
    # override image tag, which is .Chart.AppVersion by default
    tag: "3.4.0-4.32"
    pullPolicy: "IfNotPresent"
    registry: dp.apps.rancher.io
  podAnnotations: {}
  # iam.amazonaws.com/role: es-cluster

  # OpenSearch Statefulset annotations
  openSearchAnnotations: {}
  # additionals labels
  labels: {}
  opensearchJavaOpts: "-Xmx512M -Xms512M"
  resources:
    requests:
      cpu: "1000m"
      memory: "100Mi"
  initResources: {}
  #  limits:
  #     cpu: "25m"
  #     memory: "128Mi"
  #  requests:
  #     cpu: "25m"
  #     memory: "128Mi"

  sidecarResources: {}
  #   limits:
  #     cpu: "25m"
  #     memory: "128Mi"
  #   requests:
  #     cpu: "25m"
  #     memory: "128Mi"

  networkHost: "0.0.0.0"
  rbac:
    create: false
    serviceAccountAnnotations: {}
    serviceAccountName: ""
    # Controls whether or not the Service Account token is automatically mounted to /var/run/secrets/kubernetes.io/serviceaccount
    automountServiceAccountToken: false
  podSecurityPolicy:
    create: false
    name: ""
    spec:
      privileged: true
      fsGroup:
        rule: RunAsAny
      runAsUser:
        rule: RunAsAny
      seLinux:
        rule: RunAsAny
      supplementalGroups:
        rule: RunAsAny
      volumes:
        - secret
        - configMap
        - persistentVolumeClaim
        - emptyDir
  persistence:
    enabled: true
    # Set to false to disable the `fsgroup-volume` initContainer that will update permissions on the persistent disk.
    enableInitChown: true
    # override image, which is busybox by default
    # image: busybox
    # override image tag, which is latest by default
    # imageTag:
    labels:
      # Add default labels for the volumeClaimTemplate of the StatefulSet
      enabled: false
      # Add custom labels for the volumeClaimTemplate of the StatefulSet
      additionalLabels: {}
    # OpenSearch Persistent Volume Storage Class
    # If defined, storageClassName: <storageClass>
    # If set to "-", storageClassName: "", which disables dynamic provisioning
    # If undefined (the default) or set to null, no storageClassName spec is
    #   set, choosing the default provisioner.  (gp2 on AWS, standard on
    #   GKE, AWS & OpenStack)
    #
    # storageClass: "-"
    accessModes:
      - ReadWriteOnce
    size: 8Gi
    annotations: {}
    image:
      registry: dp.apps.rancher.io
      repository: containers/bci-busybox
      tag: "15.7-17.1"
  extraVolumes: []
  # - name: extras
  #   emptyDir: {}

  extraVolumeMounts: []
  # - name: extras
  #   mountPath: /usr/share/extras
  #   readOnly: true

  extraContainers: []
  # - name: do-something
  #   image: busybox
  #   command: ['do', 'something']

  extraInitContainers: []
  # - name: do-somethings
  #   image: busybox
  #   command: ['do', 'something']

  # This is the PriorityClass settings as defined in
  # https://kubernetes.io/docs/concepts/configuration/pod-priority-preemption/#priorityclass
  priorityClassName: ""
  # By default this will make sure two pods don't end up on the same node
  # Changing this to a region would allow you to spread pods across regions
  antiAffinityTopologyKey: "kubernetes.io/hostname"
  # Hard means that by default pods will only be scheduled if there are enough nodes for them
  # and that they will never end up on the same node. Setting this to soft will do this "best effort".
  # Setting this to custom will use what is passed into customAntiAffinity.
  antiAffinity: "soft"
  # Allows passing in custom anti-affinity settings as defined in
  # https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#types-of-inter-pod-affinity-and-anti-affinity
  # Using this parameter requires setting antiAffinity to custom.
  customAntiAffinity: {}
  # This is the node affinity settings as defined in
  # https://kubernetes.io/docs/concepts/configuration/assign-pod-node/#node-affinity-beta-feature
  nodeAffinity: {}
  # This is the pod affinity settings as defined in
  # https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#types-of-inter-pod-affinity-and-anti-affinity
  podAffinity: {}
  # This is the pod topology spread constraints
  # https://kubernetes.io/docs/concepts/workloads/pods/pod-topology-spread-constraints/
  topologySpreadConstraints: []
  # The default is to deploy all pods serially. By setting this to parallel all pods are started at
  # the same time when bootstrapping the cluster
  podManagementPolicy: "Parallel"
  # The environment variables injected by service links are not used, but can lead to slow OpenSearch boot times when
  # there are many services in the current namespace.
  # If you experience slow pod startups you probably want to set this to `false`.
  enableServiceLinks: true
  protocol: https
  httpPort: 9200
  transportPort: 9300
  metricsPort: 9600
  httpHostPort: ""
  transportHostPort: ""
  service:
    labels: {}
    labelsHeadless: {}
    headless:
      annotations: {}
    type: ClusterIP
    # The IP family and IP families options are to set the behaviour in a dual-stack environment
    # Omitting these values will let the service fall back to whatever the CNI dictates the defaults
    # should be
    #
    # ipFamilyPolicy: SingleStack
    # ipFamilies:
    # - IPv4
    nodePort: ""
    annotations: {}
    httpPortName: http
    transportPortName: transport
    metricsPortName: metrics
    loadBalancerIP: ""
    loadBalancerSourceRanges: []
    externalTrafficPolicy: ""
  updateStrategy: RollingUpdate
  # This is the max unavailable setting for the pod disruption budget
  # The default value of 1 will make sure that kubernetes won't allow more than 1
  # of your pods to be unavailable during maintenance
  maxUnavailable: 1
  podSecurityContext:
    fsGroup: 1000
    runAsUser: 1000
  securityContext:
    capabilities:
      drop:
        - ALL
    # readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
  securityConfig:
    enabled: true
    path: "/usr/share/opensearch/config/opensearch-security"
    actionGroupsSecret:
    configSecret:
    internalUsersSecret:
    rolesSecret:
    rolesMappingSecret:
    tenantsSecret:
    # The following option simplifies securityConfig by using a single secret and
    # specifying the config files as keys in the secret instead of creating
    # different secrets for for each config file.
    # Note that this is an alternative to the individual secret configuration
    # above and shouldn't be used if the above secrets are used.
    config:
      # There are multiple ways to define the configuration here:
      # * If you define anything under data, the chart will automatically create
      #   a secret and mount it. This is best option to choose if you want to override all the
      #   existing yml files at once.
      # * If you define securityConfigSecret, the chart will assume this secret is
      #   created externally and mount it. This is best option to choose if your intention is to
      #   only update a single yml file.
      # * It is an error to define both data and securityConfigSecret.
      securityConfigSecret: ""
      dataComplete: true
      data: {}
      # config.yml: |-
      # internal_users.yml: |-
      # roles.yml: |-
      # roles_mapping.yml: |-
      # action_groups.yml: |-
      # tenants.yml: |-
  # How long to wait for opensearch to stop gracefully
  terminationGracePeriod: 120
  sysctlVmMaxMapCount: 262144
  startupProbe:
    tcpSocket:
      port: 9200
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 30
  livenessProbe: {}
  # periodSeconds: 20
  # timeoutSeconds: 5
  # failureThreshold: 10
  # successThreshold: 1
  # initialDelaySeconds: 10
  # tcpSocket:
  #   port: 9200

  readinessProbe:
    tcpSocket:
      port: 9200
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  ## Use an alternate scheduler.
  ## ref: https://kubernetes.io/docs/tasks/administer-cluster/configure-multiple-schedulers/
  ##
  schedulerName: ""
  imagePullSecrets: []
  nodeSelector: {}
  tolerations: []
  # Enabling this will publically expose your OpenSearch instance.
  # Only enable this if you have security enabled on your cluster
  ingress:
    enabled: false
    # For Kubernetes >= 1.18 you should specify the ingress-controller via the field ingressClassName
    # See https://kubernetes.io/blog/2020/04/02/improvements-to-the-ingress-api-in-kubernetes-1.18/#specifying-the-class-of-an-ingress
    # ingressClassName: nginx

    annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
    ingressLabels: {}
    path: /
    hosts:
      - chart-example.local
    tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local
  nameOverride: ""
  fullnameOverride: ""
  masterTerminationFix: false
  opensearchLifecycle: {}
  # preStop:
  #   exec:
  #     command: ["/bin/sh", "-c", "echo Hello from the preStart handler > /usr/share/message"]
  # postStart:
  #   exec:
  #     command: ["/bin/sh", "-c", "echo Hello from the postStart handler > /usr/share/message"]

  lifecycle: {}
  # preStop:
  #   exec:
  #     command: ["/bin/sh", "-c", "echo Hello from the postStart handler > /usr/share/message"]
  # postStart:
  #   exec:
  #     command:
  #       - bash
  #       - -c
  #       - |
  #         #!/bin/bash
  #         # Add a template to adjust number of shards/replicas1
  #         TEMPLATE_NAME=my_template
  #         INDEX_PATTERN="logstash-*"
  #         SHARD_COUNT=8
  #         REPLICA_COUNT=1
  #         ES_URL=http://localhost:9200
  #         while [[ "$(curl -s -o /dev/null -w '%{http_code}\n' $ES_URL)" != "200" ]]; do sleep 1; done
  #         curl -XPUT "$ES_URL/_template/$TEMPLATE_NAME" -H 'Content-Type: application/json' -d'{"index_patterns":['\""$INDEX_PATTERN"\"'],"settings":{"number_of_shards":'$SHARD_COUNT',"number_of_replicas":'$REPLICA_COUNT'}}'

  keystore: []
  # To add secrets to the keystore:
  #  - secretName: opensearch-encryption-key

  networkPolicy:
    create: false
    ## Enable creation of NetworkPolicy resources. Only Ingress traffic is filtered for now.
    ## In order for a Pod to access OpenSearch, it needs to have the following label:
    ## {{ template "uname" . }}-client: "true"
    ## Example for default configuration to access HTTP port:
    ## opensearch-master-http-client: "true"
    ## Example for default configuration to access transport port:
    ## opensearch-master-transport-client: "true"

    http:
      enabled: false
  # Deprecated
  # please use the above podSecurityContext.fsGroup instead
  fsGroup: ""
  ## Set optimal sysctl's through securityContext. This requires privilege. Can be disabled if
  ## the system has already been preconfigured. (Ex: https://www.elastic.co/guide/en/elasticsearch/reference/current/vm-max-map-count.html)
  ## Also see: https://kubernetes.io/docs/tasks/administer-cluster/sysctl-cluster/
  sysctl:
    enabled: false
  ## Set optimal sysctl's through privileged initContainer.
  sysctlInit:
    enabled: false
    # override image, which is busybox by default
    # image: busybox
    # override image tag, which is latest by default
    # imageTag:

    image:
      registry: dp.apps.rancher.io
      repository: containers/bci-busybox
      tag: "15.7-17.1"
  ## Enable to add 3rd Party / Custom plugins not offered in the default OpenSearch image.
  plugins:
    enabled: false
    installList: []
    # - example-fake-plugin
    removeList: []
    # - example-fake-plugin
  # -- Array of extra K8s manifests to deploy
  extraObjects: []
  # - apiVersion: secrets-store.csi.x-k8s.io/v1
  #   kind: SecretProviderClass
  #   metadata:
  #     name: argocd-secrets-store
  #   spec:
  #     provider: aws
  #     parameters:
  #       objects: |
  #         - objectName: "argocd"
  #           objectType: "secretsmanager"
  #           jmesPath:
  #               - path: "client_id"
  #                 objectAlias: "client_id"
  #               - path: "client_secret"
  #                 objectAlias: "client_secret"
  #     secretObjects:
  #     - data:
  #       - key: client_id
  #         objectName: client_id
  #       - key: client_secret
  #         objectName: client_secret
  #       secretName: argocd-secrets-store
  #       type: Opaque
  #       labels:
  #         app.kubernetes.io/part-of: argocd
  # - |
  #    apiVersion: policy/v1
  #    kind: PodDisruptionBudget
  #    metadata:
  #      name: {{ template "opensearch.uname" . }}
  #      labels:
  #        {{- include "opensearch.labels" . | nindent 4 }}
  #    spec:
  #      minAvailable: 1
  #      selector:
  #        matchLabels:
  #          {{- include "opensearch.selectorLabels" . | nindent 6 }}

  # ServiceMonitor Configuration for Prometheus
  # Enabling this option will create a ServiceMonitor resource that allows Prometheus to scrape metrics from the OpenSearch service.
  # This only creates the serviceMonitor, to actually have metrics Make sure to install the prometheus-exporter plugin needed for
  # serving metrics over the `.Values.plugins` value:
  # plugins:
  #   enabled: true
  #   installList:
  #     - https://github.com/aiven/prometheus-exporter-plugin-for-opensearch/releases/download/x.x.x.x/prometheus-exporter-x.x.x.x.zip
  serviceMonitor:
    # Set to true to enable the ServiceMonitor resource
    enabled: false
    # HTTP path where metrics are exposed.
    # Ensure this matches your OpenSearch service configuration.
    path: /_prometheus/metrics
    # Scheme to use for scraping.
    scheme: http
    # Frequency at which Prometheus will scrape metrics.
    # Adjust based on your needs.
    interval: 10s
    # additional labels to be added to the ServiceMonitor
    # labels:
    #  k8s.example.com/prometheus: kube-prometheus
    labels: {}
    # additional tlsConfig to be added to the ServiceMonitor
    tlsConfig: {}
    # Basic Auth configuration for the service monitor
    # You can either use existingSecret, which expects a secret to be already present with data.username and data.password
    # or set the credentials over the helm values, making helm create a secret for you
    # basicAuth:
    #   enaled: true
    #   existingSecret: my-secret
    #   username:  my-username
    #   password: my-password
    basicAuth:
      enabled: false


# =============================================================================
# --- Ollama ---
# =============================================================================
ollama:
  Pulled: dp.apps.rancher.io/charts/ollama:1.38.0
  Digest: sha256:ed7798235e76c641cdf2654dde59206914a75ecc693a5b145183ed2adb1d8d0c
  global:
    # -- Global override for container image registry
    imageRegistry: ""
    # -- Global override for container image registry pull secrets
    imagePullSecrets: []
  # Default values for ollama-helm.
  # This is a YAML-formatted file.
  # Declare variables to be passed into your templates.

  # -- Number of replicas
  replicaCount: 1
  # Knative configuration
  knative:
    # -- Enable Knative integration
    enabled: false
    # -- Knative service container concurrency
    containerConcurrency: 0
    # -- Knative service timeout seconds
    timeoutSeconds: 300
    # -- Knative service response start timeout seconds
    responseStartTimeoutSeconds: 300
    # -- Knative service idle timeout seconds
    idleTimeoutSeconds: 300
    # -- Knative service annotations
    annotations: {}
  # Docker image
  image:
    # -- Docker image registry
    repository: containers/ollama
    # -- Docker pull policy
    pullPolicy: IfNotPresent
    # -- Docker image tag, overrides the image tag whose default is the chart appVersion.
    tag: "0.14.2-11.17"
    registry: dp.apps.rancher.io
  # -- Docker registry secret names as an array
  imagePullSecrets: []
  # -- String to partially override template  (will maintain the release name)
  nameOverride: ""
  # -- String to fully override template
  fullnameOverride: ""
  # -- String to fully override namespace
  namespaceOverride: ""
  # Ollama parameters
  ollama:
    # Port Ollama is listening on
    port: 11434
    gpu:
      # -- Enable GPU integration
      enabled: false
      # -- Enable DRA GPU integration
      # If enabled, it will use DRA instead of Device Driver Plugin and create a ResourceClaim and GpuClaimParameters
      draEnabled: false
      # -- DRA GPU DriverClass
      draDriverClass: "gpu.nvidia.com"
      # -- Existing DRA GPU ResourceClaim Template
      draExistingClaimTemplate: ""
      # -- GPU type: 'nvidia' or 'amd'
      # If 'ollama.gpu.enabled', default value is nvidia
      # If set to 'amd', this will add 'rocm' suffix to image tag if 'image.tag' is not override
      # This is due cause AMD and CPU/CUDA are different images
      type: 'nvidia'
      # -- Specify the number of GPU
      # If you use MIG section below then this parameter is ignored
      number: 1
      # -- only for nvidia cards; change to (example) 'nvidia.com/mig-1g.10gb' to use MIG slice
      nvidiaResource: "nvidia.com/gpu"
      # nvidiaResource: "nvidia.com/mig-1g.10gb" # example
      # If you want to use more than one NVIDIA MIG you can use the following syntax (then nvidiaResource is ignored and only the configuration in the following MIG section is used)

      mig:
        # -- Enable multiple mig devices
        # If enabled you will have to specify the mig devices
        # If enabled is set to false this section is ignored
        enabled: false
        # -- Specify the mig devices and the corresponding number
        devices: {}
        #        1g.10gb: 1
        #        3g.40gb: 1
    models:
      # -- List of models to pull at container startup
      # The more you add, the longer the container will take to start if models are not present
      # pull:
      #  - llama2
      #  - mistral
      pull: []
      # -- List of models to load in memory at container startup
      # run:
      #  - llama2
      #  - mistral
      run: []
      # -- List of models to create at container startup, there are two options
      # 1. Create a raw model
      # 2. Load a model from configMaps, configMaps must be created before and are loaded as volume in "/models" directory.
      # create:
      #  - name: llama3.1-ctx32768
      #    configMapRef: my-configmap
      #    configMapKeyRef: configmap-key
      #  - name: llama3.1-ctx32768
      #    template: |
      #      FROM llama3.1
      #      PARAMETER num_ctx 32768
      create: []
      # -- Automatically remove models present on the disk but not specified in the values file
      clean: false
    # -- Add insecure flag for pulling at container startup
    insecure: false
    # -- Override ollama-data volume mount path, default: "/root/.ollama"
    mountPath: ""
  # Service account
  # ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/
  serviceAccount:
    # -- Specifies whether a service account should be created
    create: true
    # -- Automatically mount a ServiceAccount's API credentials?
    automount: true
    # -- Annotations to add to the service account
    annotations: {}
    # -- The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: ""
  # -- Map of annotations to add to the pods
  podAnnotations: {}
  # -- Map of labels to add to the pods
  podLabels: {}
  # -- Pod Security Context
  podSecurityContext: {}
  # fsGroup: 2000

  # -- Priority Class Name
  priorityClassName: ""
  # -- Container Security Context
  securityContext: {}
  # capabilities:
  #  drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

  # -- Specify runtime class
  runtimeClassName: ""
  # Configure Service
  service:
    # -- Service type
    type: ClusterIP
    # -- Service port
    port: 11434
    # -- Service node port when service type is 'NodePort'
    nodePort: 31434
    # -- Load Balancer IP address
    loadBalancerIP:
    # -- Annotations to add to the service
    annotations: {}
    # -- Labels to add to the service
    labels: {}
    # -- IP Families for the service
    ipFamilies: []
    # - IPv4
    # - IPv6

    # -- IP Family Policy for the service
    ipFamilyPolicy: ""
    # SingleStack
    # PreferDualStack
    # RequireDualStack
  # Configure Deployment
  deployment:
    # -- Labels to add to the deployment
    labels: {}
  # Configure the ingress resource that allows you to access the
  ingress:
    # -- Enable ingress controller resource
    enabled: false
    # -- IngressClass that will be used to implement the Ingress (Kubernetes 1.18+)
    className: ""
    # -- Additional annotations for the Ingress resource.
    annotations: {}
    # kubernetes.io/ingress.class: traefik
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"

    # The list of hostnames to be covered with this ingress record.
    hosts:
      - host: ollama.local
        paths:
          - path: /
            pathType: Prefix
    # --  The tls configuration for hostnames to be covered with this ingress record.
    tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local
  # Configure resource requests and limits
  # ref: http://kubernetes.io/docs/user-guide/compute-resources/
  resources:
    # -- Pod requests
    requests: {}
    # Memory request
    # memory: 4096Mi

    # CPU request
    # cpu: 2000m

    # -- Pod limit
    limits: {}
    # Memory limit
    # memory: 8192Mi
  # CPU limit
  # cpu: 4000m

  # Configure extra options for liveness probe
  # ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-probes/#configure-probes
  livenessProbe:
    # -- Enable livenessProbe
    enabled: true
    # -- Request path for livenessProbe
    path: /
    # -- Initial delay seconds for livenessProbe
    initialDelaySeconds: 60
    # -- Period seconds for livenessProbe
    periodSeconds: 10
    # -- Timeout seconds for livenessProbe
    timeoutSeconds: 5
    # -- Failure threshold for livenessProbe
    failureThreshold: 6
    # -- Success threshold for livenessProbe
    successThreshold: 1
  # Configure extra options for readiness probe
  # ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-probes/#configure-probes
  readinessProbe:
    # -- Enable readinessProbe
    enabled: true
    # -- Request path for readinessProbe
    path: /
    # -- Initial delay seconds for readinessProbe
    initialDelaySeconds: 30
    # -- Period seconds for readinessProbe
    periodSeconds: 5
    # -- Timeout seconds for readinessProbe
    timeoutSeconds: 3
    # -- Failure threshold for readinessProbe
    failureThreshold: 6
    # -- Success threshold for readinessProbe
    successThreshold: 1
  # Configure autoscaling
  autoscaling:
    # -- Enable autoscaling
    enabled: false
    # -- Number of minimum replicas
    minReplicas: 1
    # -- Number of maximum replicas
    maxReplicas: 100
    # -- CPU usage to target replica
    targetCPUUtilizationPercentage: 80
    # -- targetMemoryUtilizationPercentage: 80
  # -- Additional volumes on the output Deployment definition.
  volumes: []
  # -- - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

  # -- Additional volumeMounts on the output Deployment definition.
  volumeMounts: []
  # -- - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

  # -- Additional arguments on the output Deployment definition.
  extraArgs: []
  # -- Additional environments variables on the output Deployment definition.
  # For extra OLLAMA env, please refer to https://github.com/ollama/ollama/blob/main/envconfig/config.go
  extraEnv: []
  #  - name: OLLAMA_DEBUG
  #    value: "1"

  # -- Additionl environment variables from external sources (like ConfigMap)
  extraEnvFrom: []
  #  - configMapRef:
  #      name: my-env-configmap

  # Enable persistence using Persistent Volume Claims
  # ref: https://kubernetes.io/docs/concepts/storage/persistent-volumes/
  persistentVolume:
    # -- Enable persistence using PVC
    enabled: false
    # -- Ollama server data Persistent Volume access modes
    # Must match those of existing PV or dynamic provisioner
    # Ref: http://kubernetes.io/docs/user-guide/persistent-volumes/
    accessModes:
      - ReadWriteOnce
    # -- Ollama server data Persistent Volume annotations
    annotations: {}
    # -- If you'd like to bring your own PVC for persisting Ollama state, pass the name of the
    # created + ready PVC here. If set, this Chart will not create the default PVC.
    # Requires server.persistentVolume.enabled: true
    existingClaim: ""
    # -- Ollama server data Persistent Volume size
    size: 30Gi
    # -- Ollama server data Persistent Volume Storage Class
    # If defined, storageClassName: <storageClass>
    # If set to "-", storageClassName: "", which disables dynamic provisioning
    # If undefined (the default) or set to null, no storageClassName spec is
    # set, choosing the default provisioner.  (gp2 on AWS, standard on
    # GKE, AWS & OpenStack)
    storageClass: ""
    # -- Ollama server data Persistent Volume Binding Mode
    # If defined, volumeMode: <volumeMode>
    # If empty (the default) or set to null, no volumeBindingMode spec is
    # set, choosing the default mode.
    volumeMode: ""
    # -- Subdirectory of Ollama server data Persistent Volume to mount
    # Useful if the volume's root directory is not empty
    subPath: ""
    # -- Pre-existing PV to attach this claim to
    # Useful if a CSI auto-provisions a PV for you and you want to always
    # reference the PV moving forward
    volumeName: ""
  # -- Node labels for pod assignment.
  nodeSelector: {}
  # -- Tolerations for pod assignment
  tolerations: []
  # -- Affinity for pod assignment
  affinity: {}
  # -- Lifecycle for pod assignment (override ollama.models startup pull/run)
  lifecycle: {}
  # How to replace existing pods
  updateStrategy:
    # -- Deployment strategy can be "Recreate" or "RollingUpdate". Default is Recreate
    type: "Recreate"
  # -- Topology Spread Constraints for pod assignment
  topologySpreadConstraints: {}
  # -- Wait for a grace period
  terminationGracePeriodSeconds: 120
  # -- Init containers to add to the pod
  initContainers: []
  # - name: startup-tool
  #   image: alpine:3
  #   command: [sh, -c]
  #   args:
  #     - echo init

  # -- Use the host’s ipc namespace.
  hostIPC: false
  # -- Use the host’s pid namespace
  hostPID: false
  # -- Use the host's network namespace.
  hostNetwork: false
  # -- Extra K8s manifests to deploy
  extraObjects: []
  #  - apiVersion: v1
  #    kind: PersistentVolume
  #    metadata:
  #      name: aws-efs
  #    data:
  #      key: "value"
  #  - apiVersion: scheduling.k8s.io/v1
  #    kind: PriorityClass
  #    metadata:
  #      name: high-priority
  #    value: 1000000
  #    globalDefault: false
  #    description: "This priority class should be used for XYZ service pods only."

  # Test connection pods
  tests:
    enabled: true
    # -- Labels to add to the tests
    labels: {}
    # -- Annotations to add to the tests
    annotations: {}