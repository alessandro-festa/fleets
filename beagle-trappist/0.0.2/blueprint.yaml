apiVersion: suse.ai/v1alpha1
kind: Blueprint
metadata:
  name: beagle-trappist
  labels:
    catalog.suse.ai/support: opensource
    catalog.suse.ai/tier: certified
    catalog.suse.ai/certified: "false"
    catalog.suse.ai/status: new
  mantainer: alessandro.festa1@suse.com
  source: https://github.com/alessandro-festa/fleets
  icon: ../icon.png
spec:
  displayName: beagle-trappist
  description: 
  category: Inference
  source:
    git:
      url: https://github.com/alessandro-festa/fleets
      ref: main
      path: beagle-trappist/0.0.2
  modules:
    - moduleRef: argo-workflows
      displayName: Argo Workflows
      description: Argo Workflows is an open source container-native workflow engine for orchestrating parallel jobs on Kubernetes. Argo Workflows is implemented as a Kubernetes CRD (Custom Resource Definition).
      category: dataIngestion
      support: SUSE
      source:
        helm:
          url: oci://dp.apps.rancher.io/charts/argo-workflows
          ref: *
      targetNamespace: beagle-trappist
    - moduleRef: ollama
      displayName: Ollama
      description: Get up and running with Llama 3.2, Mistral, Gemma 2, and other large language models.
      category: inference
      support: SUSE
      source:
        helm:
          url: oci://dp.apps.rancher.io/charts/ollama
          ref: *
      targetNamespace: beagle-trappist