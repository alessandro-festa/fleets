# Aggregated values.yaml

# Aggregated Stack Configuration


# =============================================================================
# --- nemo-guardrails ---
# =============================================================================
nemo-guardrails:
  ## @section Deployment parameters
  ## ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#affinity-and-anti-affinity
  ## @param affinity [object] [default: {}] Affinity settings for deployment.
  affinity: {}

  ## @param containerSecurityContext [object] Sets privilege and access control settings for container (Only affects the main container, not pod-level).
  containerSecurityContext: {}
    # seLinuxOptions: null
    # runAsUser: 1001
    # runAsGroup: 1001
    # runAsNonRoot: true
    # privileged: false
    # readOnlyRootFilesystem: false
    # allowPrivilegeEscalation: false
    # capabilities:
    #   drop:
    #     - ALL
    # seccompProfile:
    #   type: "RuntimeDefault"

  ## @param customCommand [array] Overrides command line options sent to the NIM with the array listed here.
  ## For advanced use if necessary only
  customCommand: []

  ## @param customArgs [array] Overrides command line arguments of the NIM container with the array listed here.
  ## For advanced use if necessary only
  customArgs: []

  ## @param env [array] Adds arbitrary environment variables to the main container.
  env: []
  # - name: OPENBLAS_NUM_THREADS
  #   value: "1"
  # - name: POD_NAME
  #   valueFrom:
  #     fieldRef:
  #       fieldPath: metadata.name

  ## @param extraVolumes [object] Adds arbitrary additional volumes to the deployment set definition.
  extraVolumes: {}
    # my-volume-name:
    #   emptyDir: {}

  ## @param extraVolumeMounts [object] Adds volume mounts to the main container from `extraVolumes`.
  extraVolumeMounts: {}
    # my-volume-name:
    #   mountPath: /mnt/myvolume

  ## @param image.repository [string] Specifies the NIM-LLM Image to deploy.
  ## @param image.tag [string] Specifies the image tag or version.
  ## @param image.pullPolicy [string] Sets the image pull policy.
  image:
    repository: nvcr.io/nvidia/nemo-guardrails
    pullPolicy: IfNotPresent
    # Tag overrides the image tag whose default is the chart appVersion.
    tag: ""

  ## @extra imagePullSecrets Specifies a list of secret names that are needed for the main container and any init containers.
  ## @skip imagePullSecrets[0].name
  imagePullSecrets:
    - name: ngc-secret  # change this to whatever your image pull secret should be

  ## @extra initContainers [object] Specifies model init containers, if needed.
  ## @param initContainers.extraInit [array] Fully specify any additional init containers your use case requires.
  initContainers:
    extraInit: [] # Add any additional init containers your use case requires.
    # -  # full init container definition here

  ## @param nodeSelector [object] Sets node selectors for the NIM -- for example `nvidia.com/gpu.present: "true"`.
  nodeSelector: {}  # likely best to set this to `nvidia.com/gpu.present: "true"` depending on cluster setup

  ## @param podAnnotations [object] Sets additional annotations on the main deployment pods.
  podAnnotations: {}

  ## @extra podSecurityContext Specifies security context settings for pod.
  ## @param podSecurityContext.runAsUser Specify user UID for pod.
  ## @param podSecurityContext.runAsGroup Specify group ID for pod.
  ## @param podSecurityContext.fsGroup Specify file system owner group id.
  podSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

  ## @extra proxyCA [object] Specify a certificate for a custom proxy. When `proxyCA` is set native TLS is used for downloading from NGC.
  ## @param proxyCA.enabled Specify true if NIM is run behind a proxy.
  ## @param proxyCA.secretName [nullable] Specify a name of the Kubernetes secret containing the certificate. The secret is created before the deployment. Must be used together with `proxyCA.keyName`
  ## @param proxyCA.keyName [nullable] Specify a name of the key inside the secret which contains the certificate. Must be used together with `proxyCA.secretName`
  proxyCA:
    enabled: false
    secretName: ""
    keyName: ""

  ## @param replicaCount Specify static replica count for deployment.
  replicaCount: 1

  ## @extra resources [object] Specify resources limits and requests for the running service.
  ## @param resources.limits.nvidia.com/gpu Specify number of GPUs to present to the running service.
  resources:
    limits:
      nvidia.com/gpu: 1  # Number of GPUs to present to the running service

  ## @extra serviceAccount Options to specify service account for the deployment.
  ## @param serviceAccount.create Specifies whether a service account should be created.
  ## @param serviceAccount.annotations [object] Sets annotations to be added to the service account.
  ## @param serviceAccount.name Specifies the name of the service account to use. If it is not set and create is `true`, a name is generated using a `fullname` template.
  serviceAccount:
    # Specifies whether a service account should be created
    create: false
    # Annotations to add to the service account
    annotations: {}
    # The name of the service account to use.
    # If not set and create is `true`, a name is generated using the `fullname` template
    name: ""

  ## @param statefulSet.enabled Enables `statefulset` deployment. Enabling `statefulSet` allows PVC templates for scaling. If using central PVC with RWX `accessMode`, this isn't needed.
  statefulSet:
    enabled: true

  ## @extra tolerations Specify tolerations for pod assignment. Allows the scheduler to schedule pods with matching taints.
  ## @skip tolerations[0].key
  ## @skip tolerations[0].operator
  ## @skip tolerations[0].effect
  tolerations:
    - key: "nvidia.com/gpu"
      operator: "Exists"
      effect: "NoSchedule"


  ## @section Autoscaling parameters
  ## @descriptionStart
  ## Values used for creating a `Horizontal Pod Autoscaler`. If autoscaling is not enabled, the rest are ignored.
  ## NVIDIA recommends usage of the custom metrics API, commonly implemented with the Prometheus Adapter.
  ## Standard metrics of CPU and memory are of limited use in scaling NIM.
  ## @descriptionEnd
  ## @param autoscaling.enabled Enables horizontal pod autoscaler.
  ## @param autoscaling.minReplicas Specify minimum replicas for autoscaling.
  ## @param autoscaling.maxReplicas Specify maximum replicas for autoscaling.
  ## @param autoscaling.metrics Array of metrics for autoscaling.
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    metrics: []


  ## @section Ingress parameters
  ## @param ingress.enabled Enables ingress.
  ## @param ingress.className Specify class name for Ingress.
  ## @param ingress.annotations Specify additional annotations for ingress.
  ## @extra ingress.hosts Specify list of hosts each containing lists of paths.
  ## @param ingress.hosts[0].host Specify name of host.
  ## @param ingress.hosts[0].paths[0].path Specify ingress path.
  ## @param ingress.hosts[0].paths[0].pathType Specify path type.
  ## @param ingress.hosts[0].paths[0].serviceType Specify service type. It can be can be `nemo` or `openai` -- make sure your model serves the appropriate port(s).
  ## @param ingress.tls Specify list of pairs of TLS `secretName` and hosts.
  ingress:
    enabled: false
    className: ""
    annotations: {}
      # kubernetes.io/ingress.class: nginx
      # kubernetes.io/tls-acme: "true"
    hosts:
      - host: chart-example.local
        paths:
          - path: /
            pathType: ImplementationSpecific
            serviceType: openai  # can be nemo or openai -- make sure your model serves the appropriate port(s)

    tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local


  ## @section Probe parameters
  ## @param livenessProbe.enabled Enables `livenessProbe``.
  ## @param livenessProbe.method `LivenessProbe` `http` or `script`, but no script is currently provided.
  ## @param livenessProbe.command `LivenessProbe`` script command to use (unsupported at this time).
  ## @param livenessProbe.path `LivenessProbe`` endpoint path.
  ## @param livenessProbe.initialDelaySeconds Initial delay seconds for `livenessProbe`.
  ## @param livenessProbe.timeoutSeconds Timeout seconds for `livenessProbe`.
  ## @param livenessProbe.periodSeconds Period seconds for `livenessProbe`.
  ## @param livenessProbe.successThreshold Success threshold for `livenessProbe`.
  ## @param livenessProbe.failureThreshold Failure threshold for `livenessProbe`.
  livenessProbe:
    enabled: true
    method: http
    command:
      - myscript.sh
    path: /v1/health/live  # correct for LLM container
    initialDelaySeconds: 15
    timeoutSeconds: 1
    periodSeconds: 10
    successThreshold: 1
    failureThreshold: 3

  ## @param readinessProbe.enabled Enables `readinessProbe`.
  ## @param readinessProbe.path Readiness Endpoint Path.
  ## @param readinessProbe.initialDelaySeconds Initial delay seconds for `readinessProbe`.
  ## @param readinessProbe.timeoutSeconds Timeout seconds for `readinessProbe`.
  ## @param readinessProbe.periodSeconds Period seconds for `readinessProbe`.
  ## @param readinessProbe.successThreshold Success threshold for `readinessProbe`.
  ## @param readinessProbe.failureThreshold Failure threshold for `readinessProbe`.
  readinessProbe:
    enabled: true
    path: /v1/health/ready  # correct for LLM container
    initialDelaySeconds: 15
    timeoutSeconds: 1
    periodSeconds: 10
    successThreshold: 1
    failureThreshold: 3

  ## @param startupProbe.enabled Enables `startupProbe`.
  ## @param startupProbe.path `StartupProbe` Endpoint Path.
  ## @param startupProbe.initialDelaySeconds Initial delay seconds for `startupProbe`.
  ## @param startupProbe.timeoutSeconds Timeout seconds for `startupProbe`.
  ## @param startupProbe.periodSeconds Period seconds for `startupProbe`.
  ## @param startupProbe.successThreshold Success threshold for `startupProbe`.
  ## @param startupProbe.failureThreshold Failure threshold for `startupProbe`.
  startupProbe:
    enabled: true
    path: /v1/health/ready  # correct for LLM container
    initialDelaySeconds: 40
    timeoutSeconds: 1
    periodSeconds: 10
    successThreshold: 1
    failureThreshold: 180


  ## @section Metrics parameters
  ## @extra metrics
  ## @extra metrics.serviceMonitor Options for `serviceMonitor` to use the Prometheus Operator and the primary service object.
  ## @param metrics.serviceMonitor.enabled Enables `serviceMonitor` creation.
  ## @param metrics.serviceMonitor.additionalLabels [object] Specify additional labels for `serviceMonitor`.
  metrics:
    serviceMonitor:  # for use with the Prometheus Operator and the primary service object
      enabled: false
      additionalLabels: {}


  ## @section Models parameters
  ## @param model.nimCache [string] Path to mount writeable storage or pre-filled model cache for the NIM.
  ## @param model.name Specifies the name of the model in the API (usually, the name of the NIM). This is mostly used for helm tests and is usually otherwise optional. This must match the name from _/v1/models_ to allow `helm test <release-name>` to work.
  ## @param model.ngcAPISecret [string] Name of pre-existing secret with a key named `NGC_API_KEY` that contains an API key for NGC model downloads.
  ## @param model.ngcAPIKey [string] NGC API key literal to use as the API secret and image pull secret when set.
  ## @param model.hfTokenSecret [string] Name of pre-existing secret with a key named `HF_TOKEN` that contains a token for HuggingFace model downloads.
  ## @param model.openaiPort Specifies the Open AI API Port.
  ## @param model.labels [object] Specifies extra labels to be added on deployed pods.
  ## @param model.jsonLogging Turn JSON lines logging on or off. Defaults to true.
  ## @param model.logLevel Log level of NIM service. Possible values of the variable are TRACE, DEBUG, INFO, WARNING, ERROR, CRITICAL.
  model:
    nimCache: /model-store
    name: meta/llama3-8b-instruct # optional name of the model in the OpenAI API -- used in `helm test`
    ngcAPISecret: "ngc-api"
    ngcAPIKey: ""
    hfTokenSecret: ""
    openaiPort: 8000
    labels: {}  # any extra labels desired on deployed pods
    jsonLogging: true
    logLevel: INFO

  ## @section Storage parameters
  ## @extra persistence Specify settings to modify the behavior and use of persistent volumes for model weights.
  ## @param persistence.enabled Enables the use of persistent volumes.
  ## @param persistence.existingClaim Specifies an existing persistent volume claim. If using `existingClaim`, run only one replica or use a `ReadWriteMany` storage setup.
  ## @param persistence.storageClass [nullable] Specifies the persistent volume storage class. If set to `"-"`, this disables dynamic provisioning. If left undefined or set to null, the cluster default storage provisioner is used.
  ## @param persistence.accessMode Specify `accessMode`. If using an NFS or similar setup, you can use `ReadWriteMany`.
  ## @param persistence.stsPersistentVolumeClaimRetentionPolicy.whenDeleted Specifies persistent volume claim retention policy when deleted. Only used with Stateful Set volume templates.
  ## @param persistence.stsPersistentVolumeClaimRetentionPolicy.whenScaled Specifies persistent volume claim retention policy when scaled. Only used with Stateful Set volume templates.
  ## @param persistence.size Specifies the size of the persistent volume claim (for example 40Gi).
  ## @param persistence.annotations [object] Adds annotations to the persistent volume claim.
  persistence:
    enabled: false
    existingClaim: ""  # if using existingClaim, run only one replica or use a `ReadWriteMany` storage setup
    # Persistent Volume Storage Class
    # If defined, storageClassName: <storageClass>
    # If set to "-", storageClassName: "", which disables dynamic provisioning.
    # If undefined (the default) or set to null, no storageClassName spec is
    #   set, choosing the default provisioner.
    storageClass: ""
    accessMode: ReadWriteOnce  # If using an NFS or similar setup, you can use `ReadWriteMany`
    stsPersistentVolumeClaimRetentionPolicy:
      whenDeleted: Retain
      whenScaled: Retain
    size: 50Gi  # size of claim in bytes (for example 8Gi)
    annotations: {}

  ## @extra hostPath Configures model cache on local disk on the nodes using `hostPath` -- for special cases. You should understand the security implications before using this option.
  ## @param hostPath.enabled Enable `hostPath`.
  ## @param hostPath.path Specifies path on the node used as a `hostPath` volume.
  hostPath:
    enabled: false
    path: /model-store

  ## @extra nfs Configures the model cache to sit on shared direct-mounted NFS. NOTE: you cannot set mount options using direct NFS mount to pods without a node-intalled nfsmount.conf. An NFS-based `PersistentVolumeClaim` is likely better in most cases.
  ## @param nfs.enabled Enables direct pod NFS mount.
  ## @param nfs.path Specify path on NFS server to mount.
  ## @param nfs.server Specify NFS server address.
  ## @param nfs.readOnly Set to true to mount as read-only.
  nfs:
    enabled: false
    server: nfs-server.example.com
    path: /exports
    readOnly: false

  ## @section Service parameters
  ## @param service.type Specifies the service type for the deployment.
  ## @param service.name Overrides the default service name
  ## @param service.openaiPort Specifies Open AI Port for the service.
  ## @param service.annotations [object] Specify additional annotations to be added to service.
  ## @param service.labels Specifies additional labels to be added to service.
  service:
    type: ClusterIP
    openaiPort: 8000
    annotations: {}
    labels: {}
    name: ""  # override the default service name


  ## @section Multi-node parameters
  ## @descriptionStart
  ## Large models that must span multiple nodes do not work on plain Kubernetes with the GPU Operator alone at this time.
  ## Optimized TensorRT profiles, when selected automatically or by environment variable, require one of the following:
  ##
  ## - (Recommended) [LeaderWorkerSets](https://github.com/kubernetes-sigs/lws)—We recommend that you use LeaderWorkerSets if your cluster version allows it.
  ## - (Not recommended) [MPI Operator](https://github.com/kubeflow/mpi-operator)—Since `MPIJob` is a batch-type resource that is not designed with service stability and reliability in mind, this option is not recommended.
  ## Only optimized profiles are supported for multi-node deployment at this time.
  ## @descriptionEnd
  ## @param multiNode.enabled Specify true for multi-node deployments.
  ## @param multiNode.clusterStartTimeout Set the number of seconds to wait for worker nodes to start before failing.
  ## @param multiNode.gpusPerNode Number of GPUs for each pod. In most cases, this should match `resources.limits.nvidia.com/gpu`.
  ## @param multiNode.workers Specifies how many worker pods per multi-node replica to launch.
  ## @param multiNode.workerCustomCommand Sets a custom command array for the worker nodes in a LeaderWorkerSet only.
  ## @param multiNode.leaderWorkerSet.enabled True to use `LeaderWorkerSets` for multi-node deployments (recommended). False to `MPIJob` from mpi-operator.
  ## @param multiNode.existingSSHSecret [string,nullable] Sets the SSH private key for MPI to an existing secret. Otherwise, the Helm chart generates a key randomly during installation.
  ## @param multiNode.mpiJob.workerAnnotations Annotations only applied to workers for `MPIJob`, if used. This may be necessary to ensure the workers connect to `CNI`s offered by `multus` and the network operator, if used.
  ## @param multiNode.mpiJob.launcherResources Resources section to apply only to the launcher pods in `MPIJob`, if used. Launchers do not get the chart resources restrictions. Only workers do, since they require GPUs.
  ## @param multiNode.optimized.enabled True to enable optimized multi-node deployments. Currently, true is the only option.
  multiNode:
    clusterStartTimeout: 300
    enabled: false
    workers: 1
    workerCustomCommand: []
    leaderWorkerSet:
      enabled: true
    existingSSHSecret: ""
    mpiJob:
      workerAnnotations: {}
      launcherResources: {}
    gpusPerNode: 1
    optimized:
      enabled: true


# =============================================================================
# --- Apache Kafka ---
# =============================================================================
apache-kafka:
  Pulled: dp.apps.rancher.io/charts/apache-kafka:1.3.0
  Digest: sha256:e6250dbdc9d4ba3e8a996f2faeffd52806982926d5daeaa929ad499703068ca1
  global:
    # -- Global override for the storage class
    storageClassName: ""
    # -- Global override for container image registry
    imageRegistry: ""
    # -- Global override for container image registry pull secrets
    imagePullSecrets: []

  # -- Annotations to add to all deployed objects
  commonAnnotations: {}
  # -- Labels to add to all deployed objects
  commonLabels: {}
  # -- Override the resource name
  fullnameOverride: ""
  # -- Override the resource name prefix (will keep the release name)
  nameOverride: ""
  # -- Additional Kubernetes manifests to include in the chart
  extraManifests: []
  # -- Kubernetes cluster domain name
  clusterDomain: cluster.local

  images:
    controller:
      # -- Image registry to use for the Apache Kafka controller container
      registry: dp.apps.rancher.io
      # -- Image repository to use for the Apache Kafka controller container
      repository: containers/apache-kafka
      # -- Image tag to use for the Apache Kafka controller container
      tag: "4.1.2-5.2"
      # -- Image digest to use for the Apache Kafka controller container (if set, `images.controller.tag` will be ignored)
      digest: ""
      # -- Image pull policy to use for the Apache Kafka controller container
      pullPolicy: IfNotPresent
    broker:
      # -- Image registry to use for the Apache Kafka broker container
      registry: dp.apps.rancher.io
      # -- Image repository to use for the Apache Kafka broker container
      repository: containers/apache-kafka
      # -- Image tag to use for the Apache Kafka broker container
      tag: "4.1.2-5.2"
      # -- Image digest to use for the Apache Kafka broker container (if set, `images.broker.tag` will be ignored)
      digest: ""
      # -- Image pull policy to use for the Apache Kafka broker container
      pullPolicy: IfNotPresent
    volume-permissions:
      # -- Image registry to use for the volume permissions init container
      registry: dp.apps.rancher.io
      # -- Image repository to use for the volume permissions init container
      repository: containers/bci-busybox
      # -- Image tag to use for the volume permissions init container
      tag: "15.7-21.1"
      # -- Image digest to use for the volume permissions init container (if set, `images.volume-permissions.tag` will be ignored)
      digest: ""
      # -- Image pull policy to use for the volume-permissions container
      pullPolicy: IfNotPresent

  containerPorts:
    # -- (int32) Apache Kafka port number for client connections
    client: 9092
    # -- (int32) Apache Kafka port number for controller connections
    controller: 9093
    # -- (int32) Apache Kafka port number for interbroker connections
    interbroker: 9094
    # -- (int32) Custom port number to expose in the Apache Kafka containers
    "*":
    # Note: This field is only added for documentation purposes

  cluster:
    listeners:
      client:
        # -- Apache Kafka client's listener name
        name: CLIENT
        # -- Apache Kafka client's listener security protocol. Valid values are `PLAINTEXT`, `SASL_PLAINTEXT`, `SSL` and `SASL_SSL`
        ## Note: enabling `auth.enabled` and/or `tls.enabled` may be necessary depending on the selected protocol
        protocol: SASL_PLAINTEXT
        # -- Apache Kafka client's listener SASL mechanism. Valid values are `GSSAPI`, `OAUTHBEARER`, and `PLAIN`
        ## Note: used mechanism must be set in `auth.sasl.enabledMechanisms`
        saslMechanism: PLAIN
      controller:
        # -- Apache Kafka controller's listener name
        name: CONTROLLER
        # -- Apache Kafka controller's listener security protocol. Valid values are `PLAINTEXT`, `SASL_PLAINTEXT`, `SSL` and `SASL_SSL`
        ## Note: enabling `auth.enabled` and/or `tls.enabled` may be necessary depending on the selected protocol
        protocol: SASL_PLAINTEXT
        # -- Apache Kafka controller's listener SASL mechanism. Valid values are `GSSAPI`, `OAUTHBEARER`, and `PLAIN`
        ## Note: used mechanism must be set in `auth.sasl.enabledMechanisms`
        saslMechanism: PLAIN
      interbroker:
        # -- Apache Kafka interbroker's listener name
        name: INTERBROKER
        # -- Apache Kafka interbroker's listener security protocol. Valid values are `PLAINTEXT`, `SASL_PLAINTEXT`, `SSL` and `SASL_SSL`
        ## Note: enabling `auth.enabled` and/or `tls.enabled` may be necessary depending on the selected protocol
        protocol: SASL_PLAINTEXT
        # -- Apache Kafka interbroker's listener SASL mechanism. Valid values are `GSSAPI`, `OAUTHBEARER`, and `PLAIN`
        ## Note: used mechanism must be set in `auth.sasl.enabledMechanisms`
        saslMechanism: PLAIN
      # -- Custom Apache Kafka listeners
      "*":
    nodeCount:
      # -- (int32) Desired number of Apache Kafka controller nodes to deploy
      controller: 3
      # -- (int32) Desired number of Apache Kafka broker nodes to deploy (requires `broker.enabled`)
      broker: 3
    # -- Whether the controller nodes will also function as brokers
    controllerBrokerRole: true
    # -- Minimum node ID brokers should start from. Should always be greater than `cluster.nodeCount.controller`
    minBrokerID: 1000
    # -- (int32) Number of log partitions per topic
    numPartitions: 1
    # -- (int32) The replication factor for the offsets topic
    offsetsTopicReplicationFactor: 2
    # -- (int32) Number of disks per each Apache Kafka node
    disksPerBroker: 1
    # -- Unique clusterID shared among all nodes. Randomly generated if not set
    ## Note: It is recommended to use a UUID format (e.g. using `uuidgen` or `kafka-storage.sh random-uuid`).
    clusterID: ""
    # -- clusterID key in the configMap
    # @default `clusterID`
    clusterIDKey: ""
    # -- Name of an existing configMap containing the clusterID (if set, `cluster.clusterID` will be ignored)
    clusterConfigMap: ""
    # -- ConfigMaps to deploy
    # @default -- See `values.yaml`
    configMap:
      # -- Create a config map for general Apache Kafka clusterID configuration
      # @default -- `true` if clusterConfigMap is empty, `false` otherwise
      enabled: '{{ empty .Values.cluster.clusterConfigMap }}'
      '{{ default "clusterID" .Values.cluster.clusterIDKey }}': '{{ default (randAlphaNum 16) .Values.cluster.clusterID }}'
      # -- (string) Custom configuration file to include, templates are allowed both in the config map name and contents
      "*":
      # Note: This field is only added for documentation purposes
  auth:
    # -- Enable Apache Kafka password authentication
    enabled: true
    sasl:
      # -- Comma-separated list of enabled SASL mechanisms. Valid values are `GSSAPI`, `OAUTHBEARER`, and `PLAIN`
      ## Note: SCRAM-SHA-256 and SCRAM-SHA-256 mechanisms are not currently supported in Kraft mode
      enabledMechanisms: "PLAIN"
      gssapi:
        # -- The Kerberos principal name that Kafka runs as
        kerberosServiceName: ""
        # -- Name of the secret containing the Apache Kafka keyTab
        ## Note: The secret must contain a keytab file per node.
        ## Each keytab must follow the "<release-name>-<nodeType>-<N>.keytab" naming schema
        ## For a cluster with 3 controller and 3 broker nodes we'll need:
        ## - <release-name>-controller-[0..2].keytab
        ## - <release-name>-broker-[0..2].keytab
        existingSecret: ""
      plain:
        interbroker:
          # -- User for inter-broker communications
          # @default `admin`
          username: "admin"
          # -- Password for inter-broker communications. Randomly generated if not set
          # @default `admin_password`
          password: "admin_password"
          # -- Name of an existing secret containing the Apache Kafka interbroker credentials (if set, `auth.sasl.plain.interbroker.username` and `auth.sasl.plain.interbroker.password` will be ignored)
          existingSecret: ""
          # -- Interbroker username key in the secret
          # @default `interbroker-user`
          usernameKey: ""
          # -- Interbroker password key in the secret
          # @default `interbroker-password`
          passwordKey: ""
          # -- Secret to deploy
          # @default -- See `values.yaml`
          secret:
            # -- Create a secret for general Apache Kafka interbroker configuration
            # @default -- `true` if PLAIN authentication is enabled without an existing secret, `false` otherwise
            enabled: '{{ empty .Values.auth.sasl.plain.interbroker.existingSecret }}'
            '{{ default "interbroker-user" .Values.auth.sasl.plain.interbroker.usernameKey }}': '{{ coalesce .Values.auth.sasl.plain.interbrokerUsername .Values.auth.sasl.plain.interbroker.username }}'
            '{{ default "interbroker-password" .Values.auth.sasl.plain.interbroker.passwordKey }}': '{{ default (randAlphaNum 16) (coalesce .Values.auth.sasl.plain.interbrokerPassword .Values.auth.sasl.plain.interbroker.password) }}'
        # -- List of client-broker communication users and their passwords
        # @default -- See `values.yaml`
        users:
          - username: user_test
            password: password_test
        # -- Name of an existing secret containing the client-broker communications credentials (if set, `auth.sasl.plain.users` will be ignored)
        ## Note: The secret must match the keys to the usernames and their values to the users' passwords
        usersExistingSecret: ""
        ## DEPRECATED: Please use auth.sasl.plain.interbroker.username instead.
        # interbrokerUsername: ""
        ## DEPRECATED: Please use auth.sasl.plain.interbroker.password instead.
        # interbrokerPassword: ""
      oauthbearer:
        # -- The OAuth/OIDC provider URL from which the provider's JWKS (JSON Web Key Set) can be retrieved
        jwksEndpointUrl: ""
        # -- The URL for the OAuth/OIDC identity provider
        tokenEndpointUrl: ""
        # -- Used by brokers to configure the subject (sub) claim, which determines the user for inter-broker connections
        unsecuredLoginClaimSub: ""
  tls:
    # -- Enable TLS. Requires setting the proper `cluster.listeners.xxxx.protocol`
    enabled: false
    # -- Store format for file-based keys and trust stores. Valid values are `JKS` and `PEM`
    format: "JKS"
    # -- Configures kafka broker to request client authentication. Valid values are `none`, `required` and `requested`
    clientAuth: "none"
    # -- Whether to require Apache Kafka to perform host name verification
    hostnameVerification: true
    # -- Name of the secret containing the Apache Kafka certificates
    ## Note: The secret must contain a keystore file per node
    ## Each keystore must follow the "<release-name>-<nodeType>-<N>.keystore.jks" naming schema
    ## That is, for a cluster with 3 controller and 3 broker nodes using the "JKS" format we'll need:
    ## - <release-name>-controller-[0..2].keystore.jks
    ## - <release-name>-broker-[0..2].keystore.jks
    ##
    ## For a cluster with 3 controller and 2 broker nodes using the "PEM" format:
    ## - <release-name>-controller-[0..2].crt
    ## - <release-name>-controller-[0..2].key
    ## - <release-name>-broker-[1..2].crt
    ## - <release-name>-broker-[1..2].key
    existingSecret: ""
    # -- Password to access the JKS keystore file in case it is encrypted
    keystorePassword: ""
    # -- Truststore filename in the secret
    truststoreFilename: ""
    # -- Password to access the JKS truststore file in case it is encrypted
    truststorePassword: ""
    # -- CA certificate filename in the secret. Only used for PEM format. Leave empty to reuse the node's own certificate file (`<release-name>-<nodeType>-<N>.crt`) as the truststore
    caCertFilename: ""
    # -- The password of the private key in the JKS keystores or the PEM keys, maps to "ssl.key.password"
    keystoreKeyPassword: ""

  controller:
    # -- Java heapOpts
    heapOpts: "-Xms512M -Xmx512M"
    # -- Directory where the Apache Kafka broker stores its log data. Required when .Values.cluster.controllerBrokerRole is enabled
    logDir: '{{ .Values.controller.podTemplates.containers.controller.volumeMounts.logs.mountPath }}'
    # -- Subdirectory appended to .Values.controller.logDir. Allows for "ext4" storageClass support.
    logSubDir: ""
    # -- Configuration file name for the controllers' server properties in the config map
    configurationFile: server.properties
    # -- Extra configurations to add to the controller configuration file. Can be defined as a string, a key-value (string-string) map, or an array of entries.
    configuration: ""
    # -- Name of an existing config map for extra configurations to add to the Apache Kafka configuration file
    existingConfigMap: ""
    # -- ConfigMaps to deploy
    # @default -- See `values.yaml`
    configMap:
      # -- Create a config map for Apache Kafka configuration
      # @default -- `true` if no controller.existingConfigMap is provided and the controller.configuration is not empty, `false` otherwise
      enabled: '{{ and (not .Values.controller.existingConfigMap) (not (empty .Values.controller.configuration)) }}'
      # See: https://kafka.apache.org/documentation/#configuration
      '{{ .Values.controller.configurationFile }}': '{{ tpl (include "application-collection.apache-kafka.configuration" (dict "values" .Values.controller.configuration "context" $)) . }}'
      # -- (string) Custom configuration file to include, templates are allowed both in the config map name and contents
      "*":
      # Note: This field is only added for documentation purposes

    statefulset:
      # -- Enable the StatefulSet template for Apache Kafka standalone mode
      enabled: true
      # -- Override for the Apache Kafka' StatefulSet serviceName field, it will be autogenerated if unset
      serviceName: ""
      # -- Template to use for all pods created by the Apache Kafka StatefulSet (overrides `podTemplates.*`)
      template: {}
      # -- Desired number of PodTemplate replicas for Apache Kafka controller (overrides `cluster.nodeCount.controller`)
      replicas: ""
      # -- Strategy that will be employed to update the pods in the Apache Kafka StatefulSet
      # @default -- See `values.yaml`
      updateStrategy:
        type: RollingUpdate
      # -- How Apache Kafka pods are created during the initial scaleup
      podManagementPolicy: Parallel
      # -- Lifecycle of the persistent volume claims created from Apache Kafka volumeClaimTemplates
      persistentVolumeClaimRetentionPolicy: {}
      #  whenScaled: Retain
      #  whenDeleted: Retain
      # -- Volume claim templates for the Apache Kafka statefulset, templates are allowed in all fields
      # @default -- See `values.yaml`
      # Each field has the volumeClaimTemplate name as key, and a YAML string template with the values; you must set `enabled: true` to enable it
      volumeClaimTemplates:
        data:
          enabled: '{{ .Values.persistence.enabled }}'
        logs:
          enabled: '{{ .Values.persistence.enabled }}'
          volumeCount: '{{ int .Values.cluster.disksPerBroker }}'
      # -- Custom attributes for the Apache Kafka StatefulSet (see [`StatefulSetSpec` API reference](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/stateful-set-v1/#StatefulSetSpec))
      "*":
      # Note: This field is only added for documentation purposes

    podTemplates:
      # -- Annotations to add to all pods in the Apache Kafka StatefulSet's PodTemplate
      # @default -- See `values.yaml`
      annotations:
        kubectl.kubernetes.io/default-container: controller
      # -- Labels to add to all pods in the Apache Kafka StatefulSet's PodTemplate
      labels: {}
      # -- Number of seconds prior to the container being forcibly terminated when marked for deletion or restarted.
      terminationGracePeriodSeconds: 120
      # -- Init containers to deploy in the Apache Kafka PodTemplate
      # @default -- See `values.yaml`
      # Each field has the init container name as key, and a YAML object template with the values; you must set `enabled: true` to enable it
      initContainers:
        volume-permissions:
          # -- Enable the volume-permissions init container in the Apache Kafka PodTemplate
          enabled: false
          # -- Image override for the Apache Kafka volume-permissions init container (if set, `images.volume-permissions.{name,tag,digest}` values will be ignored for this container)
          image: ""
          # -- Image pull policy override for the Apache Kafka volume-permissions init container (if set `images.volume-permissions.pullPolicy` values will be ignored for this container)
          imagePullPolicy: ""
          # -- Entrypoint override for the Apache Kafka volume-permissions container
          # @default -- See `values.yaml`
          command:
            - /bin/sh
            - -ec
            - |
              chown -R {{ .Values.containerSecurityContext.runAsUser }}:{{ .Values.podSecurityContext.fsGroup }} /mnt/kafka/data
          # -- Arguments override for the Apache Kafka volume-permissions init container entrypoint
          args: []
          # -- Object with the environment variables templates to use in the Apache Kafka volume-permissions init container, the values can be specified as an object or a string; when using objects you must also set `enabled: true` to enable it
          # @default -- No environment variables are set
          env: {}
          # -- List of sources from which to populate environment variables to the Apache Kafka volume-permissions init container (e.g. a ConfigMaps or a Secret)
          envFrom: []
          # -- Custom volume mounts for the Apache Kafka volume-permissions init container, templates are allowed in all fields
          # @default -- See `values.yaml`
          # Each field has the volume mount name as key, and a YAML string template with the values; you must set `enabled: true` to enable it
          volumeMounts:
            data:
              enabled: true
              mountPath: /mnt/kafka/data
          # -- Apache Kafka init-containers resource requirements
          resources: {}
          # We usually recommend not to specify default resources and to leave this as a conscious
          # choice for the user. This also increases chances charts run on environments with little
          # resources, such as Minikube. If you do want to specify resources, uncomment the following
          # lines, adjust them as necessary, and remove the curly braces after 'resources:'
          #   limits:
          #    cpu: 100m
          #    memory: 128Mi
          #   requests:
          #    cpu: 100m
          #    memory: 128Mi
          # -- Security context override for the Apache Kafka volume-permissions init container (if set, `containerSecurityContext.*` values will be ignored for this container)
          # @default -- See `values.yaml`
          securityContext:
            runAsUser: 0
          # -- Custom attributes for the Apache Kafka volume-permissions init container (see [`Container` API spec](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#Container))
          "*":
          # Note: This field is only added for documentation purposes
      # -- Containers to deploy in the Apache Kafka PodTemplate
      # @default -- See `values.yaml`
      # Each field has the container name as key, and a YAML object template with the values; you must set `enabled: true` to enable it
      containers:
        controller:
          # -- Enable the Apache Kafka container in the PodTemplate
          enabled: true
          # -- Image override for the Apache Kafka container (if set, `images.controller.{name,tag,digest}` values will be ignored for this container)
          image: ""
          # -- Image pull policy override for the Apache Kafka container (if set `images.controller.pullPolicy` values will be ignored for this container)
          imagePullPolicy: ""
          # -- Entrypoint override for the Apache Kafka container
          # @default -- See `values.yaml`
          command:
            - /bin/bash
            - -ec
            - |
              exec /mnt/kafka/scripts/apache-kafka-entrypoint.sh
          # -- Arguments override for the Apache Kafka container entrypoint
          args: []
          # -- Ports override for the Apache Kafka container (if set, `containerPorts.*` values will be ignored for this container)
          ports: {}
          # -- Object with the environment variables templates to use in the Apache Kafka container, the values can be specified as an object or a string; when using objects you must also set `enabled: true` to enable it
          # @default -- See `values.yaml`
          env:
            # Aux environment variables to be used for authentication
            _KAFKA_INTERBROKER_USER:
              enabled: '{{ and .Values.auth.enabled (contains "PLAIN" .Values.auth.sasl.enabledMechanisms) }}'
              valueFrom:
                secretKeyRef:
                  name: '{{ coalesce .Values.auth.sasl.plain.interbroker.existingSecret (include "application-collection.fullName" (dict "suffix" "auth" "context" $)) }}'
                  key: '{{ default "interbroker-user" .Values.auth.sasl.plain.interbroker.usernameKey }}'
            _KAFKA_INTERBROKER_PASSWORD:
              enabled: '{{ and .Values.auth.enabled (contains "PLAIN" .Values.auth.sasl.enabledMechanisms) }}'
              valueFrom:
                secretKeyRef:
                  name: '{{ coalesce .Values.auth.sasl.plain.interbroker.existingSecret (include "application-collection.fullName" (dict "suffix" "auth" "context" $)) }}'
                  key: '{{ default "interbroker-password" .Values.auth.sasl.plain.interbroker.passwordKey }}'
            # Aux environment variables to be used in the init cluster config
            _KAFKA_POD_HOSTNAME:
              enabled: true
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # Aux environment variables to be used for TLS PEM configuration
            _KAFKA_SSL_CERT_DIR:
              enabled: '{{ and .Values.tls.enabled (eq .Values.tls.format "PEM") }}'
              value: '{{ .Values.controller.podTemplates.containers.controller.volumeMounts.certs.mountPath }}'
            _KAFKA_SSL_CA_CERT_FILENAME:
              enabled: '{{ and .Values.tls.enabled (eq .Values.tls.format "PEM") (not (empty .Values.tls.caCertFilename)) }}'
              value: '{{ .Values.tls.caCertFilename }}'
            # Aux environment variables to be used in the heathcheck config
            _KAFKA__HEALTHCHECK_PROPERTIES_FILE: '/usr/share/kafka/config/healthcheck.properties'
            _KAFKA_HEALTHCHECK_SECURITY_PROTOCOL: '{{ .Values.cluster.listeners.client.protocol }}'
            _KAFKA_HEALTHCHECK_SASL_JAAS_CONFIG:
              enabled: '{{ and .Values.auth.enabled (contains "SASL" .Values.cluster.listeners.client.protocol) }}'
              value: '{{ include "application-collection.apache-kafka.jaasConfigValue" (dict "listener" .Values.cluster.listeners.client "listenerType" "controller_healthcheck" "nodeType" "controller" "hostname" "$(_KAFKA_POD_HOSTNAME)" "context" $) }}'
            _KAFKA_HEALTHCHECK_SASL_MECHANISM:
              enabled: '{{ and .Values.auth.enabled (contains "SASL" .Values.cluster.listeners.client.protocol) }}'
              value: '{{ .Values.cluster.listeners.client.saslMechanism }}'
            _KAFKA_HEALTHCHECK_SSL_KEYSTORE_LOCATION:
              enabled: '{{ and .Values.tls.enabled (eq .Values.tls.format "JKS") (not (eq .Values.tls.clientAuth "none")) }}'
              value: '{{ printf "%s/%s.keystore.jks" .Values.controller.podTemplates.containers.controller.volumeMounts.certs.mountPath "$(_KAFKA_POD_HOSTNAME)" }}'
            _KAFKA_HEALTHCHECK_SSL_KEYSTORE_PASSWORD:
              enabled: '{{ and .Values.tls.enabled (eq .Values.tls.format "JKS") (not (empty .Values.tls.keystorePassword)) (not (eq .Values.tls.clientAuth "none")) }}'
              value: '{{ .Values.tls.keystorePassword }}'
            _KAFKA_HEALTHCHECK_SSL_TRUSTSTORE_LOCATION:
              enabled: '{{ and .Values.tls.enabled (eq .Values.tls.format "JKS") }}'
              value: '{{ printf "%s/%s" .Values.controller.podTemplates.containers.controller.volumeMounts.certs.mountPath .Values.tls.truststoreFilename }}'
            _KAFKA_HEALTHCHECK_SSL_TRUSTSTORE_LOCATION_PEM:
              enabled: '{{ and .Values.tls.enabled (eq .Values.tls.format "PEM") }}'
              value: '{{ printf "%s/%s" .Values.controller.podTemplates.containers.controller.volumeMounts.certs.mountPath (ternary .Values.tls.caCertFilename (printf "%s.crt" "$(_KAFKA_POD_HOSTNAME)") (not (empty .Values.tls.caCertFilename))) }}'
            _KAFKA_HEALTHCHECK_SSL_TRUSTSTORE_PASSWORD:
              enabled: '{{ and .Values.tls.enabled (eq .Values.tls.format "JKS") (not (empty .Values.tls.truststorePassword)) }}'
              value: '{{ .Values.tls.truststorePassword }}'
            _KAFKA_HEALTHCHECK_SSL_KEY_PASSWORD:
              enabled: '{{ and .Values.tls.enabled (not (empty .Values.tls.keystoreKeyPassword)) (not (eq .Values.tls.clientAuth "none")) }}'
              value: '{{ .Values.tls.keystoreKeyPassword }}'
            _KAFKA_HEALTHCHECK_SSL_KEYSTORE_TYPE:
              enabled: '{{ .Values.tls.enabled }}'
              value: '{{ .Values.tls.format }}'
            _KAFKA_HEALTHCHECK_SSL_TRUSTSTORE_TYPE:
              enabled: '{{ .Values.tls.enabled }}'
              value: '{{ .Values.tls.format }}'
            _KAFKA_HEALTHCHECK_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM:
              enabled: '{{ and .Values.tls.enabled (not .Values.tls.hostnameVerification) }}'
              value: ""
            # General configuration
            KAFKA_PROCESS_ROLES: '{{- ternary "broker,controller" "controller" .Values.cluster.controllerBrokerRole }}'
            KAFKA_CONTROLLER_QUORUM_VOTERS: '{{ include "application-collection.apache-kafka.quorumVoters" . }}'
            KAFKA_LISTENERS: '{{ ternary (include "application-collection.apache-kafka.listeners" (dict "listeners" (list "client" "controller" "interbroker") "nodeType" "controller" "hostname" "$(_KAFKA_POD_HOSTNAME)" "context" $)) (include "application-collection.apache-kafka.listeners" (dict "listeners" (list "controller") "nodeType" "controller" "hostname" "$(_KAFKA_POD_HOSTNAME)" "context" $)) .Values.cluster.controllerBrokerRole }}'
            KAFKA_ADVERTISED_LISTENERS:
              enabled: '{{ .Values.cluster.controllerBrokerRole }}'
              value: '{{ include "application-collection.apache-kafka.listeners" (dict "listeners" (list "client" "interbroker") "nodeType" "controller" "hostname" "$(_KAFKA_POD_HOSTNAME)" "context" $) }}'
            KAFKA_CONTROLLER_LISTENER_NAMES: '{{ .Values.cluster.listeners.controller.name }}'
            KAFKA_INTER_BROKER_LISTENER_NAME:
              enabled: '{{ .Values.cluster.controllerBrokerRole }}'
              value: '{{ .Values.cluster.listeners.interbroker.name }}'
            KAFKA_LOG_DIRS: '{{ include "application-collection.apache-kafka.logDirs" (dict "logDir" .Values.controller.logDir "logSubDir" .Values.controller.logSubDir "context" $) }}'
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:
              enabled: '{{ not (empty .Values.cluster.offsetsTopicReplicationFactor) }}'
              value: '{{ int .Values.cluster.offsetsTopicReplicationFactor }}'
            KAFKA_NUM_PARTITIONS:
              enabled: '{{ not (empty .Values.cluster.numPartitions) }}'
              value: '{{ int .Values.cluster.numPartitions }}'
            KAFKA_HEAP_OPTS:
              enabled: '{{ not (empty .Values.controller.heapOpts) }}'
              value: '{{ .Values.controller.heapOpts }}'
            CLUSTER_ID:
              enabled: true
              valueFrom:
                configMapKeyRef:
                  name: '{{ coalesce .Values.cluster.clusterConfigMap (include "application-collection.fullName" (dict "suffix" "cluster" "context" $)) }}'
                  key: '{{ default "clusterID" .Values.cluster.clusterIDKey }}'
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: '{{ include "application-collection.apache-kafka.protocolMap" . }}'
            # SASL configuration
            KAFKA_SASL_MECHANISM_CONTROLLER_PROTOCOL:
              enabled: '{{ and .Values.auth.enabled (contains "SASL" .Values.cluster.listeners.controller.protocol) }}'
              value: '{{ .Values.cluster.listeners.controller.saslMechanism }}'
            KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL:
              enabled: '{{ and .Values.auth.enabled (contains "SASL" .Values.cluster.listeners.interbroker.protocol) }}'
              value: '{{ .Values.cluster.listeners.interbroker.saslMechanism }}'
            KAFKA_SASL_ENABLED_MECHANISMS:
              enabled: '{{ .Values.auth.enabled }}'
              value: '{{ .Values.auth.sasl.enabledMechanisms }}'
            ? '{{ include "application-collection.apache-kafka.jaasConfigKey" (dict "listener" .Values.cluster.listeners.client "context" $) }}'
            : enabled: '{{ and .Values.auth.enabled (contains "SASL" .Values.cluster.listeners.client.protocol) }}'
              value: '{{ include "application-collection.apache-kafka.jaasConfigValue" (dict "listener" .Values.cluster.listeners.client "listenerType" "client" "nodeType" "controller" "hostname" "$(_KAFKA_POD_HOSTNAME)" "context" $) }}'
            ? '{{ include "application-collection.apache-kafka.jaasConfigKey" (dict "listener" .Values.cluster.listeners.controller "context" $) }}'
            : enabled: '{{ and .Values.auth.enabled (contains "SASL" .Values.cluster.listeners.controller.protocol) }}'
              value: '{{ include "application-collection.apache-kafka.jaasConfigValue" (dict "listener" .Values.cluster.listeners.controller "listenerType" "controller" "nodeType" "controller" "hostname" "$(_KAFKA_POD_HOSTNAME)" "context" $) }}'
            ? '{{ include "application-collection.apache-kafka.jaasConfigKey" (dict "listener" .Values.cluster.listeners.interbroker "context" $) }}'
            : enabled: '{{ and .Values.auth.enabled (contains "SASL" .Values.cluster.listeners.interbroker.protocol) }}'
              value: '{{ include "application-collection.apache-kafka.jaasConfigValue" (dict "listener" .Values.cluster.listeners.interbroker "listenerType" "interbroker" "nodeType" "controller" "hostname" "$(_KAFKA_POD_HOSTNAME)" "context" $) }}'
            '{{ printf "%s_%s_%s" "KAFKA_LISTENER_NAME" .Values.cluster.listeners.client.name "SASL_ENABLED_MECHANISMS" }}':
              enabled: '{{ and .Values.auth.enabled (contains "SASL" .Values.cluster.listeners.client.protocol) }}'
              value: '{{ .Values.cluster.listeners.client.saslMechanism }}'
            '{{ printf "%s_%s_%s" "KAFKA_LISTENER_NAME" .Values.cluster.listeners.controller.name "SASL_ENABLED_MECHANISMS" }}':
              enabled: '{{ and .Values.auth.enabled (contains "SASL" .Values.cluster.listeners.controller.protocol) }}'
              value: '{{ .Values.cluster.listeners.controller.saslMechanism }}'
            '{{ printf "%s_%s_%s" "KAFKA_LISTENER_NAME" .Values.cluster.listeners.interbroker.name "SASL_ENABLED_MECHANISMS" }}':
              enabled: '{{ and .Values.auth.enabled (contains "SASL" .Values.cluster.listeners.interbroker.protocol) }}'
              value: '{{ .Values.cluster.listeners.interbroker.saslMechanism }}'
            KAFKA_SASL_OAUTHBEARER_JWKS_ENDPOINT_URL:
              enabled: '{{ and .Values.auth.enabled (contains "OAUTHBEARER" .Values.auth.sasl.enabledMechanisms) }}'
              value: '{{ .Values.auth.sasl.oauthbearer.jwksEndpointUrl }}'
            KAFKA_SASL_OAUTHBEARER_TOKEN_ENDPOINT_URL:
              enabled: '{{ and .Values.auth.enabled (contains "OAUTHBEARER" .Values.auth.sasl.enabledMechanisms) }}'
              value: '{{ .Values.auth.sasl.oauthbearer.tokenEndpointUrl }}'
            KAFKA_SASL_KERBEROS_SERVICE_NAME:
              enabled: '{{ and .Values.auth.enabled (contains "GSSAPI" .Values.auth.sasl.enabledMechanisms) }}'
              value: '{{ include "application-collection.render.serviceName" (dict "nodeType" "controller" "context" $) }}'
            # SSL configuration
            KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM:
              enabled: '{{ and .Values.tls.enabled (not .Values.tls.hostnameVerification) }}'
              value: ""
            KAFKA_SSL_CLIENT_AUTH:
              enabled: '{{ .Values.tls.enabled }}'
              value: '{{ .Values.tls.clientAuth }}'
            KAFKA_SSL_KEYSTORE_TYPE:
              enabled: '{{ .Values.tls.enabled }}'
              value: '{{ .Values.tls.format }}'
            KAFKA_SSL_TRUSTSTORE_TYPE:
              enabled: '{{ .Values.tls.enabled }}'
              value: '{{ .Values.tls.format }}'
            KAFKA_SSL_KEYSTORE_LOCATION:
              enabled: '{{ and .Values.tls.enabled (eq .Values.tls.format "JKS") }}'
              value: '{{ printf "%s/%s.keystore.jks" .Values.controller.podTemplates.containers.controller.volumeMounts.certs.mountPath "$(_KAFKA_POD_HOSTNAME)" }}'
            KAFKA_SSL_KEYSTORE_PASSWORD:
              enabled: '{{ and .Values.tls.enabled (eq .Values.tls.format "JKS") (not (empty .Values.tls.keystorePassword)) }}'
              value: '{{ .Values.tls.keystorePassword }}'
            KAFKA_SSL_TRUSTSTORE_LOCATION:
              enabled: '{{ and .Values.tls.enabled (eq .Values.tls.format "JKS") }}'
              value: '{{ printf "%s/%s" .Values.controller.podTemplates.containers.controller.volumeMounts.certs.mountPath .Values.tls.truststoreFilename }}'
            KAFKA_SSL_TRUSTSTORE_LOCATION_PEM:
              enabled: '{{ and .Values.tls.enabled (eq .Values.tls.format "PEM") }}'
              value: '{{ printf "%s/%s" .Values.controller.podTemplates.containers.controller.volumeMounts.certs.mountPath (ternary .Values.tls.caCertFilename (printf "%s.crt" "$(_KAFKA_POD_HOSTNAME)") (not (empty .Values.tls.caCertFilename))) }}'
            KAFKA_SSL_TRUSTSTORE_PASSWORD:
              enabled: '{{ and .Values.tls.enabled (eq .Values.tls.format "JKS") (not (empty .Values.tls.truststorePassword)) }}'
              value: '{{ .Values.tls.truststorePassword }}'
            KAFKA_SSL_KEY_PASSWORD:
              enabled: '{{ and .Values.tls.enabled (not (empty .Values.tls.keystoreKeyPassword)) }}'
              value: '{{ .Values.tls.keystoreKeyPassword }}'
          # -- List of sources from which to populate environment variables to the Apache Kafka container (e.g. a ConfigMaps or a Secret)
          # @default -- See `values.yaml`
          envFrom:
            - secretRef:
                name: '{{ ternary (include "application-collection.fullName" (dict "suffix" "users" "context" $)) .Values.auth.sasl.plain.usersExistingSecret (empty .Values.auth.sasl.plain.usersExistingSecret) }}'
          # -- Volume mount templates for the Apache Kafka container, templates are allowed in all fields
          # @default -- See `values.yaml`
          # Each field has the volume mount name as key, and a YAML string template with the values; you must set `enabled: true` to enable it
          volumeMounts:
            conf:
              enabled: '{{ eq (include "application-collection.render.boolean" (dict "template" .Values.controller.configMap.enabled "context" $)) "true" }}'
              mountPath: /mnt/kafka/config
              readOnly: true
            data:
              enabled: true
              mountPath: /mnt/kafka/data
            scripts:
              enabled: true
              mountPath: /mnt/kafka/scripts
              readOnly: true
            certs:
              enabled: '{{ .Values.tls.enabled }}'
              mountPath: /mnt/kafka/certs
              readOnly: true
            sasl:
              enabled: '{{ and .Values.auth.enabled (contains "GSSAPI" .Values.auth.sasl.enabledMechanisms) }}'
              mountPath: /mnt/kafka/sasl
              readOnly: true
            logs:
              enabled: true
              volumeCount: '{{ .Values.cluster.disksPerBroker }}'
              mountPath: /mnt/kafka/logs
          # -- Custom resource requirements for the Apache Kafka container
          resources: {}
          # We usually recommend not to specify default resources and to leave this as a conscious
          # choice for the user. This also increases chances charts run on environments with little
          # resources, such as Minikube. If you do want to specify resources, uncomment the following
          # lines, adjust them as necessary, and remove the curly braces after 'resources:'
          #   limits:
          #    cpu: 100m
          #    memory: 128Mi
          #   requests:
          #    cpu: 100m
          #    memory: 128Mi
          # -- Security context override for the Apache Kafka container (if set, `containerSecurityContext.*` values will be ignored for this container)
          securityContext: {}
          livenessProbe:
            # -- Enable liveness probe for Apache Kafka
            enabled: true
            # -- Command to execute for the Apache Kafka startup probe
            # @default -- See `values.yaml`
            tcpSocket:
              port: controller
            # -- Number of seconds after the Apache Kafka container has started before liveness probes are initiated
            initialDelaySeconds: 45
            # -- How often (in seconds) to perform the Apache Kafka liveness probe
            periodSeconds: 15
            # -- Number of seconds after which the Apache Kafka liveness probe times out
            timeoutSeconds: 5
            # -- Minimum consecutive failures for the Apache Kafka liveness probe to be considered failed after having succeeded
            failureThreshold: 5
            # -- Minimum consecutive successes for the Apache Kafka liveness probe to be considered successful after having failed
            successThreshold: 1
          readinessProbe:
            # -- Enable readiness probe for Apache Kafka
            enabled: true
            # -- Command to execute for the Apache Kafka startup probe
            # @default -- See `values.yaml`
            exec:
              command:
                - /mnt/kafka/scripts/apache-kafka-readiness-check.sh
            # -- Number of seconds after the Apache Kafka container has started before readiness probes are initiated
            initialDelaySeconds: 30
            # -- How often (in seconds) to perform the Apache Kafka readiness probe
            periodSeconds: 15
            # -- Number of seconds after which the Apache Kafka readiness probe times out
            timeoutSeconds: 5
            # -- Minimum consecutive failures for the Apache Kafka readiness probe to be considered failed after having succeeded
            failureThreshold: 5
            # -- Minimum consecutive successes for the Apache Kafka readiness probe to be considered successful after having failed
            successThreshold: 1
          startupProbe:
            # -- Enable startup probe for Apache Kafka
            enabled: false
            # -- Port number used to check if the Apache Kafka service is alive
            # @default -- See `values.yaml`
            tcpSocket:
              port: controller
            # -- Number of seconds after the Apache Kafka container has started before startup probes are initiated
            initialDelaySeconds: 0
            # -- How often (in seconds) to perform the Apache Kafka startup probe
            periodSeconds: 15
            # -- Number of seconds after which the Apache Kafka startup probe times out
            timeoutSeconds: 5
            # -- Minimum consecutive failures for the Apache Kafka startup probe to be considered failed after having succeeded
            failureThreshold: 10
            # -- Minimum consecutive successes for the Apache Kafka startup probe to be considered successful after having failed
            successThreshold: 1
          # -- Custom attributes for the Apache Kafka container (see [`Container` API spec](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#Container))
          "*":
          # Note: This field is only added for documentation purposes
      # -- Custom pull secrets for the Apache Kafka container in the PodTemplate
      imagePullSecrets: []
      # -- Volume templates for the Apache Kafka PodTemplate, templates are allowed in all fields
      # @default -- See `values.yaml`
      # Each field has the volume name as key, and a YAML string template with the values; you must set `enabled: true` to enable it
      volumes:
        conf:
          enabled: '{{ eq (include "application-collection.render.boolean" (dict "template" .Values.controller.configMap.enabled "context" $)) "true" }}'
          configMap:
            name: '{{ include "application-collection.fullName" (dict "suffix" "controller" "context" $) }}'
        data:
          enabled: '{{ and (not .Values.controller.statefulset.volumeClaimTemplates) (not .Values.persistence.enabled) }}'
          emptyDir:
            medium: ""
        scripts:
          enabled: true
          configMap:
            name: '{{ include "application-collection.fullName" (dict "suffix" "controller-scripts" "context" $) }}'
            defaultMode: 0o550
        certs:
          enabled: '{{ .Values.tls.enabled }}'
          secret:
            secretName: '{{ tpl .Values.tls.existingSecret . }}'
            defaultMode: 0o400
        sasl:
          enabled: '{{ and .Values.auth.enabled (contains "GSSAPI" .Values.auth.sasl.enabledMechanisms) }}'
          secret:
            secretName: '{{ tpl .Values.auth.sasl.gssapi.existingSecret . }}'
            defaultMode: 0o400
        logs:
          enabled: '{{ and (not .Values.controller.statefulset.volumeClaimTemplates) (not .Values.persistence.enabled) }}'
          volumeCount: '{{ int .Values.cluster.disksPerBroker }}'
          emptyDir:
            medium: ""
      # -- Service account name override for the pods in the Apache Kafka PodTemplate (if set, `serviceAccount.name` will be ignored)
      serviceAccountName: ""
      # -- Security context override for the pods in the Apache Kafka PodTemplate (if set, `podSecurityContext.*` values will be ignored)
      securityContext: {}
      # -- Custom attributes for the pods in the Apache Kafka PodTemplate (see [`PodSpec` API reference](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#PodSpec))
      "*":
      # Note: This field is only added for documentation purposes

    service:
      # -- Create a service for Apache Kafka (apart from the headless service)
      enabled: true
      # -- Custom annotations to add to the service for Apache Kafka
      annotations: {}
      # -- Apache Kafka service type
      type: ClusterIP
      # Apache Kafka service nodePort values
      nodePorts:
        # -- (int32) Service nodePort override for Apache Kafka client connections
        client: ""
        # -- (int32) Service nodePort override for Apache Kafka controller connections
        controller: ""
        # -- (int32) Service nodePort override for Apache Kafka interbroker connections
        interbroker: ""
        # -- (int32) Service nodePort override for custom Apache Kafka ports specified in `containerPorts.*`
        "*":
        # Note: This field is only added for documentation purposes
      # Service port values
      ports:
        # -- (int32) Service port override for Apache Kafka client connections
        client: ""
        # -- (int32) Apache Kafka port number for controller connections
        controller: ""
        # -- (int32) Apache Kafka port number for interbroker connections
        interbroker: ""
        # -- (int32) Service port override for custom Apache Kafka ports specified in `containerPorts.*`
        "*":
        # Note: This field is only added for documentation purposes
      # -- Custom attributes for the Apache Kafka service (see [`ServiceSpec` API reference](https://kubernetes.io/docs/reference/kubernetes-api/service-resources/service-v1/#ServiceSpec))
      "*":
      # Note: This field is only added for documentation purposes

    headlessService:
      # -- Custom annotations to add to the headless service for Apache Kafka
      annotations: {}
      # -- Apache Kafka headless service type
      type: ClusterIP
      # IP address of the service
      # When clusterIP is "None", no virtual IP is allocated and the endpoints are published as a set of endpoints rather than a virtual IP
      clusterIP: None
      # -- Disregard indications of ready/not-ready
      # The primary use case for setting this field is for a StatefulSet's Headless Service to propagate SRV DNS records for its Pods for the purpose of peer discovery
      publishNotReadyAddresses: true
      # Headless service port values
      ports:
        # -- (int32) Headless service port override for Apache Kafka client connections
        client: ""
        # -- (int32) Apache Kafka port number for controller connections
        controller: ""
        # -- (int32) Apache Kafka port number for interbroker connections
        interbroker: ""
        # -- (int32) Headless service port override for custom Apache Kafka ports specified in `containerPorts.*`
        "*":
        # Note: This field is only added for documentation purposes
      # -- Custom attributes for the Apache Kafka headless service (see [`ServiceSpec` API reference](https://kubernetes.io/docs/reference/kubernetes-api/service-resources/service-v1/#ServiceSpec))
      "*":
      # Note: This field is only added for documentation purposes

    podDisruptionBudget:
      # -- Create a pod disruption budget
      enabled: false
      # -- Number of pods from that set that must still be available after the eviction, this option is mutually exclusive with maxUnavailable
      minAvailable: ""
      # -- Number of pods from that can be unavailable after the eviction, this option is mutually exclusive with minAvailable
      maxUnavailable: ""

    networkPolicy:
      # -- Create a NetworkPolicy resource
      enabled: false
      # -- Allow all external connections from and to the pods
      allowExternalConnections: true
      egress:
        # -- Create an egress network policy (requires also `controller.networkPolicy.enabled`)
        enabled: true
        # -- Allow all external egress connections from the pods (requires also `controller.networkPolicy.allowExternalConnections`)
        allowExternalConnections: true
        # -- Custom additional egress rules to enable in the NetworkPolicy resource
        extraRules: []
        # -- List of namespace labels for which to allow egress connections, when external connections are disallowed
        namespaceLabels: {}
        # -- List of pod labels for which to allow egress connections, when external connections are disallowed
        podLabels: {}
        # Network policy port overrides for egress connections
        ports:
          # -- (int32) Network policy port override for Apache Kafka client connections for egress connections
          client: ""
          # -- (int32) Network policy port override for Apache Kafka controller connections for egress connections
          controller: ""
          # -- (int32) Network policy port override for Apache Kafka interbroker connections for egress connections
          interbroker: ""
          # -- (int32) Network policy port override for custom ports specified in `containerPorts.*` for egress connections
          "*":
          # Note: This field is only added for documentation purposes
      ingress:
        # -- Create an ingress network policy (requires also `controller.networkPolicy.enabled`)
        enabled: true
        # -- Allow all external ingress connections to the pods (requires also `controller.networkPolicy.allowExternalConnections`)
        allowExternalConnections: true
        # -- List of namespace labels for which to allow ingress connections, when external connections are disallowed
        namespaceLabels: {}
        # -- List of pod labels for which to allow ingress connections, when external connections are disallowed
        podLabels: {}
        # -- Custom additional ingress rules to enable in the NetworkPolicy resource
        extraRules: []
        # Network policy port overrides for ingress connections
        ports:
          # -- (int32) Network policy port override for Apache Kafka client connections for ingress connections
          client: ""
          # -- (int32) Network policy port override for Apache Kafka controller connections for ingress connections
          controller: ""
          # -- (int32) Network policy port override for Apache Kafka interbroker connections for ingress connections
          interbroker: ""
          # -- (int32) Network policy port override for custom ports specified in `containerPorts.*` for ingress connections
          "*":
          # Note: This field is only added for documentation purposes

  broker:
    # -- Whether to deploy broker-only nodes
    enabled: false
    # -- Java heapOpts
    heapOpts: "-Xms512M -Xmx512M"
    # -- Directory where the Apache Kafka broker stores its log data.
    logDir: '{{ .Values.broker.podTemplates.containers.broker.volumeMounts.logs.mountPath }}'
    # -- Subdirectory appended to .Values.broker.logDir. Allows for "ext4" storageClass support.
    logSubDir: ""
    # -- Configuration file name for the brokers' server properties in the config map
    configurationFile: server.properties
    # -- Extra configurations to add to the controller configuration file. Can be defined as a string, a key-value (string-string) map, or an array of entries.
    configuration: ""
    # -- Name of an existing config map for extra configurations to add to the Apache Kafka configuration file
    existingConfigMap: ""
    # -- ConfigMaps to deploy
    # @default -- See `values.yaml`
    configMap:
      # -- Create a config map for Apache Kafka configuration
      # @default -- `true` if no broker.existingConfigMap is provided and the broker.configuration is not empty, `false` otherwise
      enabled: '{{ and (not .Values.broker.existingConfigMap) (not (empty .Values.broker.configuration)) }}'
      # See: https://kafka.apache.org/documentation/#configuration
      '{{ .Values.broker.configurationFile }}': '{{ tpl (include "application-collection.apache-kafka.configuration" (dict "values" .Values.broker.configuration "context" $)) . }}'
      # -- (string) Custom configuration file to include, templates are allowed both in the config map name and contents
      "*":
      # Note: This field is only added for documentation purposes

    statefulset:
      # -- Enable the StatefulSet template for Apache Kafka standalone brokers
      enabled: true
      # -- Override for the Apache Kafka' StatefulSet serviceName field, it will be autogenerated if unset
      serviceName: ""
      # -- Template to use for all pods created by the Apache Kafka StatefulSet (overrides `podTemplates.*`)
      template: {}
      # -- Desired number of PodTemplate replicas for Apache Kafka broker (overrides `cluster.nodeCount.broker`)
      replicas: ""
      # -- Strategy that will be employed to update the pods in the Apache Kafka StatefulSet
      # @default -- See `values.yaml`
      updateStrategy:
        type: RollingUpdate
      # -- How Apache Kafka pods are created during the initial scaleup
      podManagementPolicy: Parallel
      # -- Lifecycle of the persistent volume claims created from Apache Kafka volumeClaimTemplates
      persistentVolumeClaimRetentionPolicy: {}
      #  whenScaled: Retain
      #  whenDeleted: Retain
      # -- Volume claim templates for the Apache Kafka statefulset, templates are allowed in all fields
      # @default -- See `values.yaml`
      # Each field has the volumeClaimTemplate name as key, and a YAML string template with the values; you must set `enabled: true` to enable it
      volumeClaimTemplates:
        data:
          enabled: '{{ .Values.persistence.enabled }}'
        logs:
          enabled: '{{ .Values.persistence.enabled }}'
          volumeCount: '{{ int .Values.cluster.disksPerBroker }}'
      # -- Custom attributes for the Apache Kafka StatefulSet (see [`StatefulSetSpec` API reference](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/stateful-set-v1/#StatefulSetSpec))
      "*":
      # Note: This field is only added for documentation purposes

    podTemplates:
      # -- Annotations to add to all pods in the Apache Kafka StatefulSet's PodTemplate
      # @default -- See `values.yaml`
      annotations:
        kubectl.kubernetes.io/default-container: broker
      # -- Labels to add to all pods in the Apache Kafka StatefulSet's PodTemplate
      labels: {}
      # -- Number of seconds prior to the container being forcibly terminated when marked for deletion or restarted.
      terminationGracePeriodSeconds: 120
      # -- Init containers to deploy in the Apache Kafka PodTemplate
      # @default -- See `values.yaml`
      # Each field has the init container name as key, and a YAML object template with the values; you must set `enabled: true` to enable it
      initContainers:
        volume-permissions:
          # -- Enable the volume-permissions init container in the Apache Kafka PodTemplate
          enabled: false
          # -- Image override for the Apache Kafka volume-permissions init container (if set, `images.volume-permissions.{name,tag,digest}` values will be ignored for this container)
          image: ""
          # -- Image pull policy override for the Apache Kafka volume-permissions init container (if set `images.volume-permissions.pullPolicy` values will be ignored for this container)
          imagePullPolicy: ""
          # -- Entrypoint override for the Apache Kafka volume-permissions container
          # @default -- See `values.yaml`
          command:
            - /bin/sh
            - -ec
            - |
              chown -R {{ .Values.containerSecurityContext.runAsUser }}:{{ .Values.podSecurityContext.fsGroup }} /mnt/kafka/data
          # -- Arguments override for the Apache Kafka volume-permissions init container entrypoint
          args: []
          # -- Object with the environment variables templates to use in the Apache Kafka volume-permissions init container, the values can be specified as an object or a string; when using objects you must also set `enabled: true` to enable it
          # @default -- No environment variables are set
          env: {}
          # -- List of sources from which to populate environment variables to the Apache Kafka volume-permissions init container (e.g. a ConfigMaps or a Secret)
          envFrom: []
          # -- Custom volume mounts for the Apache Kafka volume-permissions init container, templates are allowed in all fields
          # @default -- See `values.yaml`
          # Each field has the volume mount name as key, and a YAML string template with the values; you must set `enabled: true` to enable it
          volumeMounts:
            data:
              enabled: true
              mountPath: /mnt/kafka/data
          # -- Apache Kafka init-containers resource requirements
          resources: {}
          # We usually recommend not to specify default resources and to leave this as a conscious
          # choice for the user. This also increases chances charts run on environments with little
          # resources, such as Minikube. If you do want to specify resources, uncomment the following
          # lines, adjust them as necessary, and remove the curly braces after 'resources:'
          #   limits:
          #    cpu: 100m
          #    memory: 128Mi
          #   requests:
          #    cpu: 100m
          #    memory: 128Mi
          # -- Security context override for the Apache Kafka volume-permissions init container (if set, `containerSecurityContext.*` values will be ignored for this container)
          # @default -- See `values.yaml`
          securityContext:
            runAsUser: 0
          # -- Custom attributes for the Apache Kafka volume-permissions init container (see [`Container` API spec](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#Container))
          "*":
          # Note: This field is only added for documentation purposes
      # -- Containers to deploy in the Apache Kafka PodTemplate
      # @default -- See `values.yaml`
      # Each field has the container name as key, and a YAML object template with the values; you must set `enabled: true` to enable it
      containers:
        broker:
          # -- Enable the Apache Kafka container in the PodTemplate
          enabled: true
          # -- Image override for the Apache Kafka container (if set, `images.broker.{name,tag,digest}` values will be ignored for this container)
          image: ""
          # -- Image pull policy override for the Apache Kafka container (if set `images.broker.pullPolicy` values will be ignored for this container)
          imagePullPolicy: ""
          # -- Entrypoint override for the Apache Kafka container
          # @default -- See `values.yaml`
          command:
            - /bin/bash
            - -ec
            - |
              exec /mnt/kafka/scripts/apache-kafka-entrypoint.sh
          # -- Arguments override for the Apache Kafka container entrypoint
          args: []
          # -- Ports override for the Apache Kafka container (if set, `containerPorts.*` values will be ignored for this container)
          ports: {}
          # -- Object with the environment variables templates to use in the Apache Kafka container, the values can be specified as an object or a string; when using objects you must also set `enabled: true` to enable it
          # @default -- See `values.yaml`
          env:
            # Aux environment variables to be used for authentication
            _KAFKA_INTERBROKER_USER:
              enabled: '{{ and .Values.auth.enabled (contains "PLAIN" .Values.auth.sasl.enabledMechanisms) }}'
              valueFrom:
                secretKeyRef:
                  name: '{{ coalesce .Values.auth.sasl.plain.interbroker.existingSecret (include "application-collection.fullName" (dict "suffix" "auth" "context" $)) }}'
                  key: '{{ default "interbroker-user" .Values.auth.sasl.plain.interbroker.usernameKey }}'
            _KAFKA_INTERBROKER_PASSWORD:
              enabled: '{{ and .Values.auth.enabled (contains "PLAIN" .Values.auth.sasl.enabledMechanisms) }}'
              valueFrom:
                secretKeyRef:
                  name: '{{ coalesce .Values.auth.sasl.plain.interbroker.existingSecret (include "application-collection.fullName" (dict "suffix" "auth" "context" $)) }}'
                  key: '{{ default "interbroker-password" .Values.auth.sasl.plain.interbroker.passwordKey }}'
            # Aux environment variables to be used in the init cluster config
            _KAFKA_POD_HOSTNAME:
              enabled: true
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            _KAFKA_MIN_BROKER_ID: '{{ default 0 .Values.cluster.minBrokerID }}'
            # Aux environment variables to be used for TLS PEM configuration
            _KAFKA_SSL_CERT_DIR:
              enabled: '{{ and .Values.tls.enabled (eq .Values.tls.format "PEM") }}'
              value: '{{ .Values.broker.podTemplates.containers.broker.volumeMounts.certs.mountPath }}'
            _KAFKA_SSL_CA_CERT_FILENAME:
              enabled: '{{ and .Values.tls.enabled (eq .Values.tls.format "PEM") (not (empty .Values.tls.caCertFilename)) }}'
              value: '{{ .Values.tls.caCertFilename }}'
            # Aux environment variables to be used in the heathcheck config
            _KAFKA__HEALTHCHECK_PROPERTIES_FILE: '/usr/share/kafka/config/healthcheck.properties'
            _KAFKA_HEALTHCHECK_SECURITY_PROTOCOL: '{{ .Values.cluster.listeners.client.protocol }}'
            _KAFKA_HEALTHCHECK_SASL_JAAS_CONFIG:
              enabled: '{{ and .Values.auth.enabled (contains "SASL" .Values.cluster.listeners.client.protocol) }}'
              value: '{{ include "application-collection.apache-kafka.jaasConfigValue" (dict "listener" .Values.cluster.listeners.client "listenerType" "broker_healthcheck" "nodeType" "broker" "hostname" "$(_KAFKA_POD_HOSTNAME)" "context" $) }}'
            _KAFKA_HEALTHCHECK_SASL_MECHANISM:
              enabled: '{{ and .Values.auth.enabled (contains "SASL" .Values.cluster.listeners.client.protocol) }}'
              value: '{{ .Values.cluster.listeners.client.saslMechanism }}'
            _KAFKA_HEALTHCHECK_SSL_KEYSTORE_LOCATION:
              enabled: '{{ and .Values.tls.enabled (eq .Values.tls.format "JKS") (not (eq .Values.tls.clientAuth "none")) }}'
              value: '{{ printf "%s/%s.keystore.jks" .Values.broker.podTemplates.containers.broker.volumeMounts.certs.mountPath "$(_KAFKA_POD_HOSTNAME)" }}'
            _KAFKA_HEALTHCHECK_SSL_KEYSTORE_PASSWORD:
              enabled: '{{ and .Values.tls.enabled (eq .Values.tls.format "JKS") (not (empty .Values.tls.keystorePassword)) (not (eq .Values.tls.clientAuth "none")) }}'
              value: '{{ .Values.tls.keystorePassword }}'
            _KAFKA_HEALTHCHECK_SSL_TRUSTSTORE_LOCATION:
              enabled: '{{ and .Values.tls.enabled (eq .Values.tls.format "JKS") }}'
              value: '{{ printf "%s/%s" .Values.broker.podTemplates.containers.broker.volumeMounts.certs.mountPath .Values.tls.truststoreFilename }}'
            _KAFKA_HEALTHCHECK_SSL_TRUSTSTORE_LOCATION_PEM:
              enabled: '{{ and .Values.tls.enabled (eq .Values.tls.format "PEM") }}'
              value: '{{ printf "%s/%s" .Values.broker.podTemplates.containers.broker.volumeMounts.certs.mountPath (ternary .Values.tls.caCertFilename (printf "%s.crt" "$(_KAFKA_POD_HOSTNAME)") (not (empty .Values.tls.caCertFilename))) }}'
            _KAFKA_HEALTHCHECK_SSL_TRUSTSTORE_PASSWORD:
              enabled: '{{ and .Values.tls.enabled (eq .Values.tls.format "JKS") (not (empty .Values.tls.truststorePassword)) }}'
              value: '{{ .Values.tls.truststorePassword }}'
            _KAFKA_HEALTHCHECK_SSL_KEY_PASSWORD:
              enabled: '{{ and .Values.tls.enabled (not (empty .Values.tls.keystoreKeyPassword)) (not (eq .Values.tls.clientAuth "none")) }}'
              value: '{{ .Values.tls.keystoreKeyPassword }}'
            _KAFKA_HEALTHCHECK_SSL_KEYSTORE_TYPE:
              enabled: '{{ .Values.tls.enabled }}'
              value: '{{ .Values.tls.format }}'
            _KAFKA_HEALTHCHECK_SSL_TRUSTSTORE_TYPE:
              enabled: '{{ .Values.tls.enabled }}'
              value: '{{ .Values.tls.format }}'
            _KAFKA_HEALTHCHECK_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM:
              enabled: '{{ and .Values.tls.enabled (not .Values.tls.hostnameVerification) }}'
              value: ""
            # General configuration
            KAFKA_PROCESS_ROLES: 'broker'
            KAFKA_CONTROLLER_QUORUM_VOTERS: '{{ include "application-collection.apache-kafka.quorumVoters" . }}'
            KAFKA_LISTENERS: '{{ include "application-collection.apache-kafka.listeners" (dict "listeners" (list "client" "interbroker") "nodeType" "broker" "hostname" "$(_KAFKA_POD_HOSTNAME)" "context" $) }}'
            KAFKA_ADVERTISED_LISTENERS: '{{ include "application-collection.apache-kafka.listeners" (dict "listeners" (list "client" "interbroker") "nodeType" "broker" "hostname" "$(_KAFKA_POD_HOSTNAME)" "context" $) }}'
            KAFKA_CONTROLLER_LISTENER_NAMES: '{{ .Values.cluster.listeners.controller.name }}'
            KAFKA_INTER_BROKER_LISTENER_NAME: '{{ .Values.cluster.listeners.interbroker.name }}'
            KAFKA_LOG_DIRS: '{{ include "application-collection.apache-kafka.logDirs" (dict "logDir" .Values.broker.logDir "logSubDir" .Values.broker.logSubDir "context" $) }}'
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:
              enabled: '{{ not (empty .Values.cluster.offsetsTopicReplicationFactor) }}'
              value: '{{ int .Values.cluster.offsetsTopicReplicationFactor }}'
            KAFKA_NUM_PARTITIONS:
              enabled: '{{ not (empty .Values.cluster.numPartitions) }}'
              value: '{{ int .Values.cluster.numPartitions }}'
            KAFKA_HEAP_OPTS:
              enabled: '{{ not (empty .Values.broker.heapOpts) }}'
              value: '{{ .Values.broker.heapOpts }}'
            CLUSTER_ID:
              enabled: true
              valueFrom:
                configMapKeyRef:
                  name: '{{ coalesce .Values.cluster.clusterConfigMap (include "application-collection.fullName" (dict "suffix" "cluster" "context" $)) }}'
                  key: '{{ default "clusterID" .Values.cluster.clusterIDKey }}'
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: '{{ include "application-collection.apache-kafka.protocolMap" . }}'
            # SASL configuration
            KAFKA_SASL_MECHANISM_CONTROLLER_PROTOCOL:
              enabled: '{{ and .Values.auth.enabled (contains "SASL" .Values.cluster.listeners.controller.protocol) }}'
              value: '{{ .Values.cluster.listeners.controller.saslMechanism }}'
            KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL:
              enabled: '{{ and .Values.auth.enabled (contains "SASL" .Values.cluster.listeners.interbroker.protocol) }}'
              value: '{{ .Values.cluster.listeners.interbroker.saslMechanism }}'
            KAFKA_SASL_ENABLED_MECHANISMS:
              enabled: '{{ .Values.auth.enabled }}'
              value: '{{ .Values.auth.sasl.enabledMechanisms }}'
            ? '{{ include "application-collection.apache-kafka.jaasConfigKey" (dict "listener" .Values.cluster.listeners.client "context" $) }}'
            : enabled: '{{ and .Values.auth.enabled (contains "SASL" .Values.cluster.listeners.client.protocol) }}'
              value: '{{ include "application-collection.apache-kafka.jaasConfigValue" (dict "listener" .Values.cluster.listeners.client "listenerType" "client" "nodeType" "broker" "hostname" "$(_KAFKA_POD_HOSTNAME)" "context" $) }}'
            ? '{{ include "application-collection.apache-kafka.jaasConfigKey" (dict "listener" .Values.cluster.listeners.controller "context" $) }}'
            : enabled: '{{ and .Values.auth.enabled (contains "SASL" .Values.cluster.listeners.controller.protocol) }}'
              value: '{{ include "application-collection.apache-kafka.jaasConfigValue" (dict "listener" .Values.cluster.listeners.controller "listenerType" "controller" "nodeType" "broker" "hostname" "$(_KAFKA_POD_HOSTNAME)" "context" $) }}'
            ? '{{ include "application-collection.apache-kafka.jaasConfigKey" (dict "listener" .Values.cluster.listeners.interbroker "context" $) }}'
            : enabled: '{{ and .Values.auth.enabled (contains "SASL" .Values.cluster.listeners.interbroker.protocol) }}'
              value: '{{ include "application-collection.apache-kafka.jaasConfigValue" (dict "listener" .Values.cluster.listeners.interbroker "listenerType" "interbroker" "nodeType" "broker" "hostname" "$(_KAFKA_POD_HOSTNAME)" "context" $) }}'
            '{{ printf "%s_%s_%s" "KAFKA_LISTENER_NAME" .Values.cluster.listeners.client.name "SASL_ENABLED_MECHANISMS" }}':
              enabled: '{{ and .Values.auth.enabled (contains "SASL" .Values.cluster.listeners.client.protocol) }}'
              value: '{{ .Values.cluster.listeners.client.saslMechanism }}'
            '{{ printf "%s_%s_%s" "KAFKA_LISTENER_NAME" .Values.cluster.listeners.interbroker.name "SASL_ENABLED_MECHANISMS" }}':
              enabled: '{{ and .Values.auth.enabled (contains "SASL" .Values.cluster.listeners.interbroker.protocol) }}'
              value: '{{ .Values.cluster.listeners.interbroker.saslMechanism }}'
            KAFKA_SASL_OAUTHBEARER_JWKS_ENDPOINT_URL:
              enabled: '{{ and .Values.auth.enabled (contains "OAUTHBEARER" .Values.auth.sasl.enabledMechanisms) }}'
              value: '{{ .Values.auth.sasl.oauthbearer.jwksEndpointUrl }}'
            KAFKA_SASL_OAUTHBEARER_TOKEN_ENDPOINT_URL:
              enabled: '{{ and .Values.auth.enabled (contains "OAUTHBEARER" .Values.auth.sasl.enabledMechanisms) }}'
              value: '{{ .Values.auth.sasl.oauthbearer.tokenEndpointUrl }}'
            KAFKA_SASL_KERBEROS_SERVICE_NAME:
              enabled: '{{ and .Values.auth.enabled (contains "GSSAPI" .Values.auth.sasl.enabledMechanisms) }}'
              value: '{{ include "application-collection.render.serviceName" (dict "nodeType" "broker" "context" $) }}'
            # SSL configuration
            KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM:
              enabled: '{{ and .Values.tls.enabled (not .Values.tls.hostnameVerification) }}'
              value: ""
            KAFKA_SSL_CLIENT_AUTH:
              enabled: '{{ .Values.tls.enabled }}'
              value: '{{ .Values.tls.clientAuth }}'
            KAFKA_SSL_KEYSTORE_TYPE:
              enabled: '{{ .Values.tls.enabled }}'
              value: '{{ .Values.tls.format }}'
            KAFKA_SSL_TRUSTSTORE_TYPE:
              enabled: '{{ .Values.tls.enabled }}'
              value: '{{ .Values.tls.format }}'
            KAFKA_SSL_KEYSTORE_LOCATION:
              enabled: '{{ and .Values.tls.enabled (eq .Values.tls.format "JKS") }}'
              value: '{{ printf "%s/%s.keystore.jks" .Values.broker.podTemplates.containers.broker.volumeMounts.certs.mountPath "$(_KAFKA_POD_HOSTNAME)" }}'
            KAFKA_SSL_KEYSTORE_PASSWORD:
              enabled: '{{ and .Values.tls.enabled (eq .Values.tls.format "JKS") (not (empty .Values.tls.keystorePassword)) }}'
              value: '{{ .Values.tls.keystorePassword }}'
            KAFKA_SSL_TRUSTSTORE_LOCATION:
              enabled: '{{ and .Values.tls.enabled (eq .Values.tls.format "JKS") }}'
              value: '{{ printf "%s/%s" .Values.broker.podTemplates.containers.broker.volumeMounts.certs.mountPath .Values.tls.truststoreFilename }}'
            KAFKA_SSL_TRUSTSTORE_LOCATION_PEM:
              enabled: '{{ and .Values.tls.enabled (eq .Values.tls.format "PEM") }}'
              value: '{{ printf "%s/%s" .Values.broker.podTemplates.containers.broker.volumeMounts.certs.mountPath (ternary .Values.tls.caCertFilename (printf "%s.crt" "$(_KAFKA_POD_HOSTNAME)") (not (empty .Values.tls.caCertFilename))) }}'
            KAFKA_SSL_TRUSTSTORE_PASSWORD:
              enabled: '{{ and .Values.tls.enabled (eq .Values.tls.format "JKS") (not (empty .Values.tls.truststorePassword)) }}'
              value: '{{ .Values.tls.truststorePassword }}'
            KAFKA_SSL_KEY_PASSWORD:
              enabled: '{{ and .Values.tls.enabled (not (empty .Values.tls.keystoreKeyPassword)) }}'
              value: '{{ .Values.tls.keystoreKeyPassword }}'
          # -- List of sources from which to populate environment variables to the Apache Kafka container (e.g. a ConfigMaps or a Secret)
          # @default -- See `values.yaml`
          envFrom:
            - secretRef:
                name: '{{ ternary (include "application-collection.fullName" (dict "suffix" "users" "context" $)) .Values.auth.sasl.plain.usersExistingSecret (empty .Values.auth.sasl.plain.usersExistingSecret) }}'
          # -- Volume mount templates for the Apache Kafka container, templates are allowed in all fields
          # @default -- See `values.yaml`
          # Each field has the volume mount name as key, and a YAML string template with the values; you must set `enabled: true` to enable it
          volumeMounts:
            conf:
              enabled: '{{ eq (include "application-collection.render.boolean" (dict "template" .Values.broker.configMap.enabled "context" $)) "true" }}'
              mountPath: /mnt/kafka/config
              readOnly: true
            data:
              enabled: true
              mountPath: /mnt/kafka/data
            scripts:
              enabled: true
              mountPath: /mnt/kafka/scripts
              readOnly: true
            certs:
              enabled: '{{ .Values.tls.enabled }}'
              mountPath: /mnt/kafka/certs
              readOnly: true
            sasl:
              enabled: '{{ and .Values.auth.enabled (contains "GSSAPI" .Values.auth.sasl.enabledMechanisms) }}'
              mountPath: /mnt/kafka/sasl
              readOnly: true
            logs:
              enabled: true
              volumeCount: '{{ .Values.cluster.disksPerBroker }}'
              mountPath: /mnt/kafka/logs
          # -- Custom resource requirements for the Apache Kafka container
          resources: {}
          # We usually recommend not to specify default resources and to leave this as a conscious
          # choice for the user. This also increases chances charts run on environments with little
          # resources, such as Minikube. If you do want to specify resources, uncomment the following
          # lines, adjust them as necessary, and remove the curly braces after 'resources:'
          #   limits:
          #    cpu: 100m
          #    memory: 128Mi
          #   requests:
          #    cpu: 100m
          #    memory: 128Mi
          # -- Security context override for the Apache Kafka container (if set, `containerSecurityContext.*` values will be ignored for this container)
          securityContext: {}
          livenessProbe:
            # -- Enable liveness probe for Apache Kafka
            enabled: true
            # -- Command to execute for the Apache Kafka startup probe
            # @default -- See `values.yaml`
            tcpSocket:
              port: client
            # -- Number of seconds after the Apache Kafka container has started before liveness probes are initiated
            initialDelaySeconds: 45
            # -- How often (in seconds) to perform the Apache Kafka liveness probe
            periodSeconds: 15
            # -- Number of seconds after which the Apache Kafka liveness probe times out
            timeoutSeconds: 5
            # -- Minimum consecutive failures for the Apache Kafka liveness probe to be considered failed after having succeeded
            failureThreshold: 5
            # -- Minimum consecutive successes for the Apache Kafka liveness probe to be considered successful after having failed
            successThreshold: 1
          readinessProbe:
            # -- Enable readiness probe for Apache Kafka
            enabled: true
            # -- Command to execute for the Apache Kafka startup probe
            # @default -- See `values.yaml`
            exec:
              command:
                - /mnt/kafka/scripts/apache-kafka-readiness-check.sh
            # -- Number of seconds after the Apache Kafka container has started before readiness probes are initiated
            initialDelaySeconds: 30
            # -- How often (in seconds) to perform the Apache Kafka readiness probe
            periodSeconds: 15
            # -- Number of seconds after which the Apache Kafka readiness probe times out
            timeoutSeconds: 5
            # -- Minimum consecutive failures for the Apache Kafka readiness probe to be considered failed after having succeeded
            failureThreshold: 5
            # -- Minimum consecutive successes for the Apache Kafka readiness probe to be considered successful after having failed
            successThreshold: 1
          startupProbe:
            # -- Enable startup probe for Apache Kafka
            enabled: false
            # -- Port number used to check if the Apache Kafka service is alive
            # @default -- See `values.yaml`
            tcpSocket:
              port: client
            # -- Number of seconds after the Apache Kafka container has started before startup probes are initiated
            initialDelaySeconds: 0
            # -- How often (in seconds) to perform the Apache Kafka startup probe
            periodSeconds: 10
            # -- Number of seconds after which the Apache Kafka startup probe times out
            timeoutSeconds: 5
            # -- Minimum consecutive failures for the Apache Kafka startup probe to be considered failed after having succeeded
            failureThreshold: 10
            # -- Minimum consecutive successes for the Apache Kafka startup probe to be considered successful after having failed
            successThreshold: 1
          # -- Custom attributes for the Apache Kafka container (see [`Container` API spec](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#Container))
          "*":
          # Note: This field is only added for documentation purposes
      # -- Custom pull secrets for the Apache Kafka container in the PodTemplate
      imagePullSecrets: []
      # -- Volume templates for the Apache Kafka PodTemplate, templates are allowed in all fields
      # @default -- See `values.yaml`
      # Each field has the volume name as key, and a YAML string template with the values; you must set `enabled: true` to enable it
      volumes:
        conf:
          enabled: '{{ eq (include "application-collection.render.boolean" (dict "template" .Values.broker.configMap.enabled "context" $)) "true" }}'
          configMap:
            name: '{{ include "application-collection.fullName" (dict "suffix" "broker" "context" $) }}'
        data:
          enabled: '{{ and (not .Values.broker.statefulset.volumeClaimTemplates) (not .Values.persistence.enabled) }}'
          emptyDir:
            medium: ""
        scripts:
          enabled: true
          configMap:
            name: '{{ include "application-collection.fullName" (dict "suffix" "broker-scripts" "context" $) }}'
            defaultMode: 0o550
        certs:
          enabled: '{{ .Values.tls.enabled }}'
          secret:
            secretName: '{{ tpl .Values.tls.existingSecret . }}'
            defaultMode: 0o400
        sasl:
          enabled: '{{ and .Values.auth.enabled (contains "GSSAPI" .Values.auth.sasl.enabledMechanisms) }}'
          secret:
            secretName: '{{ tpl .Values.auth.sasl.gssapi.existingSecret . }}'
            defaultMode: 0o400
        logs:
          enabled: '{{ and (not .Values.broker.statefulset.volumeClaimTemplates) (not .Values.persistence.enabled) }}'
          volumeCount: '{{ int .Values.cluster.disksPerBroker }}'
          emptyDir:
            medium: ""
      # -- Service account name override for the pods in the Apache Kafka PodTemplate (if set, `serviceAccount.name` will be ignored)
      serviceAccountName: ""
      # -- Security context override for the pods in the Apache Kafka PodTemplate (if set, `podSecurityContext.*` values will be ignored)
      securityContext: {}
      # -- Custom attributes for the pods in the Apache Kafka PodTemplate (see [`PodSpec` API reference](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#PodSpec))
      "*":
      # Note: This field is only added for documentation purposes

    service:
      # -- Create a service for Apache Kafka (apart from the headless service)
      enabled: true
      # -- Custom annotations to add to the service for Apache Kafka
      annotations: {}
      # -- Apache Kafka service type
      type: ClusterIP
      # Apache Kafka service nodePort values
      nodePorts:
        # -- (int32) Service nodePort override for Apache Kafka client connections
        client: ""
        # -- (int32) Service nodePort override for Apache Kafka controller connections
        controller: ""
        # -- (int32) Service nodePort override for Apache Kafka interbroker connections
        interbroker: ""
        # -- (int32) Service nodePort override for custom Apache Kafka ports specified in `containerPorts.*`
        "*":
        # Note: This field is only added for documentation purposes
      # Service port values
      ports:
        # -- (int32) Service port override for Apache Kafka client connections
        client: ""
        # -- (int32) Apache Kafka port number for controller connections
        controller: ""
        # -- (int32) Apache Kafka port number for interbroker connections
        interbroker: ""
        # -- (int32) Service port override for custom Apache Kafka ports specified in `containerPorts.*`
        "*":
        # Note: This field is only added for documentation purposes
      # -- Custom attributes for the Apache Kafka service (see [`ServiceSpec` API reference](https://kubernetes.io/docs/reference/kubernetes-api/service-resources/service-v1/#ServiceSpec))
      "*":
      # Note: This field is only added for documentation purposes

    headlessService:
      # -- Custom annotations to add to the headless service for Apache Kafka
      annotations: {}
      # -- Apache Kafka headless service type
      type: ClusterIP
      # IP address of the service
      # When clusterIP is "None", no virtual IP is allocated and the endpoints are published as a set of endpoints rather than a virtual IP
      clusterIP: None
      # -- Disregard indications of ready/not-ready
      # The primary use case for setting this field is for a StatefulSet's Headless Service to propagate SRV DNS records for its Pods for the purpose of peer discovery
      publishNotReadyAddresses: true
      # Headless service port values
      ports:
        # -- (int32) Headless service port override for Apache Kafka client connections
        client: ""
        # -- (int32) Apache Kafka port number for controller connections
        controller: ""
        # -- (int32) Apache Kafka port number for interbroker connections
        interbroker: ""
        # -- (int32) Headless service port override for custom Apache Kafka ports specified in `containerPorts.*`
        "*":
        # Note: This field is only added for documentation purposes
      # -- Custom attributes for the Apache Kafka headless service (see [`ServiceSpec` API reference](https://kubernetes.io/docs/reference/kubernetes-api/service-resources/service-v1/#ServiceSpec))
      "*":
      # Note: This field is only added for documentation purposes

    podDisruptionBudget:
      # -- Create a pod disruption budget
      enabled: false
      # -- Number of pods from that set that must still be available after the eviction, this option is mutually exclusive with maxUnavailable
      minAvailable: ""
      # -- Number of pods from that can be unavailable after the eviction, this option is mutually exclusive with minAvailable
      maxUnavailable: ""

    networkPolicy:
      # -- Create a NetworkPolicy resource
      enabled: false
      # -- Allow all external connections from and to the pods
      allowExternalConnections: true
      egress:
        # -- Create an egress network policy (requires also `broker.networkPolicy.enabled`)
        enabled: true
        # -- Allow all external egress connections from the pods (requires also `broker.networkPolicy.allowExternalConnections`)
        allowExternalConnections: true
        # -- Custom additional egress rules to enable in the NetworkPolicy resource
        extraRules: []
        # -- List of namespace labels for which to allow egress connections, when external connections are disallowed
        namespaceLabels: {}
        # -- List of pod labels for which to allow egress connections, when external connections are disallowed
        podLabels: {}
        # Network policy port overrides for egress connections
        ports:
          # -- (int32) Network policy port override for Apache Kafka client connections for egress connections
          client: ""
          # -- (int32) Network policy port override for Apache Kafka controller connections for egress connections
          controller: ""
          # -- (int32) Network policy port override for Apache Kafka interbroker connections for egress connections
          interbroker: ""
          # -- (int32) Network policy port override for custom ports specified in `containerPorts.*` for egress connections
          "*":
          # Note: This field is only added for documentation purposes
      ingress:
        # -- Create an ingress network policy (requires also `broker.networkPolicy.enabled`)
        enabled: true
        # -- Allow all external ingress connections to the pods (requires also `broker.networkPolicy.allowExternalConnections`)
        allowExternalConnections: true
        # -- List of namespace labels for which to allow ingress connections, when external connections are disallowed
        namespaceLabels: {}
        # -- List of pod labels for which to allow ingress connections, when external connections are disallowed
        podLabels: {}
        # -- Custom additional ingress rules to enable in the NetworkPolicy resource
        extraRules: []
        # Network policy port overrides for ingress connections
        ports:
          # -- (int32) Network policy port override for Apache Kafka client connections for ingress connections
          client: ""
          # -- (int32) Network policy port override for Apache Kafka controller connections for ingress connections
          controller: ""
          # -- (int32) Network policy port override for Apache Kafka interbroker connections for ingress connections
          interbroker: ""
          # -- (int32) Network policy port override for custom ports specified in `containerPorts.*` for ingress connections
          "*":
          # Note: This field is only added for documentation purposes

  persistence:
    # -- Enable persistent volume claims for Apache Kafka pods
    enabled: true
    # -- Custom annotations to add to the persistent volume claims used by Apache Kafka pods
    annotations: {}
    # -- Custom labels to add to the persistent volume claims used by Apache Kafka pods
    labels: {}
    # -- Name of an existing PersistentVolumeClaim to use by Apache Kafka pods
    existingClaim: ""
    # -- Persistent volume access modes
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        # -- Size of the persistent volume claim to create for Apache Kafka pods
        storage: 8Gi
    # -- Storage class name to use for the Apache Kafka persistent volume claim
    storageClassName: ""

  podSecurityContext:
    # -- Enable pod security context
    enabled: true
    # -- Group ID that will write to persistent volumes
    fsGroup: 1000

  containerSecurityContext:
    # -- Enable container security context
    enabled: true
    # -- Allow privilege escalation within containers
    allowPrivilegeEscalation: false
    # -- Run containers as a non-root user
    runAsNonRoot: true
    # -- Which user ID to run the container as
    runAsUser: 1000

  serviceAccount:
    # -- Create or use an existing service account
    enabled: false
    # -- Add custom annotations to the ServiceAccount
    annotations: {}
    # -- Add custom labels to the ServiceAccount
    labels: {}
    # -- Name of the ServiceAccount to use
    name: ""
    # -- Whether pods running as this service account should have an API token automatically mounted
    automountServiceAccountToken: true
    # -- List of references to secrets in the same namespace to use for pulling any images in pods that reference this ServiceAccount
    imagePullSecrets: []
    # -- List of secrets in the same namespace that pods running using this ServiceAccount are allowed to use
    secrets: []


# =============================================================================
# --- google-gemma-3-4b-it ---
# =============================================================================
google-gemma-3-4b-it:
  ## @section Deployment parameters
  ## ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#affinity-and-anti-affinity
  ## @param affinity [object] [default: {}] Affinity settings for deployment.
  affinity: {}

  ## @param containerSecurityContext [object] Sets privilege and access control settings for container (Only affects the main container, not pod-level).
  containerSecurityContext: {}
    # seLinuxOptions: null
    # runAsUser: 1001
    # runAsGroup: 1001
    # runAsNonRoot: true
    # privileged: false
    # readOnlyRootFilesystem: false
    # allowPrivilegeEscalation: false
    # capabilities:
    #   drop:
    #     - ALL
    # seccompProfile:
    #   type: "RuntimeDefault"

  ## @param customCommand [array] Overrides command line options sent to the NIM with the array listed here.
  ## For advanced use if necessary only
  customCommand: []

  ## @param customArgs [array] Overrides command line arguments of the NIM container with the array listed here.
  ## For advanced use if necessary only
  customArgs: []

  ## @param env [array] Adds arbitrary environment variables to the main container.
  env: []
  # - name: OPENBLAS_NUM_THREADS
  #   value: "1"
  # - name: POD_NAME
  #   valueFrom:
  #     fieldRef:
  #       fieldPath: metadata.name

  ## @param extraVolumes [object] Adds arbitrary additional volumes to the deployment set definition.
  extraVolumes: {}
    # my-volume-name:
    #   emptyDir: {}

  ## @param extraVolumeMounts [object] Adds volume mounts to the main container from `extraVolumes`.
  extraVolumeMounts: {}
    # my-volume-name:
    #   mountPath: /mnt/myvolume

  ## @param image.repository [string] Specifies the NIM-LLM Image to deploy.
  ## @param image.tag [string] Specifies the image tag or version.
  ## @param image.pullPolicy [string] Sets the image pull policy.
  image:
    repository: nvcr.io/nvidia/google-gemma-3-4b-it
    pullPolicy: IfNotPresent
    # Tag overrides the image tag whose default is the chart appVersion.
    tag: ""

  ## @extra imagePullSecrets Specifies a list of secret names that are needed for the main container and any init containers.
  ## @skip imagePullSecrets[0].name
  imagePullSecrets:
    - name: ngc-secret  # change this to whatever your image pull secret should be

  ## @extra initContainers [object] Specifies model init containers, if needed.
  ## @param initContainers.extraInit [array] Fully specify any additional init containers your use case requires.
  initContainers:
    extraInit: [] # Add any additional init containers your use case requires.
    # -  # full init container definition here

  ## @param nodeSelector [object] Sets node selectors for the NIM -- for example `nvidia.com/gpu.present: "true"`.
  nodeSelector: {}  # likely best to set this to `nvidia.com/gpu.present: "true"` depending on cluster setup

  ## @param podAnnotations [object] Sets additional annotations on the main deployment pods.
  podAnnotations: {}

  ## @extra podSecurityContext Specifies security context settings for pod.
  ## @param podSecurityContext.runAsUser Specify user UID for pod.
  ## @param podSecurityContext.runAsGroup Specify group ID for pod.
  ## @param podSecurityContext.fsGroup Specify file system owner group id.
  podSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

  ## @extra proxyCA [object] Specify a certificate for a custom proxy. When `proxyCA` is set native TLS is used for downloading from NGC.
  ## @param proxyCA.enabled Specify true if NIM is run behind a proxy.
  ## @param proxyCA.secretName [nullable] Specify a name of the Kubernetes secret containing the certificate. The secret is created before the deployment. Must be used together with `proxyCA.keyName`
  ## @param proxyCA.keyName [nullable] Specify a name of the key inside the secret which contains the certificate. Must be used together with `proxyCA.secretName`
  proxyCA:
    enabled: false
    secretName: ""
    keyName: ""

  ## @param replicaCount Specify static replica count for deployment.
  replicaCount: 1

  ## @extra resources [object] Specify resources limits and requests for the running service.
  ## @param resources.limits.nvidia.com/gpu Specify number of GPUs to present to the running service.
  resources:
    limits:
      nvidia.com/gpu: 1  # Number of GPUs to present to the running service

  ## @extra serviceAccount Options to specify service account for the deployment.
  ## @param serviceAccount.create Specifies whether a service account should be created.
  ## @param serviceAccount.annotations [object] Sets annotations to be added to the service account.
  ## @param serviceAccount.name Specifies the name of the service account to use. If it is not set and create is `true`, a name is generated using a `fullname` template.
  serviceAccount:
    # Specifies whether a service account should be created
    create: false
    # Annotations to add to the service account
    annotations: {}
    # The name of the service account to use.
    # If not set and create is `true`, a name is generated using the `fullname` template
    name: ""

  ## @param statefulSet.enabled Enables `statefulset` deployment. Enabling `statefulSet` allows PVC templates for scaling. If using central PVC with RWX `accessMode`, this isn't needed.
  statefulSet:
    enabled: true

  ## @extra tolerations Specify tolerations for pod assignment. Allows the scheduler to schedule pods with matching taints.
  ## @skip tolerations[0].key
  ## @skip tolerations[0].operator
  ## @skip tolerations[0].effect
  tolerations:
    - key: "nvidia.com/gpu"
      operator: "Exists"
      effect: "NoSchedule"


  ## @section Autoscaling parameters
  ## @descriptionStart
  ## Values used for creating a `Horizontal Pod Autoscaler`. If autoscaling is not enabled, the rest are ignored.
  ## NVIDIA recommends usage of the custom metrics API, commonly implemented with the Prometheus Adapter.
  ## Standard metrics of CPU and memory are of limited use in scaling NIM.
  ## @descriptionEnd
  ## @param autoscaling.enabled Enables horizontal pod autoscaler.
  ## @param autoscaling.minReplicas Specify minimum replicas for autoscaling.
  ## @param autoscaling.maxReplicas Specify maximum replicas for autoscaling.
  ## @param autoscaling.metrics Array of metrics for autoscaling.
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    metrics: []


  ## @section Ingress parameters
  ## @param ingress.enabled Enables ingress.
  ## @param ingress.className Specify class name for Ingress.
  ## @param ingress.annotations Specify additional annotations for ingress.
  ## @extra ingress.hosts Specify list of hosts each containing lists of paths.
  ## @param ingress.hosts[0].host Specify name of host.
  ## @param ingress.hosts[0].paths[0].path Specify ingress path.
  ## @param ingress.hosts[0].paths[0].pathType Specify path type.
  ## @param ingress.hosts[0].paths[0].serviceType Specify service type. It can be can be `nemo` or `openai` -- make sure your model serves the appropriate port(s).
  ## @param ingress.tls Specify list of pairs of TLS `secretName` and hosts.
  ingress:
    enabled: false
    className: ""
    annotations: {}
      # kubernetes.io/ingress.class: nginx
      # kubernetes.io/tls-acme: "true"
    hosts:
      - host: chart-example.local
        paths:
          - path: /
            pathType: ImplementationSpecific
            serviceType: openai  # can be nemo or openai -- make sure your model serves the appropriate port(s)

    tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local


  ## @section Probe parameters
  ## @param livenessProbe.enabled Enables `livenessProbe``.
  ## @param livenessProbe.method `LivenessProbe` `http` or `script`, but no script is currently provided.
  ## @param livenessProbe.command `LivenessProbe`` script command to use (unsupported at this time).
  ## @param livenessProbe.path `LivenessProbe`` endpoint path.
  ## @param livenessProbe.initialDelaySeconds Initial delay seconds for `livenessProbe`.
  ## @param livenessProbe.timeoutSeconds Timeout seconds for `livenessProbe`.
  ## @param livenessProbe.periodSeconds Period seconds for `livenessProbe`.
  ## @param livenessProbe.successThreshold Success threshold for `livenessProbe`.
  ## @param livenessProbe.failureThreshold Failure threshold for `livenessProbe`.
  livenessProbe:
    enabled: true
    method: http
    command:
      - myscript.sh
    path: /v1/health/live  # correct for LLM container
    initialDelaySeconds: 15
    timeoutSeconds: 1
    periodSeconds: 10
    successThreshold: 1
    failureThreshold: 3

  ## @param readinessProbe.enabled Enables `readinessProbe`.
  ## @param readinessProbe.path Readiness Endpoint Path.
  ## @param readinessProbe.initialDelaySeconds Initial delay seconds for `readinessProbe`.
  ## @param readinessProbe.timeoutSeconds Timeout seconds for `readinessProbe`.
  ## @param readinessProbe.periodSeconds Period seconds for `readinessProbe`.
  ## @param readinessProbe.successThreshold Success threshold for `readinessProbe`.
  ## @param readinessProbe.failureThreshold Failure threshold for `readinessProbe`.
  readinessProbe:
    enabled: true
    path: /v1/health/ready  # correct for LLM container
    initialDelaySeconds: 15
    timeoutSeconds: 1
    periodSeconds: 10
    successThreshold: 1
    failureThreshold: 3

  ## @param startupProbe.enabled Enables `startupProbe`.
  ## @param startupProbe.path `StartupProbe` Endpoint Path.
  ## @param startupProbe.initialDelaySeconds Initial delay seconds for `startupProbe`.
  ## @param startupProbe.timeoutSeconds Timeout seconds for `startupProbe`.
  ## @param startupProbe.periodSeconds Period seconds for `startupProbe`.
  ## @param startupProbe.successThreshold Success threshold for `startupProbe`.
  ## @param startupProbe.failureThreshold Failure threshold for `startupProbe`.
  startupProbe:
    enabled: true
    path: /v1/health/ready  # correct for LLM container
    initialDelaySeconds: 40
    timeoutSeconds: 1
    periodSeconds: 10
    successThreshold: 1
    failureThreshold: 180


  ## @section Metrics parameters
  ## @extra metrics
  ## @extra metrics.serviceMonitor Options for `serviceMonitor` to use the Prometheus Operator and the primary service object.
  ## @param metrics.serviceMonitor.enabled Enables `serviceMonitor` creation.
  ## @param metrics.serviceMonitor.additionalLabels [object] Specify additional labels for `serviceMonitor`.
  metrics:
    serviceMonitor:  # for use with the Prometheus Operator and the primary service object
      enabled: false
      additionalLabels: {}


  ## @section Models parameters
  ## @param model.nimCache [string] Path to mount writeable storage or pre-filled model cache for the NIM.
  ## @param model.name Specifies the name of the model in the API (usually, the name of the NIM). This is mostly used for helm tests and is usually otherwise optional. This must match the name from _/v1/models_ to allow `helm test <release-name>` to work.
  ## @param model.ngcAPISecret [string] Name of pre-existing secret with a key named `NGC_API_KEY` that contains an API key for NGC model downloads.
  ## @param model.ngcAPIKey [string] NGC API key literal to use as the API secret and image pull secret when set.
  ## @param model.hfTokenSecret [string] Name of pre-existing secret with a key named `HF_TOKEN` that contains a token for HuggingFace model downloads.
  ## @param model.openaiPort Specifies the Open AI API Port.
  ## @param model.labels [object] Specifies extra labels to be added on deployed pods.
  ## @param model.jsonLogging Turn JSON lines logging on or off. Defaults to true.
  ## @param model.logLevel Log level of NIM service. Possible values of the variable are TRACE, DEBUG, INFO, WARNING, ERROR, CRITICAL.
  model:
    nimCache: /model-store
    name: meta/llama3-8b-instruct # optional name of the model in the OpenAI API -- used in `helm test`
    ngcAPISecret: "ngc-api"
    ngcAPIKey: ""
    hfTokenSecret: ""
    openaiPort: 8000
    labels: {}  # any extra labels desired on deployed pods
    jsonLogging: true
    logLevel: INFO

  ## @section Storage parameters
  ## @extra persistence Specify settings to modify the behavior and use of persistent volumes for model weights.
  ## @param persistence.enabled Enables the use of persistent volumes.
  ## @param persistence.existingClaim Specifies an existing persistent volume claim. If using `existingClaim`, run only one replica or use a `ReadWriteMany` storage setup.
  ## @param persistence.storageClass [nullable] Specifies the persistent volume storage class. If set to `"-"`, this disables dynamic provisioning. If left undefined or set to null, the cluster default storage provisioner is used.
  ## @param persistence.accessMode Specify `accessMode`. If using an NFS or similar setup, you can use `ReadWriteMany`.
  ## @param persistence.stsPersistentVolumeClaimRetentionPolicy.whenDeleted Specifies persistent volume claim retention policy when deleted. Only used with Stateful Set volume templates.
  ## @param persistence.stsPersistentVolumeClaimRetentionPolicy.whenScaled Specifies persistent volume claim retention policy when scaled. Only used with Stateful Set volume templates.
  ## @param persistence.size Specifies the size of the persistent volume claim (for example 40Gi).
  ## @param persistence.annotations [object] Adds annotations to the persistent volume claim.
  persistence:
    enabled: false
    existingClaim: ""  # if using existingClaim, run only one replica or use a `ReadWriteMany` storage setup
    # Persistent Volume Storage Class
    # If defined, storageClassName: <storageClass>
    # If set to "-", storageClassName: "", which disables dynamic provisioning.
    # If undefined (the default) or set to null, no storageClassName spec is
    #   set, choosing the default provisioner.
    storageClass: ""
    accessMode: ReadWriteOnce  # If using an NFS or similar setup, you can use `ReadWriteMany`
    stsPersistentVolumeClaimRetentionPolicy:
      whenDeleted: Retain
      whenScaled: Retain
    size: 50Gi  # size of claim in bytes (for example 8Gi)
    annotations: {}

  ## @extra hostPath Configures model cache on local disk on the nodes using `hostPath` -- for special cases. You should understand the security implications before using this option.
  ## @param hostPath.enabled Enable `hostPath`.
  ## @param hostPath.path Specifies path on the node used as a `hostPath` volume.
  hostPath:
    enabled: false
    path: /model-store

  ## @extra nfs Configures the model cache to sit on shared direct-mounted NFS. NOTE: you cannot set mount options using direct NFS mount to pods without a node-intalled nfsmount.conf. An NFS-based `PersistentVolumeClaim` is likely better in most cases.
  ## @param nfs.enabled Enables direct pod NFS mount.
  ## @param nfs.path Specify path on NFS server to mount.
  ## @param nfs.server Specify NFS server address.
  ## @param nfs.readOnly Set to true to mount as read-only.
  nfs:
    enabled: false
    server: nfs-server.example.com
    path: /exports
    readOnly: false

  ## @section Service parameters
  ## @param service.type Specifies the service type for the deployment.
  ## @param service.name Overrides the default service name
  ## @param service.openaiPort Specifies Open AI Port for the service.
  ## @param service.annotations [object] Specify additional annotations to be added to service.
  ## @param service.labels Specifies additional labels to be added to service.
  service:
    type: ClusterIP
    openaiPort: 8000
    annotations: {}
    labels: {}
    name: ""  # override the default service name


  ## @section Multi-node parameters
  ## @descriptionStart
  ## Large models that must span multiple nodes do not work on plain Kubernetes with the GPU Operator alone at this time.
  ## Optimized TensorRT profiles, when selected automatically or by environment variable, require one of the following:
  ##
  ## - (Recommended) [LeaderWorkerSets](https://github.com/kubernetes-sigs/lws)—We recommend that you use LeaderWorkerSets if your cluster version allows it.
  ## - (Not recommended) [MPI Operator](https://github.com/kubeflow/mpi-operator)—Since `MPIJob` is a batch-type resource that is not designed with service stability and reliability in mind, this option is not recommended.
  ## Only optimized profiles are supported for multi-node deployment at this time.
  ## @descriptionEnd
  ## @param multiNode.enabled Specify true for multi-node deployments.
  ## @param multiNode.clusterStartTimeout Set the number of seconds to wait for worker nodes to start before failing.
  ## @param multiNode.gpusPerNode Number of GPUs for each pod. In most cases, this should match `resources.limits.nvidia.com/gpu`.
  ## @param multiNode.workers Specifies how many worker pods per multi-node replica to launch.
  ## @param multiNode.workerCustomCommand Sets a custom command array for the worker nodes in a LeaderWorkerSet only.
  ## @param multiNode.leaderWorkerSet.enabled True to use `LeaderWorkerSets` for multi-node deployments (recommended). False to `MPIJob` from mpi-operator.
  ## @param multiNode.existingSSHSecret [string,nullable] Sets the SSH private key for MPI to an existing secret. Otherwise, the Helm chart generates a key randomly during installation.
  ## @param multiNode.mpiJob.workerAnnotations Annotations only applied to workers for `MPIJob`, if used. This may be necessary to ensure the workers connect to `CNI`s offered by `multus` and the network operator, if used.
  ## @param multiNode.mpiJob.launcherResources Resources section to apply only to the launcher pods in `MPIJob`, if used. Launchers do not get the chart resources restrictions. Only workers do, since they require GPUs.
  ## @param multiNode.optimized.enabled True to enable optimized multi-node deployments. Currently, true is the only option.
  multiNode:
    clusterStartTimeout: 300
    enabled: false
    workers: 1
    workerCustomCommand: []
    leaderWorkerSet:
      enabled: true
    existingSSHSecret: ""
    mpiJob:
      workerAnnotations: {}
      launcherResources: {}
    gpusPerNode: 1
    optimized:
      enabled: true


# =============================================================================
# --- OpenTelemetry Collector ---
# =============================================================================
opentelemetry-collector:
  Pulled: dp.apps.rancher.io/charts/opentelemetry-collector:0.147.1
  Digest: sha256:b3527665318e1644bb823a96da97253dada0d4fd6df30b66608a5b818614722b
  # Default values for opentelemetry-collector.
  # This is a YAML-formatted file.
  # Declare variables to be passed into your templates.

  global:
    # -- Global override for container image registry
    imageRegistry: ""
    # -- Global override for container image registry pull secrets
    imagePullSecrets: []
  nameOverride: ""
  fullnameOverride: ""
  # Valid values are "daemonset", "deployment", and "statefulset".
  mode: ""
  # Specify which namespace should be used to deploy the resources into
  namespaceOverride: ""
  # Handles basic configuration of components that
  # also require k8s modifications to work correctly.
  # .Values.config can be used to modify/add to a preset
  # component configuration, but CANNOT be used to remove
  # preset configuration. If you require removal of any
  # sections of a preset configuration, you cannot use
  # the preset. Instead, configure the component manually in
  # .Values.config and use the other fields supplied in the
  # values.yaml to configure k8s as necessary.
  presets:
    # Configures the collector to collect logs.
    # Adds the filelog receiver to the logs pipeline
    # and adds the necessary volumes and volume mounts.
    # Best used with mode = daemonset.
    # See https://opentelemetry.io/docs/kubernetes/collector/components/#filelog-receiver for details on the receiver.
    logsCollection:
      enabled: false
      includeCollectorLogs: false
      # Enabling this writes checkpoints in /var/lib/otelcol/ host directory.
      # Note this changes collector's user to root, so that it can write to host directory.
      storeCheckpoints: false
      # The maximum bytes size of the recombined field.
      # Once the size exceeds the limit, all received entries of the source will be combined and flushed.
      maxRecombineLogSize: 102400
    # Configures the collector to collect host metrics.
    # Adds the hostmetrics receiver to the metrics pipeline
    # and adds the necessary volumes and volume mounts.
    # Best used with mode = daemonset.
    # See https://opentelemetry.io/docs/kubernetes/collector/components/#host-metrics-receiver for details on the receiver.
    hostMetrics:
      enabled: false
    # Configures the Kubernetes Processor to add Kubernetes metadata.
    # Adds the k8sattributes processor to all the pipelines
    # and adds a preset of minimum required RBAC rules to ClusterRole.
    # Best used with mode = daemonset.
    # See https://opentelemetry.io/docs/kubernetes/collector/components/#kubernetes-attributes-processor for details on the receiver.
    kubernetesAttributes:
      enabled: false
      # When enabled the processor will extract all labels for an associated pod and add them as resource attributes.
      # The label's exact name will be the key.
      extractAllPodLabels: false
      # When enabled the processor will extract all annotations for an associated pod and add them as resource attributes.
      # The annotation's exact name will be the key.
      extractAllPodAnnotations: false
    # Configures the collector to collect node, pod, and container metrics from the API server on a kubelet.
    # Adds the kubeletstats receiver to the metrics pipeline
    # and adds the necessary rules to ClusterRole.
    # Best used with mode = daemonset.
    # See https://opentelemetry.io/docs/kubernetes/collector/components/#kubeletstats-receiver for details on the receiver.
    kubeletMetrics:
      enabled: false
    # Configures the collector to collect kubernetes events.
    # Adds the k8sobjects receiver to the logs pipeline
    # and collects kubernetes events by default.
    # Best used with mode = deployment or statefulset.
    # See https://opentelemetry.io/docs/kubernetes/collector/components/#kubernetes-objects-receiver for details on the receiver.
    kubernetesEvents:
      enabled: false
    # Configures the Kubernetes Cluster Receiver to collect cluster-level metrics.
    # Adds the k8s_cluster receiver to the metrics pipeline
    # and adds the necessary rules to ClusterRole.
    # Can be used with mode = deployment, statefulset, or daemonset.
    # When used as a daemonset, a leader election is setup to prevent duplication
    # See https://opentelemetry.io/docs/kubernetes/collector/components/#kubernetes-cluster-receiver for details on the receiver.
    clusterMetrics:
      enabled: false
      # When enabled with mode = daemonset, leader election is setup to prevent telemetry duplication.
      # disableLeaderElection: false
    # Configures the collector to collect logs and metrics from pods with specific annotations.
    # This preset can not be used together with the `logsCollection` preset.
    # Adds the receiver_creator receiver to the logs and metrics pipelines
    # and adds the necessary rules to ClusterRole.
    # Best used with mode = daemonset.
    # See https://github.com/open-telemetry/opentelemetry-collector-contrib/blob/main/receiver/receivercreator/README.md#generate-receiver-configurations-from-provided-hints for details on the receiver.
    annotationDiscovery:
      logs:
        enabled: false
      metrics:
        enabled: false
  configMap:
    # Specifies whether a configMap should be created (true by default)
    create: true
    # Specifies an existing ConfigMap to be mounted to the pod
    # The ConfigMap MUST include the collector configuration via a key named 'relay' or the collector will not start.
    # This also supports template content, which will eventually be converted to yaml.
    existingName: ""
    # Specifies the relative path to custom ConfigMap template file. This option SHOULD be used when bundling a custom
    # ConfigMap template, as it enables pod restart via a template checksum annotation.
    # existingPath: ""
  # When enabled, the chart will configure the collector to emit its traces, metrics, and logs over http via the OTLP using the Otel Go SDK.
  # If internalTelemetryViaOTLP.metrics.enabled the chart will remove the default prometheus receiver (which was configured to scrape the Collector's metrics)
  # and the service.telemetry.metrics.address value.
  # Learn more about the Collector telemetry at https://opentelemetry.io/docs/collector/internal-telemetry/.
  #
  # THIS OPTION IS EXPERIMENTAL AND SUBJECT TO BREAKING CHANGES
  internalTelemetryViaOTLP:
    # The endpoint where the telemetry will be exported
    endpoint: ""
    # Optional headers to configure the exporters
    headers: []
    # - name: "x-dest-auth"
    #   value: "some auth key"
    traces:
      enabled: false
      # overrides internalTelemetryViaOTLP.endpoint for traces
      endpoint: ""
      # overrides internalTelemetryViaOTLP.headers for traces
      headers: []
    metrics:
      enabled: false
      # overrides internalTelemetryViaOTLP.endpoint for metrics
      endpoint: ""
      # overrides internalTelemetryViaOTLP.headers for metrics
      headers: []
    logs:
      enabled: false
      # overrides internalTelemetryViaOTLP.endpoint for logs
      endpoint: ""
      # overrides internalTelemetryViaOTLP.headers for logs
      headers: []
  # Base collector configuration.
  # Supports templating. To escape existing instances of {{ }}, use {{` <original content> `}}.
  # For example, {{ REDACTED_EMAIL }} becomes {{` {{ REDACTED_EMAIL }} `}}.
  config:
    exporters:
      debug: {}
    extensions:
      # The health_check extension is mandatory for this chart.
      # Without the health_check extension the collector will fail the readiness and liveness probes.
      # The health_check extension can be modified, but should never be removed.
      health_check:
        endpoint: ${env:MY_POD_IP}:13133
    processors:
      batch: {}
      # Default memory limiter configuration for the collector based on k8s resource limits.
      memory_limiter:
        # check_interval is the time between measurements of memory usage.
        check_interval: 5s
        # By default limit_mib is set to 80% of ".Values.resources.limits.memory"
        limit_percentage: 80
        # By default spike_limit_mib is set to 25% of ".Values.resources.limits.memory"
        spike_limit_percentage: 25
    receivers:
      jaeger:
        protocols:
          grpc:
            endpoint: ${env:MY_POD_IP}:14250
          thrift_http:
            endpoint: ${env:MY_POD_IP}:14268
          thrift_compact:
            endpoint: ${env:MY_POD_IP}:6831
      otlp:
        protocols:
          grpc:
            endpoint: ${env:MY_POD_IP}:4317
          http:
            endpoint: ${env:MY_POD_IP}:4318
      # if internalTelemetryViaOTLP.metrics.enabled = true, prometheus receiver will be removed
      prometheus:
        config:
          scrape_configs:
            - job_name: opentelemetry-collector
              scrape_interval: 10s
              static_configs:
                - targets:
                    - ${env:MY_POD_IP}:8888
      zipkin:
        endpoint: ${env:MY_POD_IP}:9411
    service:
      telemetry:
        resource:
          k8s.namespace.name: "${env:OTEL_K8S_NAMESPACE}"
          k8s.node.name: "${env:OTEL_K8S_NODE_NAME}"
          k8s.node.ip: "${env:OTEL_K8S_NODE_IP}"
          k8s.pod.name: "${env:OTEL_K8S_POD_NAME}"
          k8s.pod.ip: "${env:OTEL_K8S_POD_IP}"
          host.name: "${env:OTEL_K8S_NODE_NAME}"
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: ${env:MY_POD_IP}
                    port: 8888
      extensions:
        - health_check
      pipelines:
        logs:
          exporters:
            - debug
          processors:
            - memory_limiter
            - batch
          receivers:
            - otlp
        metrics:
          exporters:
            - debug
          processors:
            - memory_limiter
            - batch
          receivers:
            - otlp
            # if internalTelemetryViaOTLP.metrics.enabled = true, prometheus receiver will be removed
            - prometheus
        traces:
          exporters:
            - debug
          processors:
            - memory_limiter
            - batch
          receivers:
            - otlp
            - jaeger
            - zipkin
  # Helm currently has an issue (https://github.com/helm/helm/pull/12879) when using null to remove
  # default configuration from a subchart. The result is that you cannot remove default configuration
  # from `config`, such as a specific receiver or a specific pipeline, when the chart is used as a
  # subchart.
  #
  # Until the helm bug is fixed, this field is provided as an alternative when using this chart as a subchart.
  # It is not recommended to use this field when installing the chart directly.
  #
  # When not empty, `alternateConfig` will be used to set the collector's configuration. It has NO default
  # values and IS NOT MERGED with config. Any configuration provided via `config` will be ignored when
  # `alternateConfig` is set. You MUST provide your own collector configuration.
  #
  # Reminder that the healthcheck extension (or something else that provides the same functionality) is required.
  #
  # Components configured by presets will be injected in the same way they are for `config`.
  alternateConfig: {}
  image:
    repository: "containers/opentelemetry-collector"
    pullPolicy: IfNotPresent
    # Replace the tag with the desired OpenTelemetry Collector version and distribution:
    #   * "0.147.0" (OpenTelemetry Collector Core Distro)
    #   * "0.147.0-k8s" (OpenTelemetry Collector Kubernetes Distro)
    tag: "0.147.0-k8s-7.1"
    # When digest is set to a non-empty value, images will be pulled by digest (regardless of tag value).
    digest: ""
    registry: dp.apps.rancher.io
  imagePullSecrets: []
  # OpenTelemetry Collector executable
  command:
    name: ""
    extraArgs: []
  serviceAccount:
    # Specifies whether a service account should be created
    create: true
    # Annotations to add to the service account
    annotations: {}
    # The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: ""
    # Automatically mount a ServiceAccount's API credentials?
    automountServiceAccountToken: true
  clusterRole:
    # Specifies whether a clusterRole should be created
    # Some presets also trigger the creation of a cluster role and cluster role binding.
    # If using one of those presets, this field is no-op.
    create: false
    # Annotations to add to the clusterRole
    # Can be used in combination with presets that create a cluster role.
    annotations: {}
    # The name of the clusterRole to use.
    # If not set a name is generated using the fullname template
    # Can be used in combination with presets that create a cluster role.
    name: ""
    # A set of rules as documented here : https://kubernetes.io/docs/reference/access-authn-authz/rbac/
    # Can be used in combination with presets that create a cluster role to add additional rules.
    rules: []
    # - apiGroups:
    #   - ''
    #   resources:
    #   - 'pods'
    #   - 'nodes'
    #   verbs:
    #   - 'get'
    #   - 'list'
    #   - 'watch'

    clusterRoleBinding:
      # Annotations to add to the clusterRoleBinding
      # Can be used in combination with presets that create a cluster role binding.
      annotations: {}
      # The name of the clusterRoleBinding to use.
      # If not set a name is generated using the fullname template
      # Can be used in combination with presets that create a cluster role binding.
      name: ""
  podSecurityContext: {}
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  # Allows for pod scheduler prioritisation
  priorityClassName: ""
  # Allows for pod to use a specific runtime class, e.g. gvisor, kata-containers
  # Also useful for the pod security admissions plugins that rely on runtimeClassName
  runtimeClassName: ""
  extraEnvs: []
  extraEnvsFrom: []
  # This also supports template content, which will eventually be converted to yaml.
  extraVolumes: []
  # This also supports template content, which will eventually be converted to yaml.
  extraVolumeMounts: []
  # This also supports template content, which will eventually be converted to yaml.
  extraManifests: []
  # Configuration for ports
  # nodePort is also allowed
  ports:
    otlp:
      enabled: true
      containerPort: 4317
      servicePort: 4317
      hostPort: 4317
      protocol: TCP
      # nodePort: 30317
      appProtocol: grpc
    otlp-http:
      enabled: true
      containerPort: 4318
      servicePort: 4318
      hostPort: 4318
      protocol: TCP
    jaeger-compact:
      enabled: true
      containerPort: 6831
      servicePort: 6831
      hostPort: 6831
      protocol: UDP
    jaeger-thrift:
      enabled: true
      containerPort: 14268
      servicePort: 14268
      hostPort: 14268
      protocol: TCP
    jaeger-grpc:
      enabled: true
      containerPort: 14250
      servicePort: 14250
      hostPort: 14250
      protocol: TCP
    zipkin:
      enabled: true
      containerPort: 9411
      servicePort: 9411
      hostPort: 9411
      protocol: TCP
    metrics:
      # The metrics port is disabled by default. However you need to enable the port
      # in order to use the ServiceMonitor (serviceMonitor.enabled) or PodMonitor (podMonitor.enabled).
      enabled: false
      containerPort: 8888
      servicePort: 8888
      protocol: TCP
  # When enabled, the chart will set the GOMEMLIMIT env var to 80% of the configured resources.limits.memory.
  # If no resources.limits.memory are defined then enabling does nothing.
  # It is HIGHLY recommend to enable this setting and set a value for resources.limits.memory.
  useGOMEMLIMIT: true
  # Resource limits & requests.
  # It is HIGHLY recommended to set resource limits.
  resources: {}
  # resources:
  #   limits:
  #     cpu: 250m
  #     memory: 512Mi

  enableConfigChecksumAnnotation: true
  podAnnotations: {}
  podLabels: {}
  # Common labels to add to all otel-collector resources. Evaluated as a template.
  additionalLabels: {}
  #  app.kubernetes.io/part-of: my-app

  # Host networking requested for this pod. Use the host's network namespace.
  hostNetwork: false
  # Enable sharing the host's PID namespace with the pod.
  # WARNING: This grants visibility into all host processes and should only be enabled when required.
  hostPID: false
  # Adding entries to Pod /etc/hosts with HostAliases
  # https://kubernetes.io/docs/tasks/network/customize-hosts-file-for-pods/
  hostAliases: []
  # - ip: "1.2.3.4"
  #   hostnames:
  #     - "my.host.com"

  # Pod DNS policy ClusterFirst, ClusterFirstWithHostNet, None, Default, None
  dnsPolicy: ""
  # Custom DNS config. Required when DNS policy is None.
  dnsConfig: {}
  # Custom kube scheduler name.
  schedulerName: ""
  # only used with deployment mode
  replicaCount: 1
  revisionHistoryLimit: 10
  annotations: {}
  # List of extra sidecars to add.
  # This also supports template content, which will eventually be converted to yaml.
  extraContainers: []
  # extraContainers:
  #   - name: test
  #     command:
  #       - cp
  #     args:
  #       - /bin/sleep
  #       - /test/sleep
  #     image: busybox:latest
  #     volumeMounts:
  #       - name: test
  #         mountPath: /test

  # List of init container specs, e.g. for copying a binary to be executed as a lifecycle hook.
  # This also supports template content, which will eventually be converted to yaml.
  # Another usage of init containers is e.g. initializing filesystem permissions to the OTLP Collector user `1000` in case you are using persistence and the volume is producing a permission denied error for the OTLP Collector container.
  initContainers: []
  # initContainers:
  #   - name: test
  #     image: busybox:latest
  #     command:
  #       - cp
  #     args:
  #       - /bin/sleep
  #       - /test/sleep
  #     volumeMounts:
  #       - name: test
  #         mountPath: /test
  #  - name: init-fs
  #    image: busybox:latest
  #    command:
  #      - sh
  #      - '-c'
  #      - 'chown -R 1000: /var/lib/storage/otc' # use the path given as per `extensions.file_storage.directory` & `extraVolumeMounts[x].mountPath`
  #    volumeMounts:
  #      - name: opentelemetry-collector-data # use the name of the volume used for persistence
  #        mountPath: /var/lib/storage/otc # use the path given as per `extensions.file_storage.directory` & `extraVolumeMounts[x].mountPath`

  # Pod lifecycle policies.
  lifecycleHooks: {}
  # lifecycleHooks:
  #   preStop:
  #     exec:
  #       command:
  #       - /test/sleep
  #       - "5"

  # liveness probe configuration
  # Ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
  ##
  livenessProbe:
    # Number of seconds after the container has started before startup, liveness or readiness probes are initiated.
    # initialDelaySeconds: 1
    # How often in seconds to perform the probe.
    # periodSeconds: 10
    # Number of seconds after which the probe times out.
    # timeoutSeconds: 1
    # Minimum consecutive failures for the probe to be considered failed after having succeeded.
    # failureThreshold: 1
    # Duration in seconds the pod needs to terminate gracefully upon probe failure.
    # terminationGracePeriodSeconds: 10
    httpGet:
      port: 13133
      path: /
  # readiness probe configuration
  # Ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
  ##
  readinessProbe:
    # Number of seconds after the container has started before startup, liveness or readiness probes are initiated.
    # initialDelaySeconds: 1
    # How often (in seconds) to perform the probe.
    # periodSeconds: 10
    # Number of seconds after which the probe times out.
    # timeoutSeconds: 1
    # Minimum consecutive successes for the probe to be considered successful after having failed.
    # successThreshold: 1
    # Minimum consecutive failures for the probe to be considered failed after having succeeded.
    # failureThreshold: 1
    httpGet:
      port: 13133
      path: /
  # startup probe configuration
  # Ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
  ##
  startupProbe: {}
  # Number of seconds after the container has started before startup probes are initiated.
  # initialDelaySeconds: 1
  # How often in seconds to perform the probe.
  # periodSeconds: 10
  # Number of seconds after which the probe times out.
  # timeoutSeconds: 1
  # Minimum consecutive failures for the probe to be considered failed after having succeeded.
  # failureThreshold: 1
  # Duration in seconds the pod needs to terminate gracefully upon probe failure.
  # terminationGracePeriodSeconds: 10
  # httpGet:
  #   port: 13133
  #   path: /

  service:
    # Enable the creation of a Service.
    # By default, it's enabled on mode != daemonset.
    # However, to enable it on mode = daemonset, its creation must be explicitly enabled
    # enabled: true
    type: ClusterIP
    # Supported values: PreferClose (deprecated in K8s 1.33+), PreferSameZone, PreferSameNode
    # trafficDistribution: PreferClose
    # type: LoadBalancer
    # loadBalancerIP: 1.2.3.4
    # loadBalancerSourceRanges: []

    # By default, Service of type 'LoadBalancer' will be created setting 'externalTrafficPolicy: Cluster'
    # unless other value is explicitly set.
    # Possible values are Cluster or Local (https://kubernetes.io/docs/tasks/access-application-cluster/create-external-load-balancer/#preserving-the-client-source-ip)
    # externalTrafficPolicy: Cluster
    annotations: {}
    # By default, Service will be created setting 'internalTrafficPolicy: Local' on mode = daemonset
    # unless other value is explicitly set.
    # Setting 'internalTrafficPolicy: Cluster' on a daemonset is not recommended
    # internalTrafficPolicy: Cluster
  ingress:
    enabled: false
    # annotations: {}
    # ingressClassName: nginx
    # hosts:
    #   - host: collector.example.com
    #     paths:
    #       - path: /
    #         pathType: Prefix
    #         port: 4318
    # tls:
    #   - secretName: collector-tls
    #     hosts:
    #       - collector.example.com

    # Additional ingresses - only created if ingress.enabled is true
    # Useful for when differently annotated ingress services are required
    # Each additional ingress needs key "name" set to something unique
    additionalIngresses: []
    # - name: cloudwatch
    #   ingressClassName: nginx
    #   annotations: {}
    #   hosts:
    #     - host: collector.example.com
    #       paths:
    #         - path: /
    #           pathType: Prefix
    #           port: 4318
    #   tls:
    #     - secretName: collector-tls
    #       hosts:
    #         - collector.example.com
  podMonitor:
    # The pod monitor by default scrapes the metrics port.
    # The metrics port needs to be enabled as well.
    enabled: false
    metricsEndpoints:
      - port: metrics
        # interval: 15s
    # additional labels for the PodMonitor
    extraLabels: {}
    #   release: kube-prometheus-stack
  serviceMonitor:
    # The service monitor by default scrapes the metrics port.
    # The metrics port needs to be enabled as well.
    enabled: false
    metricsEndpoints:
      - port: metrics
        # interval: 15s
    # additional labels for the ServiceMonitor
    extraLabels: {}
    #  release: kube-prometheus-stack
    # Used to set relabeling and metricRelabeling configs on the ServiceMonitor
    # https://prometheus.io/docs/prometheus/latest/configuration/configuration/#relabel_config
    relabelings: []
    metricRelabelings: []
  # PodDisruptionBudget is used only if deployment enabled
  podDisruptionBudget:
    enabled: false
  #   minAvailable: 2
  #   maxUnavailable: 1

  # autoscaling is used only if mode is "deployment" or "statefulset"
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    behavior: {}
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80
    # Supply an array of custom metrics to be used for autoscaling. It includes externalMetrics, objectMetrics, and podsMetrics.
    additionalMetrics: []
  rollout:
    rollingUpdate: {}
    # When 'mode: daemonset', maxSurge cannot be used when hostPort is set for any of the ports
    # maxSurge: 25%
    # maxUnavailable: 0
    strategy: RollingUpdate
  prometheusRule:
    enabled: false
    groups: []
    # Create default rules for monitoring the collector
    defaultRules:
      enabled: false
      ## Additional labels for PrometheusRule alerts
      additionalRuleLabels: {}
      ## Additional annotations for PrometheusRule alerts
      additionalRuleAnnotations: {}
    # additional labels for the PrometheusRule
    extraLabels: {}
  statefulset:
    # volumeClaimTemplates for a statefulset
    volumeClaimTemplates: []
    podManagementPolicy: "Parallel"
    # Controls if and how PVCs created by the StatefulSet are deleted. Available in Kubernetes 1.23+.
    persistentVolumeClaimRetentionPolicy:
      enabled: false
      whenDeleted: Retain
      whenScaled: Retain
  networkPolicy:
    enabled: false
    # Annotations to add to the NetworkPolicy
    annotations: {}
    # Configure the 'from' clause of the NetworkPolicy.
    # By default this will restrict traffic to ports enabled for the Collector. If
    # you wish to further restrict traffic to other hosts or specific namespaces,
    # see the standard NetworkPolicy 'spec.ingress.from' definition for more info:
    # https://kubernetes.io/docs/reference/kubernetes-api/policy-resources/network-policy-v1/
    allowIngressFrom: []
    # # Allow traffic from any pod in any namespace, but not external hosts
    # - namespaceSelector: {}
    # # Allow external access from a specific cidr block
    # - ipBlock:
    #     cidr: 192.168.1.64/32
    # # Allow access from pods in specific namespaces
    # - namespaceSelector:
    #     matchExpressions:
    #       - key: kubernetes.io/metadata.name
    #         operator: In
    #         values:
    #           - "cats"
    #           - "dogs"

    # Add additional ingress rules to specific ports
    # Useful to allow external hosts/services to access specific ports
    # An example is allowing an external prometheus server to scrape metrics
    #
    # See the standard NetworkPolicy 'spec.ingress' definition for more info:
    # https://kubernetes.io/docs/reference/kubernetes-api/policy-resources/network-policy-v1/
    extraIngressRules: []
    # - ports:
    #   - port: metrics
    #     protocol: TCP
    #   from:
    #     - ipBlock:
    #         cidr: 192.168.1.64/32

    # Restrict egress traffic from the OpenTelemetry collector pod
    # See the standard NetworkPolicy 'spec.egress' definition for more info:
    # https://kubernetes.io/docs/reference/kubernetes-api/policy-resources/network-policy-v1/
    egressRules: []
    #  - to:
    #      - namespaceSelector: {}
    #      - ipBlock:
    #          cidr: 192.168.10.10/24
    #    ports:
    #      - port: 1234
    #        protocol: TCP
  # Allow containers to share processes across pod namespace
  shareProcessNamespace: false